<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工後台 - 兩段式登記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
    <style>.font-im-fell { font-family: 'IM Fell English', serif; } #adminContent { display: none; }</style>
</head>
<body class="bg-zinc-50 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-zinc-900 z-[100] flex items-center justify-center">
        <div class="bg-white p-8 rounded-[2rem] w-80 text-center">
            <h1 class="text-2xl font-im-fell mb-6 italic">Staff Only</h1>
            <input type="password" id="pw" placeholder="授權碼" class="w-full p-4 bg-zinc-100 rounded-xl mb-4 text-center outline-none">
            <button onclick="auth()" class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold text-xs uppercase">進入系統</button>
        </div>
    </div>

    <div id="adminContent" class="max-w-6xl mx-auto p-12">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-bold font-im-fell">後台登記中心</h1>
            <a href="index.html" class="text-xs font-bold border-b-2 border-zinc-900">← 返回前台</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <section class="bg-white p-8 rounded-[2.5rem] shadow-xl border">
                <h2 class="text-lg font-bold mb-6 flex items-center text-zinc-800">
                    <span class="w-6 h-6 bg-zinc-900 text-white rounded-full text-[10px] flex items-center justify-center mr-2">1</span>
                    登記品牌
                </h2>
                <div class="space-y-4">
                    <input type="text" id="brandName" placeholder="品牌名稱 (如: Godiva)" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900">
                    <input type="text" id="brandImg" placeholder="品牌圖片 URL (如: godiva.png)" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900">
                    <button onclick="regBrand()" class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold uppercase text-[10px] tracking-widest">確認登記品牌</button>
                </div>
                <div id="brandList" class="mt-6 flex flex-wrap gap-2"></div>
            </section>

            <section class="bg-white p-8 rounded-[2.5rem] shadow-xl border">
                <h2 class="text-lg font-bold mb-6 flex items-center text-zinc-800">
                    <span class="w-6 h-6 bg-zinc-900 text-white rounded-full text-[10px] flex items-center justify-center mr-2">2</span>
                    登記產品
                </h2>
                <div class="space-y-4">
                    <select id="selBrand" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900">
                        <option value="">請選擇品牌...</option>
                    </select>
                    <input type="text" id="prodName" placeholder="產品名稱 (如: $50 現金券)" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900">
                    <textarea id="prodTC" placeholder="產品 T&C (條款與細則)" rows="3" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900 text-sm"></textarea>
                    <button onclick="regProd()" class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold uppercase text-[10px] tracking-widest">確認登記產品</button>
                </div>
            </section>

        </div>

        <div class="mt-12 bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-zinc-50 border-b">
                    <tr>
                        <th class="p-6 uppercase text-[10px] font-bold text-zinc-400">品牌</th>
                        <th class="p-6 uppercase text-[10px] font-bold text-zinc-400">產品</th>
                        <th class="p-6 uppercase text-[10px] font-bold text-zinc-400">操作</th>
                    </tr>
                </thead>
                <tbody id="fullList" class="divide-y"></tbody>
            </table>
        </div>
    </div>

    <script>
        function auth() {
            if(document.getElementById('pw').value === "staff888") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderAdmin();
            }
        }

        // 品牌管理
        function regBrand() {
            const name = document.getElementById('brandName').value;
            const img = document.getElementById('brandImg').value;
            if(!name || !img) return alert("請填寫完整品牌資訊");
            
            let brands = JSON.parse(localStorage.getItem('wedding_brands')) || [];
            brands.push({ id: Date.now(), name, img });
            localStorage.setItem('wedding_brands', JSON.stringify(brands));
            
            document.getElementById('brandName').value = '';
            document.getElementById('brandImg').value = '';
            renderAdmin();
        }

        // 產品管理
        function regProd() {
            const brandName = document.getElementById('selBrand').value;
            const product = document.getElementById('prodName').value;
            const tc = document.getElementById('prodTC').value;
            if(!brandName || !product) return alert("請填寫完整產品資訊");

            let prods = JSON.parse(localStorage.getItem('wedding_products')) || [];
            prods.push({ id: Date.now(), brandName, product, tc });
            localStorage.setItem('wedding_products', JSON.stringify(prods));
            
            document.getElementById('prodName').value = '';
            document.getElementById('prodTC').value = '';
            renderAdmin();
        }

        function delProd(id) {
            let prods = JSON.parse(localStorage.getItem('wedding_products')) || [];
            prods = prods.filter(p => p.id !== id);
            localStorage.setItem('wedding_products', JSON.stringify(prods));
            renderAdmin();
        }

        function delBrand(id, bName) {
            if(!confirm(`刪除品牌 "${bName}" 將會保留產品但失去關聯，確定嗎？`)) return;
            let brands = JSON.parse(localStorage.getItem('wedding_brands')) || [];
            brands = brands.filter(b => b.id !== id);
            localStorage.setItem('wedding_brands', JSON.stringify(brands));
            renderAdmin();
        }

        function renderAdmin() {
            const brands = JSON.parse(localStorage.getItem('wedding_brands')) || [];
            const prods = JSON.parse(localStorage.getItem('wedding_products')) || [];

            // 1. 更新下拉選單
            const sel = document.getElementById('selBrand');
            sel.innerHTML = '<option value="">請選擇品牌...</option>' + 
                brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');

            // 2. 更新品牌圖示預覽
            const bList = document.getElementById('brandList');
            bList.innerHTML = brands.map(b => `
                <div class="relative group border p-2 rounded-lg bg-zinc-50">
                    <img src="${b.img}" class="h-8 object-contain">
                    <button onclick="delBrand(${b.id},'${b.name}')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 text-[8px] hidden group-hover:flex items-center justify-center">×</button>
                </div>
            `).join('');

            // 3. 更新數據表格
            const list = document.getElementById('fullList');
            list.innerHTML = prods.map(p => `
                <tr>
                    <td class="p-6 font-bold text-zinc-900">${p.brandName}</td>
                    <td class="p-6">${p.product}</td>
                    <td class="p-6"><button onclick="delProd(${p.id})" class="text-red-400 hover:text-red-600 font-bold uppercase text-[10px]">刪除</button></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
