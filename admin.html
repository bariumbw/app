<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工後台 - 數據同步中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
    <style>.font-im-fell { font-family: 'IM Fell English', serif; } #adminContent { display: none; }</style>
</head>
<body class="bg-zinc-50 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-zinc-900 z-[100] flex items-center justify-center text-white">
        <div class="max-w-sm w-full text-center p-6">
            <h1 class="text-3xl font-im-fell mb-6 italic">Staff Portal</h1>
            <input type="password" id="authCode" placeholder="授權碼" class="w-full p-4 bg-zinc-800 rounded-xl mb-4 text-center outline-none focus:ring-1 focus:ring-white">
            <button onclick="verifyStaff()" class="w-full py-4 bg-white text-black rounded-xl font-bold uppercase text-xs">進入</button>
        </div>
    </div>

    <div id="adminContent" class="max-w-6xl mx-auto p-12">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-bold font-im-fell">Voucher Manager</h1>
            <a href="index.html" class="text-xs font-bold border-b-2 border-zinc-900">返回預覽頁</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-[350px,1fr] gap-10">
            <aside class="bg-white p-8 rounded-[2rem] shadow-xl h-fit">
                <h2 class="text-lg font-bold mb-6 italic">新增品牌產品</h2>
                <div class="space-y-4">
                    <select id="inCat" class="w-full p-3 bg-zinc-100 rounded-xl outline-none">
                        <option value="西式禮餅">西式禮餅</option>
                        <option value="中式唐餅">中式唐餅</option>
                        <option value="美食餐飲">美食餐飲</option>
                    </select>
                    <input type="text" id="inBrand" placeholder="品牌 (如: Godiva)" class="w-full p-3 bg-zinc-100 rounded-xl outline-none">
                    <input type="text" id="inImg" placeholder="品牌圖片 URL" class="w-full p-3 bg-zinc-100 rounded-xl outline-none">
                    <input type="text" id="inProd" placeholder="產品 (如: 禮券 $50)" class="w-full p-3 bg-zinc-100 rounded-xl outline-none">
                    <textarea id="inTC" placeholder="產品 T&C" rows="4" class="w-full p-3 bg-zinc-100 rounded-xl outline-none text-sm"></textarea>
                    <button onclick="saveData()" class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold uppercase text-xs">儲存數據</button>
                </div>
            </aside>

            <main class="bg-white rounded-[2rem] shadow-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-zinc-900 text-white text-[10px] uppercase">
                        <tr>
                            <th class="p-4">分類</th>
                            <th class="p-4">品牌</th>
                            <th class="p-4">產品</th>
                            <th class="p-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dbList" class="divide-y divide-zinc-100"></tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        function verifyStaff() {
            if(document.getElementById('authCode').value === "staff888") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadList();
            }
        }

        function saveData() {
            let db = JSON.parse(localStorage.getItem('weddingVouchers')) || [];
            const newItem = {
                id: Date.now(),
                category: document.getElementById('inCat').value,
                brand: document.getElementById('inBrand').value,
                brandImg: document.getElementById('inImg').value || '1.png',
                product: document.getElementById('inProd').value,
                tc: document.getElementById('inTC').value
            };
            db.push(newItem);
            localStorage.setItem('weddingVouchers', JSON.stringify(db));
            loadList();
            alert("數據已同步至前台");
        }

        function deleteItem(id) {
            let db = JSON.parse(localStorage.getItem('weddingVouchers')) || [];
            db = db.filter(item => item.id !== id);
            localStorage.setItem('weddingVouchers', JSON.stringify(db));
            loadList();
        }

        function loadList() {
            const db = JSON.parse(localStorage.getItem('weddingVouchers')) || [];
            const list = document.getElementById('dbList');
            list.innerHTML = db.map(i => `
                <tr class="text-sm">
                    <td class="p-4"><span class="bg-zinc-100 px-2 py-1 rounded text-[10px]">${i.category}</span></td>
                    <td class="p-4 font-bold">${i.brand}</td>
                    <td class="p-4">${i.product}</td>
                    <td class="p-4 text-right"><button onclick="deleteItem(${i.id})" class="text-red-400 font-bold hover:text-red-600 transition">刪除</button></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
