<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽 - 頁一 (底圖模式)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        /* 鎖定畫布比例為 2400:1700 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('Kitty & Alan.jpg'); /* 這裡請換成你實際的圖床連結 */
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* 字體定義 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }

        /* 保護浮水印 */
        .watermark {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="6" fill="white" fill-opacity="0.1" text-anchor="middle" transform="rotate(-30 50 50)">PREVIEW ONLY</text></svg>');
            z-index: 100;
            pointer-events: none;
        }

        /* 根據圖 2 的位置精確定位文字容器 (使用百分比以適應縮放) */
        .text-overlay-content {
            position: absolute;
            top: 36%; /* 姓名開始的位置 */
            left: 7%;  /* 靠左對齊的邊距 */
            color: #FFFFFF;
            text-align: left;
            width: 50%;
        }
    </style>
</head>
<body class="bg-gray-800 p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,380px] gap-8">
        
        <div class="flex flex-col items-center">
            <div id="captureArea" class="preview-canvas">
                <div class="watermark"></div>
                
                <div class="text-overlay-content font-im-fell">
                    <div class="mb-4">
                        <h1 id="pName1" class="text-5xl md:text-8xl italic leading-[1.1]">Christian</h1>
                        <p class="text-2xl md:text-4xl italic ml-2 my-1 opacity-90">and</p>
                        <h1 id="pName2" class="text-5xl md:text-8xl italic leading-[1.1]">Benjamin</h1>
                    </div>

                    <div class="flex items-center w-full mt-10 mb-8">
                        <span id="pDate" class="font-aloja text-3xl md:text-5xl w-full text-center pr-[15%]">October 15, 2026</span>
                    </div>

                    <div class="space-y-1">
                        <h3 id="pVenue" class="text-lg md:text-2xl font-bold tracking-[0.2em] uppercase">Four Seasons Grand Ballroom</h3>
                        <p id="pAddress" class="text-[10px] md:text-sm opacity-80 tracking-widest leading-relaxed">8 FINANCE STREET, CENTRAL, HONG KONG</p>
                    </div>
                </div>
            </div>
            <p class="text-gray-400 mt-4 text-sm font-light tracking-widest">REAL-TIME DESIGN PREVIEW (2400x1700)</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-2xl h-fit">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4 font-im-fell uppercase tracking-tighter">Edit Content</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Name 1</label>
                    <input type="text" id="iName1" value="Christian" class="w-full mt-1 p-2 border-b border-gray-200 focus:border-red-500 outline-none font-im-fell text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Name 2</label>
                    <input type="text" id="iName2" value="Benjamin" class="w-full mt-1 p-2 border-b border-gray-200 focus:border-red-500 outline-none font-im-fell text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Wedding Date</label>
                    <input type="text" id="iDate" value="October 15, 2026" class="w-full mt-1 p-2 border-b border-gray-200 focus:border-red-500 outline-none font-aloja text-xl text-red-800">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Venue</label>
                    <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full mt-1 p-2 border-b border-gray-200 focus:border-red-500 outline-none font-im-fell">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Address</label>
                    <textarea id="iAddress" rows="2" class="w-full mt-1 p-2 border-b border-gray-200 focus:border-red-500 outline-none font-im-fell text-sm">8 Finance Street, Central, Hong Kong</textarea>
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-100">
                <button class="w-full py-3 bg-zinc-900 text-white rounded-lg font-bold tracking-widest hover:bg-zinc-700 transition">
                    CONFIRM DESIGN
                </button>
            </div>
        </div>
    </div>

    <script>
        // 即時監聽與更新
        const sync = (inputId, previewId) => {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            input.addEventListener('input', () => {
                preview.innerText = input.value;
            });
        };

        sync('iName1', 'pName1');
        sync('iName2', 'pName2');
        sync('iDate', 'pDate');
        sync('iVenue', 'pVenue');
        sync('iAddress', 'pAddress');
    </script>
</body>
</html>
