<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 - GitHub 本地圖片版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        /* 核心畫布：鎖定 2400 x 1700 比例 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            /* 引用你上傳的背景圖，%20 代表檔名前面的空格 */
            background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg'); 
            background-color: #A62C3E; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        /* 字體定義 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }

        /* 1-8 號新人插圖定位 (位於背景圖上方) */
        .illustration-layer {
            position: absolute;
            top: 10%;    /* 根據原圖位置調整 */
            left: 12%;   /* 向左微調 */
            width: 25%;  /* 寬度佔比 */
            z-index: 5;
        }
        .illustration-layer img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        /* 姓名區域：左移並維持兩行一致大小 */
        .name-layer {
            position: absolute;
            top: 37.5%; 
            left: 3%; 
            width: 44%;
            text-align: center;
            color: #FFFFFF;
            z-index: 10;
        }

        /* 日期：左移 */
        .date-layer {
            position: absolute;
            top: 70.2%;
            left: 9%; 
            width: 32%;
            text-align: center;
            color: #FFFFFF;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 場地與地址：Impact 字體，大小相同，強制大寫 */
        .venue-layer {
            position: absolute;
            top: 77%;
            left: 5.5%; 
            width: 39%;
            text-align: center;
            color: #FFFFFF;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
        }

        .address-layer {
            position: absolute;
            top: 82.5%;
            left: 2%; 
            width: 46%;
            text-align: center;
            color: #FFFFFF;
            text-transform: uppercase;
        }

        /* 浮水印 */
        .watermark {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="5" fill="white" fill-opacity="0.1" text-anchor="middle" transform="rotate(-30 50 50)">DESIGN PREVIEW ONLY</text></svg>');
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center">
            <div class="preview-canvas font-im-fell">
                <div class="watermark"></div>

                <div class="illustration-layer" id="illustrationContainer">
                    <img id="pIllustration" src="1.png" alt="Couple Style">
                </div>

                <div class="name-layer italic">
                    <h1 class="text-4xl md:text-7xl leading-tight tracking-tight">
                        <span id="pBride">Christian</span><br>
                        <span class="opacity-95">and <span id="pGroom">Benjamin</span></span>
                    </h1>
                </div>

                <div class="date-layer font-aloja">
                    <span id="pDate" class="text-lg md:text-[18px] uppercase tracking-[0.25em]">October 15, 2026</span>
                </div>

                <div class="venue-layer font-impact">
                    <span id="pVenue" class="text-[10px] md:text-[15px]">Four Seasons Grand Ballroom</span>
                </div>

                <div class="address-layer font-impact tracking-widest leading-snug">
                    <span id="pAddress" class="text-[10px] md:text-[15px] opacity-90">8 Finance Street, Central, Hong Kong</span>
                </div>
            </div>
            <p class="mt-4 text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-light">GitHub Local Assets | 2400:1700 Fix</p>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-2xl h-fit border border-zinc-100 overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-bold text-zinc-800 mb-6 border-b pb-4 font-im-fell">設計編輯器</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-2">選擇新人插圖款式 (1-8)</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="changeImg('1.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="1.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('2.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="2.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('3.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="3.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('4.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="4.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('5.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="5.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('6.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="6.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('7.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="7.png" class="h-10 mx-auto"></button>
                        <button onclick="changeImg('8.png')" class="border p-1 hover:bg-zinc-100 rounded transition"><img src="8.png" class="h-10 mx-auto"></button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">新娘名字</label>
                        <input type="text" id="iBride" value="Christian" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none font-im-fell italic text-lg transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">新郎名字</label>
                        <input type="text" id="iGroom" value="Benjamin" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none font-im-fell italic text-lg transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">婚禮日期</label>
                    <input type="text" id="iDate" value="October 15, 2026" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none font-aloja text-xl text-red-900 transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">宴客場地 (Impact)</label>
                    <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none font-impact text-lg transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">詳細地址 (Impact)</label>
                    <textarea id="iAddress" rows="2" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none font-impact text-sm transition-all">8 Finance Street, Central, Hong Kong</textarea>
                </div>
            </div>

            <button class="w-full mt-8 py-4 bg-zinc-900 text-white rounded-xl font-bold tracking-[0.2em] hover:bg-zinc-700 transition uppercase shadow-lg">
                確認設計
            </button>
        </div>
    </div>

    <script>
        // 文字同步
        const sync = () => {
            document.getElementById('pBride').innerText = document.getElementById('iBride').value;
            document.getElementById('pGroom').innerText = document.getElementById('iGroom').value;
            document.getElementById('pDate').innerText = document.getElementById('iDate').value;
            document.getElementById('pVenue').innerText = document.getElementById('iVenue').value;
            document.getElementById('pAddress').innerText = document.getElementById('iAddress').value;
        };

        // 圖片切換
        const changeImg = (fileName) => {
            document.getElementById('pIllustration').src = fileName;
        };

        ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'].forEach(id => {
            document.getElementById(id).addEventListener('input', sync);
        });
    </script>
</body>
</html>
