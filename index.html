<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Mall | 婚展限定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .tab-active { color: #b08d57; border-top: 2px solid #b08d57; }
        .modal-overlay { background: rgba(0,0,0,0.5); display: none; }
        .sidebar-active { background-color: #f3f4f6; border-left: 4px solid #b08d57; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header id="front-header" class="bg-white p-4 text-center border-b sticky top-0 z-50">
        <p class="text-xs text-gray-500 mb-1">此網站只適用於展場下單</p>
        <h1 class="text-xl font-light tracking-widest text-cyan-600">☆ BESPOKE MALL</h1>
    </header>

    <main id="app-front" class="max-w-md mx-auto">
        <div class="flex border-b bg-white">
            <button class="flex-1 py-3 text-sm font-medium border-b-2 border-cyan-600">禮券</button>
            <button class="flex-1 py-3 text-sm font-medium text-gray-400">回禮</button>
        </div>

        <div class="p-2">
            <img src="https://via.placeholder.com/400x120?text=限時快閃優惠" class="w-full rounded shadow-sm">
        </div>

        <div class="p-4 space-y-6">
            <div class="flex gap-4 items-start bg-white p-2 rounded-lg shadow-sm">
                <img src="https://via.placeholder.com/100x150?text=GODIVA" class="w-24 h-32 object-cover rounded">
                <div class="flex-1">
                    <h3 class="text-sm font-bold leading-tight">【婚展限定優惠】GODIVA HK$50 禮券 (粉紅色封套版)</h3>
                    <p class="text-xs text-gray-400 mt-1">有效期至: 31/3/2027</p>
                    <p class="text-xs text-gray-400">最少需訂購: 10張</p>
                    <div class="mt-2 flex items-baseline gap-2">
                        <span class="text-red-500 font-bold">HK$ 41.00</span>
                        <span class="text-gray-300 text-xs line-through">HK$ 50.00</span>
                    </div>
                    <button onclick="addToCart('GODIVA 禮券', 41)" class="mt-2 bg-[#b08d57] text-white px-4 py-1 rounded-full text-xs">購買</button>
                </div>
            </div>

            <div class="flex gap-4 items-start bg-white p-2 rounded-lg shadow-sm">
                <img src="https://via.placeholder.com/100x150?text=Agnes+B" class="w-24 h-32 object-cover rounded">
                <div class="flex-1">
                    <h3 class="text-sm font-bold leading-tight">【婚展限定優惠】agnès b. CAFÉ 婚禮回禮禮盒</h3>
                    <p class="text-xs text-gray-400 mt-1">最少需訂購: 50盒</p>
                    <div class="mt-2">
                        <span class="text-red-500 font-bold">HK$ 32.00</span>
                    </div>
                    <button onclick="addToCart('Agnes B 禮盒', 32)" class="mt-2 bg-[#b08d57] text-white px-4 py-1 rounded-full text-xs">購買</button>
                </div>
            </div>
        </div>
    </main>

    <main id="app-backoffice" class="hidden min-h-screen bg-gray-100 p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">後台管理系統</h2>
            <button onclick="toggleApp('front')" class="text-sm text-blue-600 underline">返回前台</button>
        </div>
        
        <div class="bg-white rounded-lg shadow">
            <div class="p-4 border-b flex gap-4">
                <button onclick="renderOrders('all')" class="text-sm font-bold text-blue-600">全部訂單</button>
                <button onclick="renderOrders('pending')" class="text-sm text-gray-500">準備中</button>
                <button onclick="renderOrders('ready')" class="text-sm text-gray-500">可取貨</button>
            </div>
            <div id="order-list" class="divide-y">
                </div>
        </div>
    </main>

    <nav id="bottom-nav" class="fixed bottom-0 w-full bg-white border-t flex justify-around py-2 z-50">
        <button onclick="toggleApp('front')" class="flex flex-col items-center">
            <i class="fa-solid fa-utensils text-gray-400"></i>
            <span class="text-[10px]">點單</span>
        </button>
        <button onclick="showCartModal()" class="flex flex-col items-center relative">
            <div id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[8px] rounded-full px-1">0</div>
            <i class="fa-solid fa-shopping-bag text-gray-400"></i>
            <span class="text-[10px]">購物車</span>
        </button>
        <button onclick="toggleApp('backoffice')" class="flex flex-col items-center">
            <i class="fa-solid fa-receipt text-gray-400"></i>
            <span class="text-[10px]">取單(後台)</span>
        </button>
    </nav>

    <div id="cart-modal" class="modal-overlay fixed inset-0 z-[60] flex items-end">
        <div class="bg-white w-full rounded-t-2xl p-6 animate-slide-up">
            <h2 class="text-lg font-bold mb-4">確認訂單</h2>
            <div id="cart-items" class="space-y-3 mb-6">
                </div>
            <div class="border-t pt-4">
                <input type="text" id="user-phone" placeholder="輸入聯絡電話 (獲取號碼)" class="w-full p-3 border rounded mb-4">
                <button onclick="submitOrder()" class="w-full bg-[#b08d57] text-white py-4 rounded-xl font-bold">提交訂單</button>
                <button onclick="closeCartModal()" class="w-full py-2 text-gray-400 text-sm mt-2">取消</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let orders = JSON.parse(localStorage.getItem('bespoke_orders')) || [];

        // 切換前後台
        function toggleApp(view) {
            if (view === 'front') {
                document.getElementById('app-front').classList.remove('hidden');
                document.getElementById('front-header').classList.remove('hidden');
                document.getElementById('app-backoffice').classList.add('hidden');
            } else {
                document.getElementById('app-front').classList.add('hidden');
                document.getElementById('front-header').classList.add('hidden');
                document.getElementById('app-backoffice').classList.remove('hidden');
                renderOrders();
            }
        }

        // 加入購物車
        function addToCart(name, price) {
            cart.push({ name, price, id: Date.now() });
            updateCartUI();
            alert('已加入購物車');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function showCartModal() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">購物車是空的</p>';
            } else {
                let total = cart.reduce((sum, item) => sum + item.price, 0);
                container.innerHTML = cart.map(item => `
                    <div class="flex justify-between text-sm">
                        <span>${item.name}</span>
                        <span class="font-bold">HK$${item.price}</span>
                    </div>
                `).join('') + `<div class="border-t pt-2 flex justify-between font-bold text-red-600"><span>合計</span><span>HK$${total}</span></div>`;
            }
            document.getElementById('cart-modal').style.display = 'flex';
        }

        function closeCartModal() {
            document.getElementById('cart-modal').style.display = 'none';
        }

        // 提交訂單 (模擬 PinMe 流程)
        function submitOrder() {
            const phone = document.getElementById('user-phone').value;
            if (!phone) return alert('請填寫電話');

            const newOrder = {
                id: 'T' + Math.floor(1000 + Math.random() * 9000),
                items: [...cart],
                phone: phone,
                status: 'pending', // pending, ready, completed
                time: new Date().toLocaleTimeString()
            };

            orders.push(newOrder);
            localStorage.setItem('bespoke_orders', JSON.stringify(orders));
            
            alert(`下單成功！您的取票號碼是: ${newOrder.id}`);
            cart = [];
            updateCartUI();
            closeCartModal();
        }

        // 後台渲染訂單
        function renderOrders(filter = 'all') {
            const container = document.getElementById('order-list');
            let filtered = orders;
            if (filter === 'pending') filtered = orders.filter(o => o.status === 'pending');
            if (filter === 'ready') filtered = orders.filter(o => o.status === 'ready');

            container.innerHTML = filtered.map(order => `
                <div class="p-4 flex justify-between items-center bg-white mb-1">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-mono font-bold text-lg text-blue-600">${order.id}</span>
                            <span class="text-xs px-2 py-0.5 rounded-full ${order.status === 'pending' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">
                                ${order.status === 'pending' ? '準備中' : '可取貨'}
                            </span>
                        </div>
                        <p class="text-xs text-gray-500">${order.items.map(i => i.name).join(', ')}</p>
                        <p class="text-[10px] text-gray-400">${order.time} | ${order.phone}</p>
                    </div>
                    <div class="flex gap-2">
                        ${order.status === 'pending' ? 
                            `<button onclick="updateStatus('${order.id}', 'ready')" class="bg-green-500 text-white text-xs px-3 py-1 rounded">完成</button>` : 
                            `<button onclick="deleteOrder('${order.id}')" class="bg-gray-200 text-gray-600 text-xs px-3 py-1 rounded">結單</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function updateStatus(orderId, status) {
            orders = orders.map(o => o.id === orderId ? {...o, status} : o);
            localStorage.setItem('bespoke_orders', JSON.stringify(orders));
            renderOrders();
        }

        function deleteOrder(orderId) {
            orders = orders.filter(o => o.id !== orderId);
            localStorage.setItem('bespoke_orders', JSON.stringify(orders));
            renderOrders();
        }
    </script>
</body>
</html>
