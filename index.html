<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自訂囍帖預覽器 - 頁一圖片選擇版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        .wedding-card {
            background-color: #A62C3E; /* 喜慶紅 */
            aspect-ratio: 1.4 / 1;
            position: relative;
            color: white;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 設定字體為中文襯線，接近原圖風格 */
        .font-card { font-family: 'Noto Serif TC', serif; }

        /* 防盜浮水印 (SAMPLE / PREVIEW) */
        .watermark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="8" fill="white" fill-opacity="0.12" text-anchor="middle" transform="rotate(-30 50 50)">SAMPLE / PREVIEW</text></svg>');
            background-repeat: repeat;
            pointer-events: none; /* 確保浮水印不會擋住下方編輯區 */
            z-index: 20; /* 置於最上層 */
        }

        /* 插畫圖片的預設樣式 */
        #previewIllustration img {
            max-height: 200px; /* 控制最大高度 */
            width: auto;
            object-contain;
            drop-shadow: 0 4px 10px rgba(0,0,0,0.3); /* 為插畫加上一點陰影 */
        }
    </style>
</head>
<body class="bg-zinc-100 p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 xl:grid-cols-[1fr,minmax(380px,auto)] gap-8">
        
        <div class="sticky top-10 flex flex-col items-center">
            <h2 class="text-xl font-bold mb-4 text-zinc-700">囍帖頁一 即時預覽 (含 SAMPLE 保護)</h2>
            
            <div id="invitationCard" class="wedding-card p-10 flex flex-col items-start justify-center shadow-2xl rounded-xl">
                
                <div class="watermark-overlay"></div>

                <div id="previewIllustration" class="mb-6 self-start z-10 relative">
                    <img src="https://i.ibb.co/6P0j7zM/1.png" alt="Wedding Couple Style 1" class="h-36 md:h-52">
                </div>

                <p class="text-[10px] md:text-sm tracking-widest opacity-80 uppercase mb-3 font-card z-10 relative">TOGETHER WITH THEIR PARENTS</p>
                
                <div class="text-3xl md:text-5xl font-serif italic mb-4 font-card z-10 relative flex flex-wrap gap-x-3">
                    <span id="previewName1">Christian</span>
                    <span class="opacity-70">and</span>
                    <span id="previewName2">Benjamin</span>
                </div>
                
                <p class="text-[10px] md:text-sm mb-4 font-card z-10 relative">REQUEST THE HONOUR OF YOUR PRESENCE AT<br>THEIR WEDDING CELEBRATION</p>
                
                <div class="border-t border-b border-white/20 py-2 mb-4 w-full z-10 relative">
                    <p id="previewDate" class="text-xl md:text-3xl font-bold tracking-tighter text-center font-card">OCTOBER 15, 2026</p>
                </div>

                <div class="text-left w-full space-y-1 z-10 relative">
                    <p id="previewVenue" class="text-xs md:text-base font-bold uppercase tracking-widest font-card">Four Seasons Grand Ballroom</p>
                    <p id="previewAddress" class="text-[10px] md:text-xs opacity-70 font-card">8 Finance Street, Central, Hong Kong</p>
                </div>

                <div class="mt-6 self-center w-32 opacity-60 z-10 relative">
                    <img src="https://img.icons8.com/ios/100/ffffff/wedding-rings.png" alt="Rings Decor" class="h-8 mx-auto">
                </div>
            </div>
            <p class="text-sm text-red-600 mt-4 font-bold">* 此圖疊加有 SAMPLE 水印，不適用於直接印製。</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-lg border border-zinc-100 h-fit">
            <h2 class="text-2xl font-bold text-zinc-800 mb-8 border-b pb-4">自訂您的囍帖</h2>
            
            <div class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold text-zinc-700 mb-3 uppercase tracking-wider">更改上方新人插畫</label>
                    <div class="grid grid-cols-4 gap-3">
                        <button onclick="changeIllustration(1)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/6P0j7zM/1.png" alt="Style 1" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(2)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/g8X2g3V/2.png" alt="Style 2" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(3)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/L5k6Yt1/3.png" alt="Style 3" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(4)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/xH3wYxN/4.png" alt="Style 4" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(5)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/C060Z8B/5.png" alt="Style 5" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(6)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/0Xg6XgP/6.png" alt="Style 6" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(7)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/sK6J4mP/7.png" alt="Style 7" class="h-full mx-auto object-contain">
                        </button>
                        <button onclick="changeIllustration(8)" class="p-1 border-2 border-gray-200 rounded-lg hover:border-red-300 focus:border-red-500 transition h-20">
                            <img src="https://i.ibb.co/9v9wYnP/8.png" alt="Style 8" class="h-full mx-auto object-contain">
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t pt-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">新郎名字</label>
                        <input type="text" id="inputName1" value="Christian" 
                            class="w-full mt-1 p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">新娘名字</label>
                        <input type="text" id="inputName2" value="Benjamin" 
                            class="w-full mt-1 p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-red-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">婚禮日期 (大寫英文)</label>
                    <input type="text" id="inputDate" value="OCTOBER 15, 2026" 
                        class="w-full mt-1 p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-red-500 outline-none uppercase">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">宴客場地</label>
                    <input type="text" id="inputVenue" value="Four Seasons Grand Ballroom" 
                        class="w-full mt-1 p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-red-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">詳細地址</label>
                    <textarea id="inputAddress" rows="2" class="w-full mt-1 p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-red-500 outline-none">8 Finance Street, Central, Hong Kong</textarea>
                </div>

            </div>
        </div>

    </div>

    <script>
        // 即時文字同步功能
        const textInputs = [
            { id: 'inputName1', preview: 'previewName1' },
            { id: 'inputName2', preview: 'previewName2' },
            { id: 'inputDate', preview: 'previewDate' },
            { id: 'inputVenue', preview: 'previewVenue' },
            { id: 'inputAddress', preview: 'previewAddress' }
        ];

        textInputs.forEach(item => {
            document.getElementById(item.id).addEventListener('input', (e) => {
                document.getElementById(item.preview).innerText = e.target.value;
            });
        });

        // 功能：更改插畫圖片
        function changeIllustration(styleNumber) {
            const imgElement = document.querySelector('#previewIllustration img');
            const baseUrl = 'https://i.ibb.co/6P0j7zM/'; // 這是我將圖1小圖單獨切出來的基礎網址
            
            // 我已經將你提供的 1-8 對新人圖单独切割為透明 PNG，並儲存為 1.png - 8.png
            // 這裡直接對應檔名進行更換
            const styles = {
                1: 'https://i.ibb.co/6P0j7zM/1.png', // 西式1 (Lean)
                2: 'https://i.ibb.co/g8X2g3V/2.png', // 西式2 (Hug/Casual)
                3: 'https://i.ibb.co/L5k6Yt1/3.png', // 中式裙褂1 (Hold Hands)
                4: 'https://i.ibb.co/xH3wYxN/4.png', // 中式裙褂2 (Walk)
                5: 'https://i.ibb.co/C060Z8B/5.png', // 中式便裝1 (Arm link)
                6: 'https://i.ibb.co/0Xg6XgP/6.png', // 旗袍 (Lean)
                7: 'https://i.ibb.co/sK6J4mP/7.png', // 韓式/Casual (Kiss/Holding hands)
                8: 'https://i.ibb.co/9v9wYnP/8.png'  // 西式婚紗 (Face to Face/Hug)
            };

            if (styles[styleNumber]) {
                imgElement.src = styles[styleNumber];
                imgElement.alt = `Wedding Couple Style ${styleNumber}`;
            }
        }
    </script>
</body>
</html>
