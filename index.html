<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 - 分頁簡化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        /* 核心畫布設定 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg?v=12'); 
            background-color: #A62C3E; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            container-type: inline-size;
        }

        /* 字體定義 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }

        /* 姓名區域 */
        .bride-layer {
            position: absolute;
            top: 20%; left: 0; width: 50%; color: #FFFFFF; z-index: 10;
            display: flex; justify-content: center; transform: translateX(-1.2cqw);
        }
        .groom-layer {
            position: absolute;
            top: 41.5%; left: 0; width: 50%; color: #FFFFFF; z-index: 10;
            display: flex; justify-content: center; transform: translateX(6.2cqw);
        }
        .name-wrap { width: 80%; text-align: center; }
        #pBride, #pGroom { font-size: 5cqw; line-height: 1; white-space: nowrap; display: inline-block; }

        /* 日期地址 */
        .date-layer { position: absolute; top: 64%; left: 9%; width: 32%; text-align: center; color: #FFFFFF; font-size: 2cqw; letter-spacing: 0.25em; }
        .venue-layer { position: absolute; top: 72%; left: 5.5%; width: 39%; text-align: center; color: #FFFFFF; text-transform: uppercase; font-size: 1.6cqw; }
        .address-layer { position: absolute; top: 77%; left: 2%; width: 46%; text-align: center; color: #FFFFFF; text-transform: uppercase; font-size: 1.6cqw; line-height: 1.2; }

        /* 產品詳情面板 */
        .info-panel {
            position: absolute; top: 5%; right: 3%; width: 40cqw; height: 64cqw;
            background: rgba(255,255,255,0.15); padding: 2.2cqw; border-radius: 2cqw;
            display: none; z-index: 20; backdrop-filter: blur(7px);
            display: flex; flex-direction: column;
        }

        #pDetailTCContainer {
            flex: 1;
            overflow: hidden;
            width: 100%;
        }

        #pDetailTC {
            color: rgba(255,255,255,0.8);
            line-height: 1.2;
            word-break: break-all;
            white-space: pre-wrap;
            text-align: left;
        }

        /* 條碼樣式 - 縮小 1/2 */
        .barcode-area {
            margin-top: 0.75cqw;
            padding-top: 0.75cqw;
            border-top: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .barcode-img {
            width: 60%;
            height: 3cqw;
            background: linear-gradient(90deg, 
                #000 5%, transparent 5%, transparent 8%, 
                #000 8%, #000 12%, transparent 12%, 
                #000 15%, #000 16%, transparent 16%, 
                #000 20%, transparent 20%, transparent 25%,
                #000 25%, #000 28%, transparent 28%,
                #000 35%, #000 37%, transparent 37%,
                #000 45%, transparent 45%, transparent 48%,
                #000 48%, #000 55%, transparent 55%,
                #000 60%, #000 62%, transparent 62%,
                #000 70%, transparent 70%, transparent 75%,
                #000 75%, #000 85%, transparent 85%,
                #000 90%, #000 95%, transparent 95%
            );
            background-color: #fff;
            margin: 0 auto;
            border-radius: 1px;
        }
        .barcode-num {
            color: #fff;
            font-size: 0.8cqw;
            font-family: monospace;
            margin-top: 0.25cqw;
            letter-spacing: 0.15em;
        }

        /* 響應式佈局邏輯 */
        @media (min-width: 1280px) {
            .control-panel-scroll { max-height: 90vh; overflow-y: auto; }
            .control-panel-scroll::-webkit-scrollbar { width: 6px; }
            .control-panel-scroll::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
        }
        @media (max-width: 1279px) {
            .control-panel-scroll { max-height: none !important; overflow-y: visible !important; }
            .control-panel-scroll::-webkit-scrollbar { display: none; }
            .control-panel-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center relative">
            <div class="preview-canvas">
                <div class="bride-layer font-aniyah"><div class="name-wrap"><h1 id="pBride">Christian</h1></div></div>
                <div class="groom-layer font-aniyah"><div class="name-wrap"><h1 id="pGroom">Benjamin</h1></div></div>
                <div class="date-layer font-aloja"><span id="pDate" class="uppercase">October 15, 2026</span></div>
                <div class="venue-layer font-impact"><span id="pVenue">Four Seasons Grand Ballroom</span></div>
                <div class="address-layer font-impact"><span id="pAddress" class="opacity-90">8 Finance Street, Central, Hong Kong</span></div>
                
                <div id="pDetailPanel" class="info-panel shadow-2xl border border-zinc-200">
                    <img id="pDetailBrandImg" src="" class="w-full h-10 object-contain mb-2">
                    <h4 id="pDetailProdName" class="font-bold text-orange-500 mb-1 leading-tight text-[1.8cqw]"></h4>
                    <div id="pDetailTCContainer"><p id="pDetailTC"></p></div>
                    <div class="barcode-area">
                        <div class="barcode-img"></div>
                        <div class="barcode-num">8888888888</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-zinc-50 rounded-[2rem] shadow-2xl h-fit border border-zinc-100 overflow-hidden flex flex-col">
            
            <div class="flex gap-0 bg-zinc-100 border-b">
                <button onclick="mainSwitch('editor')" id="main-tab-editor" class="flex-1 py-5 text-xs font-bold transition-all bg-white text-zinc-900 border-r">
                    01 設計編輯器
                </button>
                <button onclick="mainSwitch('brands')" id="main-tab-brands" class="flex-1 py-5 text-xs font-bold transition-all text-zinc-400 hover:text-zinc-900">
                    02 禮券品牌
                </button>
            </div>

            <div class="control-panel-scroll p-8">
                
                <section id="section-editor" class="block">
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">新娘名字</label><input type="text" id="iBride" value="Christian" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 text-lg font-impact"></div>
                            <div><label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">新郎名字</label><input type="text" id="iGroom" value="Benjamin" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 text-lg font-impact"></div>
                        </div>
                        <div><label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">婚禮日期</label><input type="date" id="iDate" value="2026-10-15" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 text-red-900 font-sans font-bold"></div>
                        <div><label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">宴客場地</label><input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 uppercase text-xs font-impact"></div>
                        <div><label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">詳細地址</label><textarea id="iAddress" rows="2" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 uppercase text-[10px] font-impact">8 Finance Street, Central, Hong Kong</textarea></div>
                    </div>
                </section>

                <section id="section-brands" class="hidden">
                    <div id="brandGrid" class="grid grid-cols-4 gap-2 mb-8"></div>

                    <div id="productSection" class="hidden animate-fade-in border-t pt-6">
                        <h3 id="selectedBrandTitle" class="text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-3 pb-1">產品列表</h3>
                        <div id="productGrid" class="grid grid-cols-1 gap-2"></div>
                    </div>
                </section>

                <div class="mt-10">
                    <button class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg hover:bg-zinc-800 transition-all mb-4">
                        確認並保存設計
                    </button>
                    <a href="admin.html" class="block text-center text-zinc-400 text-[10px] font-bold uppercase tracking-tighter hover:text-zinc-900 transition-colors">
                        員工後台入口
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 條款資料庫
        const agnesBTC = `e-voucher Terms & Conditions:
The e-voucher entitles the holder a cash value of HK$50 spending in any of agnès b. / SPORT b. / agnès b. CAFÉ / agnès b. FLEURISTE / agnès b. DÉLICES shops (except SOGO & Horizon Outlet Store) in Hong Kong. For the corresponding shop address, please refer to https://www.agnesb.com.hk/storeLocator.
The e-voucher can only be used on or before the expiry date as shown on the e-voucher. Request for extension of validity of this e-voucher will not be entertained. Any unused amount of this e-voucher will be forfeited.
The e-voucher must be presented and can only be used once and will be collected upon redemption, after which it will become invalid. No replacement will be issued if the e-voucher is lost or damaged.
The e-voucher is non-transferable, non-resellable, and cannot be cancelled, or exchanged for cash, discounts, credit, or other products or services, and it cannot be used in conjunction with any other vouchers, discounts, privilege cards and other promotional offers.
Agnès b. HK Limited reserves the right to amend and withdraw any terms and conditions or terminate this offer without prior notice.
In case of any disputes relating to the e-voucher, the decision of Agnès b. HK Limited shall remain final and binding on all relevant parties.`;

        const godivaTC = `使用條款:
此GODIVA電子禮券有效期由購買日起計數，最少11個月
此禮券持有人可在本券有效期內於任何香港GODIVA專門店 (機場、免稅店、祟光銅鑼灣百貨公司及期間限定店除外) 換取同等價值貨品，逾期無效。
此電子禮券只可使用一次並以GODIVA的系統記錄為準。
影印本及螢幕截圖恕不接納。
此電子禮券不適用於電話、傳真或網上購物。
此電子禮券 (或其部分面值) 不能用以套取現金。持有人不得折回現金或以此電子禮券兌換金
此電子禮券不可與GODIVA VIP咭或其他推廣優惠一併使用。
如對此電子禮券有任何爭議，Godiva Chocolatier (Asia) Limited保留最終決定權。
分店地址︰https://www.godiva.com.hk/boutiques.html`;

        // 所有品牌混合列表
        const allBrands = [
            { name: "agnès b.", img: "https://agnesb-hk-static.baozun.com/abtw/1-2-0/static/img/logo_agnesb_white.6afb164.png" },
            { name: "Godiva", img: "https://www.godiva.com.hk/media/logo/default/logo_full_2025_v3.png" }
        ];

        // 預設產品
        const defaultProducts = [
            { brandName: "agnès b.", product: "$50 心意禮券", tc: agnesBTC },
            { brandName: "agnès b.", product: "$100 心意禮券", tc: agnesBTC.replace("HK$50", "HK$100") },
            { brandName: "Godiva", product: "HK$50 禮券", tc: godivaTC },
            { brandName: "Godiva", product: "HK$100 禮券", tc: godivaTC }
        ];

        // 主要分頁切換邏輯
        function mainSwitch(target) {
            const editorSec = document.getElementById('section-editor');
            const brandsSec = document.getElementById('section-brands');
            const tabEditor = document.getElementById('main-tab-editor');
            const tabBrands = document.getElementById('main-tab-brands');

            if (target === 'editor') {
                editorSec.classList.replace('hidden', 'block');
                brandsSec.classList.replace('block', 'hidden');
                tabEditor.className = "flex-1 py-5 text-xs font-bold transition-all bg-white text-zinc-900 border-r";
                tabBrands.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-400 hover:text-zinc-900";
            } else {
                brandsSec.classList.replace('hidden', 'block');
                editorSec.classList.replace('block', 'hidden');
                tabBrands.className = "flex-1 py-5 text-xs font-bold transition-all bg-white text-zinc-900 border-l";
                tabEditor.className = "flex-1 py-5 text-xs font-bold transition-all text-zinc-400 hover:text-zinc-900";
                renderBrands(); // 切換時即刻渲染
            }
        }

        // 渲染品牌（合併官方與自定義）
        function renderBrands() {
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = '';
            
            // 合併本地儲存的自定義品牌
            const customBrands = JSON.parse(localStorage.getItem('wedding_brands')) || [];
            const displayList = [...allBrands, ...customBrands];

            if (displayList.length === 0) {
                grid.innerHTML = '<p class="col-span-4 text-[9px] text-zinc-400 text-center py-4 italic">暫無品牌資料</p>';
                return;
            }

            displayList.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = "aspect-square border-2 border-zinc-50 bg-zinc-200 p-2 hover:border-zinc-900 rounded-xl transition-all flex items-center justify-center overflow-hidden shadow-sm";
                btn.onclick = () => showProducts(brand.name, brand.img);
                btn.innerHTML = `<img src="${brand.img}" class="max-h-full max-w-full object-contain">`;
                grid.appendChild(btn);
            });
        }

        function showProducts(bName, bImg) {
            const section = document.getElementById('productSection');
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('selectedBrandTitle');
            section.classList.remove('hidden');
            title.innerText = `${bName} 產品選擇`;
            grid.innerHTML = '';
            
            const customProducts = JSON.parse(localStorage.getItem('wedding_products')) || [];
            const allProds = [...defaultProducts, ...customProducts];
            
            allProds.filter(p => p.brandName === bName).forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 border border-zinc-100 rounded-xl hover:bg-zinc-900 hover:text-white text-xs font-bold transition-all shadow-sm";
                btn.innerText = p.product;
                btn.onclick = () => applySelection(bImg, p.product, p.tc);
                grid.appendChild(btn);
            });
        }

        function applySelection(img, name, tc) {
            const panel = document.getElementById('pDetailPanel');
            panel.style.display = 'flex';
            document.getElementById('pDetailBrandImg').src = img;
            document.getElementById('pDetailProdName').innerText = name;
            const tcEl = document.getElementById('pDetailTC');
            tcEl.innerText = tc;
            setTimeout(() => { autoScaleText(tcEl, 1.2, 0.4); }, 10);
        }

        // 文字自動縮放
        function autoScaleText(element, maxFontSize = 5, minFontSize = 1) {
            const parent = element.parentElement;
            let fontSizeCqw = maxFontSize;
            element.style.fontSize = fontSizeCqw + 'cqw';
            while ((element.scrollHeight > parent.offsetHeight || element.scrollWidth > parent.offsetWidth) && fontSizeCqw > minFontSize) {
                fontSizeCqw -= 0.05;
                element.style.fontSize = fontSizeCqw + 'cqw';
            }
        }

        // 同步輸入資料
        const sync = () => {
            document.getElementById('pBride').innerText = document.getElementById('iBride').value;
            document.getElementById('pGroom').innerText = document.getElementById('iGroom').value;
            const dateVal = document.getElementById('iDate').value;
            if (dateVal) {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('pDate').innerText = new Date(dateVal).toLocaleDateString('en-US', options);
            }
            document.getElementById('pVenue').innerText = document.getElementById('iVenue').value;
            document.getElementById('pAddress').innerText = document.getElementById('iAddress').value;
            autoScaleText(document.getElementById('pBride'), 5, 1);
            autoScaleText(document.getElementById('pGroom'), 5, 1);
        };

        ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'].forEach(id => {
            document.getElementById(id).addEventListener('input', sync);
        });

        window.onload = () => {
            sync();
        };
    </script>
</body>
</html>
