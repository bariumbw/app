<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | Expo Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b08d57; --stone: #57534e; }
        body { font-family: -apple-system, "PingFang HK", "Noto Sans TC", sans-serif; background-color: #fdfcfb; overflow: hidden; }
        .sidebar-item.active { background: #fff; border-left: 4px solid var(--gold); color: #000; font-weight: bold; }
        .bottom-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; }
        .bottom-sheet.active { display: flex; }
        .sheet-content { background: white; width: 100%; border-radius: 24px 24px 0 0; max-height: 94vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
        .active-tab { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: flex; }
        input, textarea, select { -webkit-appearance: none; outline: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="admin-only bg-stone-900 text-white text-[10px] py-2 px-6 justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-gear animate-spin-slow"></i>
            <span class="tracking-widest">系統管理員模式</span>
        </div>
        <button onclick="openAdminEditor()" class="bg-white text-stone-900 px-3 py-1 rounded font-black uppercase text-[9px]">開啟產品後台</button>
    </div>

    <header class="bg-white border-b z-10 shadow-sm">
        <div class="text-[10px] text-center py-2 bg-stone-50 text-stone-400">2026 婚展訂單管理系統</div>
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex flex-col">
                <span class="text-sm font-bold tracking-[0.2em]">BESPOKE MALL</span>
                <span class="text-[8px] text-stone-300 uppercase">Bridal Digital Concierge</span>
            </div>
            <button onclick="adminLogin()" class="text-stone-200 p-2"><i class="fa-solid fa-circle-user text-xl"></i></button>
        </div>
        <div class="flex text-sm text-center border-t">
            <div id="tab-v" class="flex-1 py-3 active-tab cursor-pointer" onclick="switchMainCat('v')">禮券 (Voucher)</div>
            <div id="tab-g" class="flex-1 py-3 text-stone-300 cursor-pointer" onclick="switchMainCat('g')">回禮 (Gift)</div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="brand-menu" class="w-24 bg-stone-50 overflow-y-auto border-r text-[11px] text-stone-500"></aside>
        <section id="product-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-40"></section>
        <section id="record-page" class="hidden flex-1 overflow-y-auto bg-stone-50 p-6 pb-40">
            <h2 class="text-xl font-bold mb-6">我的取單紀錄</h2>
            <div id="order-flow" class="space-y-4"></div>
        </section>
    </main>

    <nav class="bg-white border-t flex justify-around py-3 safe-area-bottom z-50">
        <button onclick="showMainPage('shop')" id="nav-s" class="flex flex-col items-center gap-1 text-gold">
            <i class="fa-solid fa-store text-xl"></i><span class="text-[10px] font-bold">產品目錄</span>
        </button>
        <button onclick="showMainPage('record')" id="nav-r" class="flex flex-col items-center gap-1 text-stone-300">
            <i class="fa-solid fa-ticket text-xl"></i><span class="text-[10px] font-bold">取單號碼</span>
        </button>
    </nav>

    <div id="cart-bar" class="fixed bottom-24 left-4 right-4 h-16 bg-white border rounded-2xl flex items-center justify-between px-4 shadow-2xl z-40 hidden">
        <div class="flex flex-col">
            <span class="text-[9px] text-stone-400">總金額預算</span>
            <span id="cart-total" class="text-lg font-black">HK$0</span>
        </div>
        <button onclick="openSheet('sheet-confirm')" class="bg-[#b08d57] text-white px-8 py-3 rounded-xl text-sm font-bold">確認下單</button>
    </div>

    <div id="admin-editor-sheet" class="bottom-sheet" onclick="closeSheet(this)">
        <div class="sheet-content" onclick="event.stopPropagation()">
            <div class="sticky top-0 bg-white z-20 border-b px-6 py-5 flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-black tracking-tight">後台管理中心</h2>
                    <p class="text-[9px] text-stone-400 uppercase tracking-widest">Product & Inventory Control</p>
                </div>
                <button onclick="closeSheet(document.getElementById('admin-editor-sheet'))" class="w-10 h-10 flex items-center justify-center bg-stone-50 rounded-full text-stone-400">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="p-6 space-y-8 pb-32">
                <div>
                    <label class="text-[10px] font-bold text-stone-400 uppercase mb-3 block">快速選擇產品</label>
                    <div id="admin-p-list" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide"></div>
                </div>
                
                <div class="bg-stone-50 p-6 rounded-[32px] space-y-5 border border-stone-100">
                    <div class="flex justify-between items-center border-b border-stone-200 pb-4">
                        <span class="text-xs font-bold">編輯產品細節</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold">啟用產品</span>
                            <input type="checkbox" id="e-active" class="w-6 h-6 accent-stone-900">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="group">
                            <label class="text-[9px] text-stone-400 ml-2">產品名稱</label>
                            <input type="text" id="e-name" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm font-bold">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] text-stone-400 ml-2">主分類</label>
                                <select id="e-cat" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm bg-white">
                                    <option value="v">禮券 (Voucher)</option>
                                    <option value="g">回禮 (Gift)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[9px] text-stone-400 ml-2">品牌</label>
                                <input type="text" id="e-brand" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm">
                            </div>
                        </div>

                        <div>
                            <label class="text-[9px] text-stone-400 ml-2">圖片網址 (URL)</label>
                            <input type="text" id="e-img" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm font-mono">
                        </div>
                        
                        <div>
                            <label class="text-[9px] text-stone-400 ml-2">產品說明</label>
                            <textarea id="e-desc" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm h-24"></textarea>
                        </div>
                        
                        <div>
                            <label class="text-[9px] text-stone-400 ml-2">條款及細則 (T&C)</label>
                            <textarea id="e-tc" class="w-full p-4 rounded-2xl border-none shadow-sm text-[10px] h-20 text-stone-500"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] text-stone-400 ml-2">有效日期</label>
                                <input type="text" id="e-expiry" placeholder="YYYY-MM-DD" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm">
                            </div>
                            <div>
                                <label class="text-[9px] text-stone-400 ml-2">展場特惠價</label>
                                <input type="number" id="e-price" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm font-bold text-gold">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] text-stone-400 ml-2">最低起訂量</label>
                                <input type="number" id="e-min" class="w-full p-4 rounded-2xl border-none shadow-sm text-sm">
                            </div>
                            <div>
                                <label class="text-[9px] text-stone-400 ml-2">支付方式</label>
                                <input type="text" id="e-payment" placeholder="Visa, PayMe..." class="w-full p-4 rounded-2xl border-none shadow-sm text-sm">
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-6">
                        <button onclick="saveProductData()" class="flex-1 bg-stone-900 text-white py-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-transform">儲存更改內容</button>
                        <button onclick="createNewProduct()" class="px-6 border border-stone-200 rounded-2xl text-[10px] font-bold text-stone-400 bg-white">新增</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sheet-detail" class="bottom-sheet" onclick="closeSheet(this)">
        <div class="sheet-content p-8" onclick="event.stopPropagation()">
            <div id="p-img" class="w-full h-56 bg-contain bg-no-repeat bg-center mb-6"></div>
            <h2 id="p-name" class="text-2xl font-black mb-1"></h2>
            <div id="p-price" class="text-gold font-bold text-xl mb-4"></div>
            <p id="p-desc" class="text-xs text-stone-400 leading-relaxed mb-6"></p>
            <div class="p-5 bg-stone-50 rounded-2xl mb-6 flex justify-between items-center">
                <span class="font-bold text-sm">數量</span>
                <div class="flex items-center gap-6">
                    <button onclick="adjQty(-10)" class="w-10 h-10 bg-white border rounded-xl">-</button>
                    <span id="p-qty" class="font-black text-xl w-12 text-center"></span>
                    <button onclick="adjQty(10)" class="w-10 h-10 bg-white border rounded-xl text-gold font-bold">+</button>
                </div>
            </div>
            <button onclick="addToCartFinal()" class="w-full py-5 bg-[#b08d57] text-white rounded-2xl font-bold">加入購物清單</button>
        </div>
    </div>

    <div id="sheet-confirm" class="bottom-sheet" onclick="closeSheet(this)">
        <div class="sheet-content p-10" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-8 text-center">最後一步</h3>
            <div class="bg-stone-50 p-6 rounded-3xl mb-8">
                <label class="text-[10px] text-stone-400 uppercase block mb-2 font-bold tracking-widest">聯絡電話</label>
                <input type="tel" id="u-tel" placeholder="輸入 8 位電話號碼" class="w-full bg-transparent text-2xl font-black outline-none border-b border-stone-200 pb-2">
            </div>
            <button onclick="submitFinalOrder()" class="w-full py-5 bg-black text-white rounded-2xl font-bold">提交訂單並獲取號碼</button>
        </div>
    </div>

    <div id="sheet-success" class="bottom-sheet" style="z-index: 200;">
        <div class="sheet-content p-12 text-center flex flex-col items-center">
            <div class="text-green-500 text-6xl mb-6"><i class="fa-solid fa-circle-check"></i></div>
            <h2 id="final-oid" class="text-7xl font-mono font-black tracking-tighter mb-8"></h2>
            <p class="text-stone-400 text-sm mb-10 leading-relaxed">下單完成！<br>請向工作人員出示此代碼。</p>
            <button onclick="closeSuccess()" class="w-full py-4 bg-stone-100 text-stone-600 rounded-2xl font-bold">回到取單頁</button>
        </div>
    </div>

    <script>
        const defaultData = [
            { id: 1, active: true, cat: 'v', bName: 'agnès b.', name: 'agnès b. CAFÉ $50 禮券', price: 37, min: 100, expiry: '2027-03-31', img: 'https://via.placeholder.com/300', desc: '適用於全港 agnès b. CAFÉ。', tc: '不設退換。', payment: 'Visa, PayMe' }
        ];

        let productsData = JSON.parse(localStorage.getItem('bespoke_expo_db')) || defaultData;
        let cart = null, orders = [], isAdmin = false, currentCat = 'v', editingId = null;

        function init() {
            const activeProducts = productsData.filter(p => p.active && p.cat === currentCat);
            const brands = ['all', ...new Set(activeProducts.map(p => p.bName || p.brand))];
            document.getElementById('brand-menu').innerHTML = brands.map(b => `
                <div onclick="filterBrand(this, '${b}')" class="sidebar-item ${b==='all'?'active':''} p-4 text-center py-6 capitalize">
                    ${b === 'all' ? '所有' : b}
                </div>
            `).join('');
            renderProducts('all', currentCat);
        }

        function renderProducts(brand, cat) {
            const list = document.getElementById('product-list');
            const filtered = productsData.filter(p => p.active && (brand === 'all' || (p.bName || p.brand) === brand) && p.cat === cat);
            list.innerHTML = filtered.length ? filtered.map(p => `
                <div class="flex gap-4 border-b border-stone-100 pb-5 items-center">
                    <div class="w-16 h-16 bg-white border rounded-xl bg-center bg-contain bg-no-repeat shadow-sm" style="background-image: url('${p.img}')"></div>
                    <div class="flex-1">
                        <div class="text-[9px] text-stone-400 uppercase font-bold">${p.bName}</div>
                        <h3 class="text-sm font-bold text-stone-800 leading-tight">${p.name}</h3>
                        <div class="text-gold font-bold mt-1 text-xs">HK$ ${p.price}</div>
                    </div>
                    <button onclick="openProductDetail(${p.id})" class="bg-[#b08d57] text-white w-9 h-9 rounded-full shadow-lg flex items-center justify-center">+</button>
                </div>
            `).join('') : '<p class="text-center py-20 text-stone-300 italic">暫無產品</p>';
        }

        // 後台邏輯
        function adminLogin() {
            if(prompt("Admin Password") === "5963") {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                alert("後台權限已開啟");
            }
        }

        function openAdminEditor() {
            renderAdminPList();
            if(productsData.length > 0) loadEditForm(productsData[0].id);
            openSheet('admin-editor-sheet');
        }

        function renderAdminPList() {
            const container = document.getElementById('admin-p-list');
            container.innerHTML = productsData.map(p => `
                <div onclick="loadEditForm(${p.id})" class="flex-none w-24 p-3 bg-white rounded-2xl border-2 ${editingId === p.id ? 'border-stone-900 shadow-lg' : 'border-stone-50'} text-center transition-all">
                    <div class="w-full h-12 bg-contain bg-no-repeat bg-center mb-2" style="background-image:url('${p.img}')"></div>
                    <div class="text-[8px] font-bold truncate">${p.name}</div>
                    <div class="text-[7px] ${p.active?'text-green-500':'text-red-400'}">${p.active?'● ONLINE':'○ HIDDEN'}</div>
                </div>
            `).join('');
        }

        function loadEditForm(id) {
            editingId = id;
            const p = productsData.find(item => item.id === id);
            document.getElementById('e-active').checked = p.active !== false;
            document.getElementById('e-name').value = p.name;
            document.getElementById('e-cat').value = p.cat;
            document.getElementById('e-brand').value = p.bName || p.brand || '';
            document.getElementById('e-img').value = p.img;
            document.getElementById('e-desc').value = p.desc || '';
            document.getElementById('e-tc').value = p.tc || '';
            document.getElementById('e-expiry').value = p.expiry;
            document.getElementById('e-price').value = p.price;
            document.getElementById('e-min').value = p.min;
            document.getElementById('e-payment').value = p.payment || '';
            renderAdminPList();
        }

        function saveProductData() {
            const idx = productsData.findIndex(p => p.id === editingId);
            productsData[idx] = {
                ...productsData[idx],
                active: document.getElementById('e-active').checked,
                name: document.getElementById('e-name').value,
                cat: document.getElementById('e-cat').value,
                bName: document.getElementById('e-brand').value,
                img: document.getElementById('e-img').value,
                desc: document.getElementById('e-desc').value,
                tc: document.getElementById('e-tc').value,
                expiry: document.getElementById('e-expiry').value,
                price: parseFloat(document.getElementById('e-price').value),
                min: parseInt(document.getElementById('e-min').value),
                payment: document.getElementById('e-payment').value
            };
            localStorage.setItem('bespoke_expo_db', JSON.stringify(productsData));
            alert("✅ 產品資料已成功存儲");
            init();
            renderAdminPList();
        }

        function createNewProduct() {
            const newId = Date.now();
            productsData.push({ id: newId, active: true, name: '新產品', cat: 'v', price: 0, min: 1, expiry: '2026-12-31', img: '', bName: 'New Brand' });
            loadEditForm(newId);
        }

        // 訂單邏輯
        function openProductDetail(id) {
            cart = productsData.find(p => p.id === id);
            cart.qty = cart.min;
            document.getElementById('p-name').innerText = cart.name;
            document.getElementById('p-price').innerText = `HK$ ${cart.price}`;
            document.getElementById('p-desc').innerText = cart.desc || '';
            document.getElementById('p-img').style.backgroundImage = `url('${cart.img}')`;
            document.getElementById('p-qty').innerText = cart.qty;
            openSheet('sheet-detail');
        }
        function adjQty(v) { cart.qty = Math.max(cart.min, cart.qty + v); document.getElementById('p-qty').innerText = cart.qty; }
        function addToCartFinal() {
            document.getElementById('cart-total').innerText = `HK$ ${(cart.price * cart.qty).toLocaleString()}`;
            document.getElementById('cart-bar').classList.remove('hidden');
            closeSheet(document.getElementById('sheet-detail'));
        }
        function submitFinalOrder() {
            if(!document.getElementById('u-tel').value) return alert("請填寫聯絡電話");
            const oid = 'T' + Math.floor(1000 + Math.random()*9000);
            orders.unshift({ id: oid, ...cart, total: cart.price * cart.qty });
            document.getElementById('final-oid').innerText = oid;
            openSheet('sheet-success');
        }
        function renderOrderRecords() {
            const flow = document.getElementById('order-flow');
            flow.innerHTML = orders.length ? orders.map(o => `
                <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm relative">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-4xl font-mono font-black tracking-tighter">${o.id}</span>
                        <span class="text-[10px] bg-stone-900 text-white px-3 py-1 rounded-full uppercase">Processing</span>
                    </div>
                    <div class="text-xs font-bold text-stone-600">${o.name} x ${o.qty}</div>
                    <div class="text-[10px] text-stone-400">HK$${o.total.toLocaleString()}</div>
                    ${isAdmin ? `<button onclick="deleteOrder('${o.id}')" class="mt-4 w-full py-2 bg-red-50 text-red-500 rounded-xl text-[10px] font-bold">管理員核銷訂單</button>` : ''}
                </div>
            `).join('') : '<p class="text-center py-20 text-stone-300 italic">暫無下單紀錄</p>';
        }
        function deleteOrder(id) { orders = orders.filter(o => o.id !== id); renderOrderRecords(); }
        function showMainPage(p) {
            const isShop = p === 'shop';
            document.getElementById('product-list').parentElement.classList.toggle('hidden', !isShop);
            document.getElementById('record-page').classList.toggle('hidden', isShop);
            document.getElementById('nav-s').className = isShop ? 'flex flex-col items-center gap-1 text-gold' : 'flex flex-col items-center gap-1 text-stone-300';
            document.getElementById('nav-r').className = !isShop ? 'flex flex-col items-center gap-1 text-gold' : 'flex flex-col items-center gap-1 text-stone-300';
            if(!isShop) renderOrderRecords();
        }
        function switchMainCat(c) {
            currentCat = c;
            document.getElementById('tab-v').className = c==='v'?'flex-1 py-3 active-tab cursor-pointer':'flex-1 py-3 text-stone-300 cursor-pointer';
            document.getElementById('tab-g').className = c==='g'?'flex-1 py-3 active-tab cursor-pointer':'flex-1 py-3 text-stone-300 cursor-pointer';
            init();
        }
        function filterBrand(el, b) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderProducts(b, currentCat);
        }
        function openSheet(id) { document.getElementById(id).classList.add('active'); }
        function closeSheet(el) { el.classList.remove('active'); }
        function closeSuccess() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('cart-bar').classList.add('hidden');
            showMainPage('record');
        }
        window.onload = init;
    </script>
</body>
</html>
