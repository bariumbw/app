<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 - 字體縮小與大間距版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        /* 1. 核心畫布：2400 x 1700 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg?v=10'); 
            background-color: #A62C3E; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        /* 字體定義 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }

        /* 姓名區域：精確像素控制 */
        .name-layer {
            position: absolute;
            top: 16%; /* 向上微調以容納 3 行間距 */
            left: 0; 
            width: 50%; 
            color: #FFFFFF;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 新娘名字：左移並設定精確字體大小 */
        .bride-wrap {
            transform: translateX(0px);
            font-size: 50px; /* 這裡直接控制縮小後的大小 */
            line-height: 1;
        }

        /* 新郎名字：右移、縮小字體、並隔開 3 行 (約 5em) */
        .groom-wrap {
            transform: translateX(60px);
            font-size: 50px; 
            line-height: 1;
            margin-top: 2em; /* 這裡產生約 3 行的空白間距 */
        }

        /* 2. 元素定位 */
        .voucher-layer {
            position: absolute;
            top: 0%; left: 65%; width: 16%; z-index: 5;
            display: flex; justify-content: center;
        }
        .voucher-layer img { width: 100%; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }

        .date-layer {
            position: absolute; top: 66%; left: 9%; width: 32%;
            text-align: center; color: #FFFFFF;
        }
        .venue-layer {
            position: absolute; top: 72%; left: 5.5%; width: 39%;
            text-align: center; color: #FFFFFF; text-transform: uppercase;
        }
        .address-layer {
            position: absolute; top: 77%; left: 2%; width: 46%;
            text-align: center; color: #FFFFFF; text-transform: uppercase;
        }

        .watermark {
            position: absolute; inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="5" fill="white" fill-opacity="0.1" text-anchor="middle" transform="rotate(-30 50 50)">DESIGN PREVIEW ONLY</text></svg>');
            z-index: 50; pointer-events: none;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center">
            <div class="preview-canvas">
                <div class="watermark"></div>

                <div class="voucher-layer">
                    <img id="pVoucher" src="1.png" alt="Style">
                </div>

                <div class="name-layer font-aniyah">
                    <div class="bride-wrap">
                        <h1 id="pBride">Christian</h1>
                    </div>
                    <div class="groom-wrap">
                        <h1 id="pGroom">Benjamin</h1>
                    </div>
                </div>

                <div class="date-layer font-aloja">
                    <span id="pDate" class="text-lg md:text-[18px] uppercase tracking-[0.25em]">October 15, 2026</span>
                </div>

                <div class="venue-layer font-impact">
                    <span id="pVenue" class="text-[10px] md:text-[15px]">Four Seasons Grand Ballroom</span>
                </div>

                <div class="address-layer font-impact tracking-widest leading-snug">
                    <span id="pAddress" class="text-[10px] md:text-[15px] opacity-90">8 Finance Street, Central, Hong Kong</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl h-fit border border-zinc-100 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 custom-scroll overflow-y-auto">
                <section class="mb-10">
                    <h2 class="text-xl font-bold text-zinc-800 mb-6 flex items-center font-im-fell tracking-tight">
                        <span class="w-8 h-8 bg-zinc-900 text-white rounded-full flex items-center justify-center text-sm mr-3 font-sans">01</span>
                        設計編輯器
                    </h2>
                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">新娘名字</label>
                                <input type="text" id="iBride" value="Christian" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-aniyah text-2xl focus:border-zinc-900 transition-all">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">新郎名字</label>
                                <input type="text" id="iGroom" value="Benjamin" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-aniyah text-2xl focus:border-zinc-900 transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">婚禮日期</label>
                            <input type="text" id="iDate" value="October 15, 2026" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-aloja text-xl text-red-900 focus:border-zinc-900 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">宴客場地</label>
                            <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-impact text-lg uppercase focus:border-zinc-900 transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">詳細地址</label>
                            <textarea id="iAddress" rows="2" class="w-full p-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-impact text-sm uppercase focus:border-zinc-900 transition-all">8 Finance Street, Central, Hong Kong</textarea>
                        </div>
                    </div>
                </section>

                <hr class="mb-10 border-zinc-100">

                <section>
                    <h2 class="text-xl font-bold text-zinc-800 mb-6 flex items-center font-im-fell tracking-tight">
                        <span class="w-8 h-8 bg-zinc-900 text-white rounded-full flex items-center justify-center text-sm mr-3 font-sans">02</span>
                        禮券選擇
                    </h2>
                    <div class="grid grid-cols-4 gap-2 border p-3 rounded-2xl bg-zinc-50">
                        <button onclick="changeVoucher('1.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="1.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('2.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="2.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('3.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="3.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('4.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="4.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('5.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="5.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('6.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="6.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('7.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="7.png" class="h-8 mx-auto"></button>
                        <button onclick="changeVoucher('8.png')" class="border bg-white p-1 hover:border-zinc-900 rounded-lg transition-all"><img src="8.png" class="h-8 mx-auto"></button>
                    </div>
                </section>

                <button class="w-full mt-10 py-4 bg-zinc-900 text-white rounded-xl font-bold tracking-[0.2em] hover:bg-zinc-800 transition shadow-lg uppercase text-sm">
                    確認並保存設計
                </button>
            </div>
        </div>
    </div>

    <script>
        const changeVoucher = (src) => { document.getElementById('pVoucher').src = src; };
        const sync = () => {
            document.getElementById('pBride').innerText = document.getElementById('iBride').value;
            document.getElementById('pGroom').innerText = document.getElementById('iGroom').value;
            document.getElementById('pDate').innerText = document.getElementById('iDate').value;
            document.getElementById('pVenue').innerText = document.getElementById('iVenue').value;
            document.getElementById('pAddress').innerText = document.getElementById('iAddress').value;
        };
        ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'].forEach(id => {
            document.getElementById(id).addEventListener('input', sync);
        });
    </script>
</body>
</html>
