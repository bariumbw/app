<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | Expo Sync System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b08d57; --dark: #1a1a1a; }
        body { font-family: "PingFang HK", sans-serif; background-color: #fff; overflow: hidden; }
        .sidebar-item { cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; color: #666; }
        .sidebar-item.active { background-color: #fff; border-left-color: var(--gold); font-weight: bold; color: var(--dark); }
        .active-tab { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }
        .bottom-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; }
        .bottom-sheet.active { display: flex; }
        .sheet-content { background: white; width: 100%; border-radius: 24px 24px 0 0; max-height: 90vh; overflow-y: auto; padding-bottom: 20px; }
        .btn-gold { background-color: var(--gold); color: white; }
        .price-text { color: #d63031; font-weight: 700; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="flex-none bg-white border-b">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex flex-col">
                <span class="text-sm font-bold tracking-widest text-gray-800">BESPOKE MALL</span>
                <span class="text-[9px] text-gray-400 uppercase">Shopify Data Synced</span>
            </div>
            <button onclick="adminAuth()" class="text-gray-300"><i class="fa-solid fa-user-shield text-xl"></i></button>
        </div>
        <div class="flex text-sm text-center">
            <div id="tab-v" class="flex-1 py-3 active-tab cursor-pointer" onclick="switchCat('v')">禮券</div>
            <div id="tab-g" class="flex-1 py-3 text-gray-300 cursor-pointer" onclick="switchCat('g')">回禮</div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="brand-menu" class="w-24 bg-gray-50 overflow-y-auto border-r text-[11px] flex-none">
            </aside>

        <section id="product-grid" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
            </section>
    </main>

    <nav class="flex-none bg-white border-t flex justify-around py-3 pb-6 shadow-lg z-50">
        <button onclick="showPage('order')" class="flex flex-col items-center gap-1 text-gold">
            <i class="fa-solid fa-bag-shopping text-xl"></i><span class="text-[10px]">選購</span>
        </button>
        <button onclick="showPage('receipt')" class="flex flex-col items-center gap-1 text-gray-300">
            <i class="fa-solid fa-receipt text-xl"></i><span class="text-[10px]">取單</span>
        </button>
    </nav>

    <div id="detail-sheet" class="bottom-sheet" onclick="this.classList.remove('active')">
        <div class="sheet-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto my-4"></div>
            <div id="detail-img" class="w-full h-64 bg-center bg-cover bg-gray-100"></div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-2">
                    <h2 id="detail-name" class="text-xl font-bold">產品名稱</h2>
                    <span id="detail-price" class="text-gold font-bold text-lg"></span>
                </div>
                <div id="detail-expiry" class="text-[10px] text-red-500 mb-4 font-bold"></div>
                <p id="detail-desc" class="text-xs text-gray-400 mb-6 leading-relaxed"></p>
                
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl mb-6">
                    <span class="text-sm font-bold">訂購數量</span>
                    <div class="flex items-center gap-4">
                        <button onclick="updateQty(-10)" class="w-8 h-8 bg-white border rounded-lg">-</button>
                        <span id="display-qty" class="font-bold">10</span>
                        <button onclick="updateQty(10)" class="w-8 h-8 bg-white border rounded-lg">+</button>
                    </div>
                </div>
                <button onclick="addToCart()" class="w-full py-4 btn-gold rounded-xl font-bold">加入購物車</button>
            </div>
        </div>
    </div>

    <script>
        // 【這裡就是對接 Shopify 的數據中心】
        // 您可以將 Shopify 導出的 CSV 內容轉換成以下格式
        const productsData = [
            {
                id: 1,
                brand: "agnes",
                brandName: "agnès b.",
                category: "v",
                name: "agnès b. CAFÉ $50 禮券",
                price: 37,
                minQty: 100,
                expiry: "2027-03-31",
                desc: "適用於全港 agnès b. CAFÉ 及 LA LOGGIA bis。展場限定優惠價格。",
                img: "https://via.placeholder.com/400x400?text=Agnes+b" // 替換成 Shopify 上的 Image Src
            },
            {
                id: 2,
                brand: "godiva",
                brandName: "GODIVA",
                category: "v",
                name: "GODIVA $50 禮券 (粉紅)",
                price: 41,
                minQty: 10,
                expiry: "2026-12-31",
                desc: "GODIVA 婚慶限定粉紅色包裝，送禮大方體面。",
                img: "https://via.placeholder.com/400x400?text=GODIVA"
            }
            // 更多產品...
        ];

        let currentProduct = null;
        let selectedQty = 0;

        // 初始化：渲染品牌菜單
        function init() {
            const brands = ["all", ...new Set(productsData.map(p => p.brand))];
            const menu = document.getElementById('brand-menu');
            menu.innerHTML = brands.map(b => `
                <div onclick="filterProducts(this, '${b}')" class="sidebar-item ${b==='all'?'active':''} p-4 text-center py-6 capitalize">
                    ${b === 'all' ? '所有品牌' : productsData.find(p=>p.brand===b).brandName}
                </div>
            `).join('');
            renderProducts('all', 'v');
        }

        // 渲染產品卡片
        function renderProducts(brand, cat) {
            const grid = document.getElementById('product-grid');
            const filtered = productsData.filter(p => 
                (brand === 'all' || p.brand === brand) && p.category === cat
            );
            
            grid.innerHTML = filtered.map(p => `
                <div class="flex gap-4 border-b border-gray-50 pb-4">
                    <div class="w-20 h-20 bg-cover bg-center rounded-lg flex-none" style="background-image: url('${p.img}')"></div>
                    <div class="flex-1">
                        <h3 class="text-sm font-bold">${p.name}</h3>
                        <p class="text-[9px] text-gray-400 mt-0.5">有效期至: ${p.expiry}</p>
                        <div class="mt-2 flex justify-between items-center">
                            <span class="price-text text-sm">HK$ ${p.price}.00</span>
                            <button onclick="openDetail(${p.id})" class="bg-gold text-white px-4 py-1 rounded-full text-[10px]">選購</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            currentProduct = productsData.find(p => p.id === id);
            selectedQty = currentProduct.minQty;
            document.getElementById('detail-name').innerText = currentProduct.name;
            document.getElementById('detail-price').innerText = `HK$ ${currentProduct.price}`;
            document.getElementById('detail-desc').innerText = currentProduct.desc;
            document.getElementById('detail-expiry').innerText = `有效期至: ${currentProduct.expiry}`;
            document.getElementById('detail-img').style.backgroundImage = `url('${currentProduct.img}')`;
            document.getElementById('display-qty').innerText = selectedQty;
            document.getElementById('detail-sheet').classList.add('active');
        }

        function updateQty(val) {
            selectedQty = Math.max(currentProduct.minQty, selectedQty + val);
            document.getElementById('display-qty').innerText = selectedQty;
        }

        function filterProducts(el, brand) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderProducts(brand, 'v');
        }

        function adminAuth() {
            if(prompt("請輸入管理員密碼") === "5963") {
                document.body.classList.add('admin-mode');
                alert("已啟動 Shopify 離線管理模式");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
