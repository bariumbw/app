<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 - 品牌產品連動版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        .preview-canvas {
            width: 100%; max-width: 900px; aspect-ratio: 2400 / 1700;
            position: relative; background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg?v=12'); 
            background-color: #A62C3E; background-size: cover; background-position: center;
            overflow: hidden; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }

        .name-layer { position: absolute; top: 19%; left: 0; width: 50%; color: #FFFFFF; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .bride-wrap { transform: translateX(-9px); font-size: 45px; line-height: 1; }
        .groom-wrap { transform: translateX(60px); font-size: 45px; line-height: 1; margin-top: 1.9em; }

        .voucher-layer { position: absolute; top: 0%; left: 65%; width: 16%; z-index: 5; display: flex; justify-content: center; }
        .voucher-layer img { width: 100%; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }

        .date-layer { position: absolute; top: 66%; left: 9%; width: 32%; text-align: center; color: #FFFFFF; }
        .venue-layer { position: absolute; top: 72%; left: 5.5%; width: 39%; text-align: center; color: #FFFFFF; text-transform: uppercase; }
        .address-layer { position: absolute; top: 77%; left: 2%; width: 46%; text-align: center; color: #FFFFFF; text-transform: uppercase; }

        .info-panel { position: absolute; top: 20%; right: 2%; width: 15%; background: rgba(255,255,255,0.9); padding: 12px; border-radius: 12px; display: none; z-index: 20; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center relative">
            <div class="preview-canvas">
                <div class="voucher-layer"><img id="pVoucher" src="" class="hidden"></div>
                <div class="name-layer font-aniyah">
                    <div class="bride-wrap"><h1 id="pBride">Christian</h1></div>
                    <div class="groom-wrap"><h1 id="pGroom">Benjamin</h1></div>
                </div>
                <div class="date-layer font-aloja"><span id="pDate" class="text-lg md:text-[18px] uppercase tracking-[0.25em]">October 15, 2026</span></div>
                <div class="venue-layer font-impact"><span id="pVenue" class="text-[10px] md:text-[15px]">Four Seasons Grand Ballroom</span></div>
                <div class="address-layer font-impact tracking-widest leading-snug"><span id="pAddress" class="text-[10px] md:text-[15px] opacity-90">8 Finance Street, Central, Hong Kong</span></div>
                
                <div id="pDetailPanel" class="info-panel shadow-xl border border-zinc-200">
                    <img id="pDetailBrandImg" src="" class="w-full h-10 object-contain mb-2">
                    <h4 id="pDetailProdName" class="font-bold text-[11px] text-zinc-800 mb-1"></h4>
                    <p id="pDetailTC" class="text-[7px] text-zinc-500 leading-tight"></p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl h-fit border border-zinc-100 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 custom-scroll overflow-y-auto">
                <h2 class="text-xl font-bold text-zinc-800 mb-6 font-im-fell italic">囍帖設計控制台</h2>

                <section class="mb-8">
                    <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">選擇禮券品牌</h3>
                    <div id="brandGrid" class="grid grid-cols-4 gap-3">
                        </div>
                </section>

                <section id="productSection" class="mb-8 hidden">
                    <h3 id="selectedBrandTitle" class="text-xs font-bold text-zinc-900 uppercase tracking-widest mb-3 border-b pb-1"></h3>
                    <div id="productGrid" class="space-y-2">
                        </div>
                </section>

                <hr class="my-6">

                <a href="admin.html" class="block w-full py-3 bg-zinc-100 text-zinc-500 text-center rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-zinc-200 transition">進入員工管理後台</a>
            </div>
        </div>
    </div>

    <script>
        const brandsDB = JSON.parse(localStorage.getItem('wedding_brands')) || [];
        const productsDB = JSON.parse(localStorage.getItem('wedding_products')) || [];

        function initBrands() {
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = brandsDB.length === 0 ? '<p class="col-span-4 text-[10px] text-zinc-300 text-center">尚未登記品牌</p>' : '';
            
            brandsDB.forEach(b => {
                const btn = document.createElement('button');
                btn.className = "aspect-square border bg-white p-2 hover:border-zinc-900 rounded-xl transition-all flex items-center justify-center overflow-hidden";
                btn.onclick = () => showProducts(b.name, b.img);
                btn.innerHTML = `<img src="${b.img}" class="max-h-full max-w-full object-contain" alt="${b.name}">`;
                grid.appendChild(btn);
            });
        }

        function showProducts(bName, bImg) {
            const section = document.getElementById('productSection');
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('selectedBrandTitle');
            
            section.classList.remove('hidden');
            title.innerText = bName + " 產品清單";
            grid.innerHTML = '';

            const prods = productsDB.filter(p => p.brandName === bName);
            if(prods.length === 0) {
                grid.innerHTML = '<p class="text-xs text-zinc-400">該品牌暫無產品</p>';
                return;
            }

            prods.forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 text-xs font-bold border rounded-xl hover:bg-zinc-50 transition-all";
                btn.innerText = p.product;
                btn.onclick = () => {
                    // 更新插圖
                    const pV = document.getElementById('pVoucher');
                    pV.src = bImg; pV.classList.remove('hidden');
                    // 更新細節面板
                    document.getElementById('pDetailPanel').style.display = 'block';
                    document.getElementById('pDetailBrandImg').src = bImg;
                    document.getElementById('pDetailProdName').innerText = p.product;
                    document.getElementById('pDetailTC').innerText = p.tc;
                };
                grid.appendChild(btn);
            });
        }

        window.onload = initBrands;
    </script>
</body>
</html>
