<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖設計預覽 - 頁一</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        /* 1. 畫布基礎設定 */
        .canvas-container {
            width: 100%;
            max-width: 900px; /* 網頁顯示寬度 */
            aspect-ratio: 2400 / 1700; /* 強制鎖定比例 */
            background-color: #A62C3E;
            position: relative;
            overflow: hidden;
            color: #FFFFFF;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* 2. 背景與噴砂 (模擬圖2設計) */
        .design-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 25% 20%, rgba(255,255,255,0.2) 0%, transparent 40%);
            pointer-events: none;
        }
        .sand-texture {
            position: absolute;
            top: 10%;
            left: 0;
            width: 100%;
            height: 30%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.15) 0%, transparent 70%);
            filter: blur(2px);
        }

        /* 3. 字體應用 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; } /* 模擬 Aloja */

        /* 4. 浮水印 Logo 保護 */
        .watermark {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="5" fill="white" fill-opacity="0.12" text-anchor="middle" transform="rotate(-35 50 50)">DESIGN PREVIEW - DO NOT PRINT</text></svg>');
            z-index: 100;
            pointer-events: none;
        }

        /* 5. 固定比例的飾線 (圖2底部) */
        .footer-deco {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            opacity: 0.8;
        }
    </style>
</head>
<body class="bg-zinc-800 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,380px] gap-10">
        
        <div class="flex flex-col items-center">
            <div id="captureArea" class="canvas-container font-im-fell">
                <div class="design-background"></div>
                <div class="sand-texture"></div>
                <div class="watermark"></div>

                <div class="relative z-10 h-full flex flex-col items-start justify-center pl-[8%] pt-[5%]">
                    
                    <div class="mb-6">
                        <img id="previewImg" src="https://img.icons8.com/plasticine/400/wedding-couple.png" class="h-40 md:h-64 object-contain">
                    </div>

                    <p class="text-[10px] md:text-sm tracking-[0.4em] uppercase opacity-90 mb-4">Together with their parents</p>

                    <div class="mb-4 text-left">
                        <h1 id="pName1" class="text-5xl md:text-8xl italic leading-none">Christian</h1>
                        <p class="text-2xl md:text-4xl italic my-1 opacity-80">and</p>
                        <h1 id="pName2" class="text-5xl md:text-8xl italic leading-none">Benjamin</h1>
                    </div>

                    <p class="text-[9px] md:text-xs tracking-widest leading-relaxed mb-6 opacity-70">
                        REQUEST THE HONOUR OF YOUR PRESENCE AT<br>THEIR WEDDING CELEBRATION
                    </p>

                    <div class="flex items-center gap-4 mb-6 w-[80%]">
                        <div class="h-[1px] bg-white/40 flex-grow"></div>
                        <span id="pDate" class="font-aloja text-2xl md:text-5xl text-white">October 15, 2026</span>
                        <div class="h-[1px] bg-white/40 flex-grow"></div>
                    </div>

                    <div class="text-left space-y-1">
                        <h3 id="pVenue" class="text-base md:text-2xl font-bold tracking-[0.2em] uppercase">Four Seasons Grand Ballroom</h3>
                        <p id="pAddress" class="text-[10px] md:text-sm opacity-80 tracking-widest">8 Finance Street, Central, Hong Kong</p>
                    </div>
                </div>

                <img src="https://img.icons8.com/ios/100/ffffff/wedding-rings.png" class="footer-deco h-10 object-contain">
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-2xl h-fit">
            <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-3 font-im-fell tracking-widest uppercase">Customization</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Name 1 (IM Fell)</label>
                    <input type="text" id="iName1" value="Christian" class="w-full mt-1 p-2 border-b-2 border-gray-100 focus:border-red-500 outline-none font-im-fell text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Name 2 (IM Fell)</label>
                    <input type="text" id="iName2" value="Benjamin" class="w-full mt-1 p-2 border-b-2 border-gray-100 focus:border-red-500 outline-none font-im-fell text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Date (Aloja Style)</label>
                    <input type="text" id="iDate" value="October 15, 2026" class="w-full mt-1 p-2 border-b-2 border-gray-100 focus:border-red-500 outline-none font-aloja text-xl text-red-700">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Venue (IM Fell)</label>
                    <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full mt-1 p-2 border-b-2 border-gray-100 focus:border-red-500 outline-none font-im-fell">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Location (IM Fell)</label>
                    <textarea id="iAddress" rows="2" class="w-full mt-1 p-2 border-b-2 border-gray-100 focus:border-red-500 outline-none font-im-fell text-sm">8 Finance Street, Central, Hong Kong</textarea>
                </div>
                
                <div class="pt-4">
                    <p class="text-[10px] text-gray-400 italic leading-tight">
                        * 此預覽區嚴格遵循 2400x1700 設計規範。<br>所有修改將即時同步於左側設計圖中。
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 即時同步函數
        const sync = (inputId, previewId) => {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            input.addEventListener('input', () => {
                preview.innerText = input.value;
            });
        };

        sync('iName1', 'pName1');
        sync('iName2', 'pName2');
        sync('iDate', 'pDate');
        sync('iVenue', 'pVenue');
        sync('iAddress', 'pAddress');
    </script>
</body>
</html>
