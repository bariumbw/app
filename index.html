<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖設計預覽器 - 最終修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        /* 核心預覽畫布：鎖定 2400 x 1700 比例 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg'); 
            background-color: #A62C3E; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }

        /* 定位與排版 */
        
        /* 姓名區域：新娘一行，and + 新郎一行 */
        .name-layer {
            position: absolute;
            top: 34%; /* 稍微往上微調以容納兩行較大文字 */
            left: 5%;
            width: 44%;
            text-align: center;
            color: #FFFFFF;
        }

        /* 日期區域：縮小至約 3 分之 2 (從 36px 降至約 24px) */
        .date-layer {
            position: absolute;
            top: 70.2%;
            left: 11%;
            width: 32%;
            text-align: center;
            color: #FFFFFF;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 場地與地址區域：強制大寫與單行 */
        .venue-layer {
            position: absolute;
            top: 77%;
            left: 7.5%;
            width: 39%;
            text-align: center;
            color: #FFFFFF;
            text-transform: uppercase; /* 強制大寫 */
            white-space: nowrap; /* 強制單行 */
            overflow: hidden;
        }

        .address-layer {
            position: absolute;
            top: 82.5%;
            left: 4%;
            width: 46%;
            text-align: center;
            color: #FFFFFF;
            text-transform: uppercase; /* 強制大寫 */
        }

        .watermark {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="5" fill="white" fill-opacity="0.1" text-anchor="middle" transform="rotate(-30 50 50)">DESIGN PREVIEW ONLY</text></svg>');
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center">
            <div class="preview-canvas font-im-fell">
                <div class="watermark"></div>

                <div class="name-layer italic">
                    <h1 class="text-4xl md:text-7xl leading-tight tracking-tight">
                        <span id="pBride">Christian</span><br>
                        <span class="text-xl md:text-3xl opacity-80 normal-case" style="margin: 5px 0; display: block;">and <span id="pGroom" class="italic">Benjamin</span></span>
                    </h1>
                </div>

                <div class="date-layer font-aloja">
                    <span id="pDate" class="text-xl md:text-[24px] uppercase tracking-widest">October 15, 2026</span>
                </div>

                <div class="venue-layer font-bold tracking-[0.15em]">
                    <span id="pVenue" class="text-sm md:text-xl">Four Seasons Grand Ballroom</span>
                </div>

                <div class="address-layer tracking-widest leading-snug">
                    <span id="pAddress" class="text-[9px] md:text-[13px] opacity-90">8 Finance Street, Central, Hong Kong</span>
                </div>
            </div>
            <p class="mt-4 text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-light">Final Design Standard | Ratio 2400:1700</p>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-2xl h-fit">
            <h2 class="text-2xl font-bold text-zinc-800 mb-8 border-b pb-4 font-im-fell tracking-tight">設計編輯器</h2>
            
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">新娘名字</label>
                        <input type="text" id="iBride" value="Christian" class="w-full p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-im-fell italic text-lg">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">新郎名字</label>
                        <input type="text" id="iGroom" value="Benjamin" class="w-full p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-im-fell italic text-lg">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">婚禮日期 (縮小版)</label>
                    <input type="text" id="iDate" value="October 15, 2026" class="w-full p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-aloja text-xl text-red-900">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">宴客場地 (將轉為大寫並單行)</label>
                    <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-bold text-lg">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase mb-1">詳細地址 (將轉為大寫)</label>
                    <textarea id="iAddress" rows="2" class="w-full p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-sm">8 Finance Street, Central, Hong Kong</textarea>
                </div>
            </div>

            <button class="w-full mt-10 py-4 bg-zinc-900 text-white rounded-xl font-bold tracking-[0.2em] hover:bg-zinc-700 transition">
                確認並保存設計
            </button>
        </div>
    </div>

    <script>
        const inputs = ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'];
        const previews = ['pBride', 'pGroom', 'pDate', 'pVenue', 'pAddress'];

        const sync = () => {
            inputs.forEach((id, index) => {
                const val = document.getElementById(id).value;
                document.getElementById(previews[index]).innerText = val;
            });
        };

        inputs.forEach(id => document.getElementById(id).addEventListener('input', sync));
    </script>
</body>
</html>
