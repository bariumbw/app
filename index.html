<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESPOKE 囍帖預覽器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        .preview-canvas {
            width: 100%; max-width: 900px; aspect-ratio: 2400 / 1700; position: relative;
            background-color: #FFFDD0; background-size: cover; background-position: center;
            overflow: hidden; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5); container-type: inline-size;
            background-image: url('./bg10.jpg?v=20260429_v4'); 
        }

        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }
        .font-lora { font-family: 'Lora', serif; }

        .bride-layer { position: absolute; top: 24%; left: 0; width: 50%; color: #8B4513; z-index: 10; display: flex; justify-content: center; transform: translateX(-3.2cqw); }
        .groom-layer { position: absolute; top: 43.5%; left: 0; width: 50%; color: #8B4513; z-index: 10; display: flex; justify-content: center; transform: translateX(8.2cqw); }
        #pBride, #pGroom { font-size: 4.5cqw; line-height: 1; white-space: nowrap; }
        
        .date-container-new { position: absolute; top: 64%; left: 4.5%; width: 41%; display: flex; flex-direction: column; align-items: center; color: #8B4513; font-family: 'Lora', serif; }
        .date-row-bottom { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; text-align: center; }
        .date-side { font-size: 2.8cqw; text-transform: uppercase; }
        .date-main { font-size: 7.2cqw; font-weight: 500; padding: 0 2cqw; }

        .week-container-under { position: absolute; top: 79%; left: 4.5%; width: 41%; display: flex; justify-content: center; color: #8B4513; z-index: 15; }
        .venue-layer { position: absolute; top: 75%; left: 5.5%; width: 39%; text-align: center; color: #8B4513; font-size: 2.2cqw; font-weight: 700; font-family: 'Lora', serif; }
        .address-layer { position: absolute; top: 79%; left: 2%; width: 46%; text-align: center; color: #8B4513; font-size: 1.3cqw; font-family: 'Lora', serif; }

        /* 產品詳情面板 */
        .info-panel {
            position: absolute; top: 5%; right: 5%; width: 40cqw; height: 64cqw;
            background: rgba(255,255,255,0.12); padding: 1.5cqw; border-radius: 2cqw;
            z-index: 20; backdrop-filter: blur(8px); display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1); gap: 0;
        }

        /* 結構調整 */
        .brand-logo-wrap { flex: 0 0 25%; display: flex; align-items: center; justify-content: center; gap: 1cqw; overflow: hidden; }
        .brand-logo-wrap img { max-width: 45%; max-height: 80%; object-fit: contain; }

        .qrcode-wrap { flex: 0 0 20%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .qrcode-img { width: 7cqw; height: 7cqw; background: #fff; border: 1px solid #ccc; }
        .expiry-date { color: #8B4513; opacity: 0.7; font-size: 0.8cqw; margin-top: 0.2cqw; }

        .prod-name-wrap { flex: 0 0 15%; display: flex; align-items: center; justify-content: center; text-align: center; }
        #pDetailProdName { font-weight: bold; color: #8B4513; font-size: 3.5cqw; }

        .tc-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid #8B4513; }
        #pDetailTC { color: #8B4513; opacity: 0.8; font-size: 0.7cqw; line-height: 1.1; word-break: break-all; }

        .panel-content-hidden { opacity: 0; transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="preview-canvas" id="previewCanvas">
        <div class="bride-layer font-aniyah"><h1 id="pBride">Rosesalina</h1></div>
        <div class="groom-layer font-aniyah"><h1 id="pGroom">Benjamin</h1></div>
        
        <div class="date-container-new">
            <div class="date-row-bottom">
                <div id="pMonth" class="date-side"></div>
                <div id="pDay" class="date-main"></div>
                <div id="pYear" class="date-side"></div>
            </div>
        </div>
        
        <div class="venue-layer"><span id="pVenue">Four Seasons Grand Ballroom</span></div>
        
        <div id="pDetailPanel" class="info-panel">
            <div class="brand-logo-wrap panel-content-hidden">
                <img src="Bespoke_logo-Aqua1_long1.png" alt="Logo 1">
                <img src="BespokeMallLogo_Final2023副本.png" alt="Logo 2">
            </div>
            <div class="qrcode-wrap panel-content-hidden">
                <div class="qrcode-img"></div>
                <div class="expiry-date">Expiry Date : 31/12/2026</div>
            </div>
            <div class="prod-name-wrap panel-content-hidden">
                <h4 id="pDetailProdName"></h4>
            </div>
            <div class="tc-wrap panel-content-hidden">
                <p id="pDetailTC"></p>
            </div>
        </div>
    </div>

    <script>
        // 初始化與同步邏輯保持不變
        function applySelection(img, name, tc) {
            document.querySelectorAll('.panel-content-hidden').forEach(el => el.style.opacity = '1');
            document.getElementById('pDetailProdName').innerText = name;
            const tcEl = document.getElementById('pDetailTC');
            tcEl.innerText = tc;
        }
    </script>
</body>
</html>
