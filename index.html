<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | Live Admin System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b08d57; }
        body { font-family: -apple-system, "PingFang HK", sans-serif; background-color: #fdfcfb; overflow: hidden; }
        .sidebar-item.active { background: #fff; border-left: 4px solid var(--gold); color: #000; font-weight: bold; }
        .bottom-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; }
        .bottom-sheet.active { display: flex; }
        .sheet-content { background: white; width: 100%; border-radius: 24px 24px 0 0; max-height: 92vh; overflow-y: auto; }
        .active-tab { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }
        /* 管理員專屬樣式 */
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="admin-only bg-black text-white text-[10px] py-1 px-4 flex justify-between items-center">
        <span>ADMIN MODE ACTIVE</span>
        <button onclick="openAdminEditor()" class="bg-white text-black px-2 py-0.5 rounded text-[9px] font-bold">修改產品數據</button>
    </div>

    <header class="bg-white border-b z-10">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex flex-col">
                <span class="text-sm font-bold tracking-[0.2em]">BESPOKE MALL</span>
                <span class="text-[8px] text-stone-300 uppercase">2026 Wedding Expo</span>
            </div>
            <button onclick="adminLogin()" class="text-stone-200"><i class="fa-solid fa-user-shield text-lg"></i></button>
        </div>
        <div class="flex text-sm text-center border-t">
            <div id="tab-v" class="flex-1 py-3 active-tab cursor-pointer" onclick="switchCat('v')">禮券</div>
            <div id="tab-g" class="flex-1 py-3 text-stone-300 cursor-pointer" onclick="switchCat('g')">回禮</div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="brand-menu" class="w-24 bg-stone-50 overflow-y-auto border-r text-[11px] text-stone-500"></aside>
        <section id="product-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-40"></section>
        
        <section id="record-page" class="hidden flex-1 overflow-y-auto bg-stone-50 p-6 pb-40">
            <h2 class="text-xl font-bold mb-6 italic">Orders</h2>
            <div id="order-flow" class="space-y-4"></div>
        </section>
    </main>

    <nav class="bg-white border-t flex justify-around py-3 safe-area-bottom z-50">
        <button onclick="showPage('shop')" id="nav-s" class="flex flex-col items-center gap-1 text-gold">
            <i class="fa-solid fa-store text-xl"></i><span class="text-[10px]">目錄</span>
        </button>
        <button onclick="showPage('record')" id="nav-r" class="flex flex-col items-center gap-1 text-stone-300">
            <i class="fa-solid fa-receipt text-xl"></i><span class="text-[10px]">取單</span>
        </button>
    </nav>

    <div id="admin-editor-sheet" class="bottom-sheet" onclick="closeSheet(this)">
        <div class="sheet-content p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold">編輯產品資料 (JSON)</h3>
                <button onclick="saveAdminData()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs">儲存並刷新</button>
            </div>
            <p class="text-[10px] text-stone-400 mb-2">直接在下方修改數值、圖片連結或價格：</p>
            <textarea id="json-editor" class="w-full h-96 p-4 bg-stone-900 text-green-400 font-mono text-[10px] rounded-xl outline-none leading-relaxed"></textarea>
            <button onclick="resetData()" class="w-full mt-4 py-2 text-red-500 text-[10px] border border-red-100 rounded-lg">恢復預設數據</button>
        </div>
    </div>

    <div id="sheet-detail" class="bottom-sheet" onclick="closeSheet(this)">
        <div class="sheet-content p-8" onclick="event.stopPropagation()">
             <div id="p-img" class="w-full h-48 bg-contain bg-no-repeat bg-center mb-4"></div>
             <h2 id="p-name" class="text-xl font-bold mb-2"></h2>
             <p id="p-desc" class="text-xs text-stone-400 mb-6"></p>
             <div class="flex justify-between items-center mb-6 bg-stone-50 p-4 rounded-xl">
                 <span class="text-sm font-bold">數量: <span id="p-qty"></span></span>
                 <div class="flex gap-4">
                     <button onclick="adjQty(-10)" class="w-8 h-8 border rounded">-</button>
                     <button onclick="adjQty(10)" class="w-8 h-8 border rounded">+</button>
                 </div>
             </div>
             <button onclick="addCart()" class="w-full py-4 bg-[#b08d57] text-white rounded-xl font-bold">加入清單</button>
        </div>
    </div>

    <script>
        // 1. 預設數據
        const defaultProducts = [
            { id: 1, brand: 'agnes', bName: 'agnès b.', cat: 'v', name: 'agnès b. CAFÉ $50 禮券', price: 37, min: 100, expiry: '2027-03-31', desc: '適用於全港分店', img: 'https://via.placeholder.com/200' },
            { id: 2, brand: 'godiva', bName: 'GODIVA', cat: 'v', name: 'GODIVA $50 禮券', price: 41, min: 10, expiry: '2026-12-31', desc: '粉紅禮金包裝', img: 'https://via.placeholder.com/200' }
        ];

        // 2. 從 LocalStorage 加載數據 (若無則使用預設)
        let productsData = JSON.parse(localStorage.getItem('bespoke_mall_data')) || defaultProducts;
        let cart = null, orders = [], isAdmin = false, currentCat = 'v';

        function init() {
            renderBrands();
            renderProducts('all', currentCat);
        }

        function renderBrands() {
            const brands = ['all', ...new Set(productsData.map(p => p.brand))];
            document.getElementById('brand-menu').innerHTML = brands.map(b => `
                <div onclick="filterBrand(this, '${b}')" class="sidebar-item ${b==='all'?'active':''} p-4 text-center py-6">
                    ${b === 'all' ? '所有' : productsData.find(p => p.brand === b).bName}
                </div>
            `).join('');
        }

        function renderProducts(brand, cat) {
            const list = document.getElementById('product-list');
            const filtered = productsData.filter(p => (brand === 'all' || p.brand === brand) && p.cat === cat);
            list.innerHTML = filtered.map(p => `
                <div class="flex gap-4 border-b border-stone-100 pb-4 items-center">
                    <div class="w-16 h-16 bg-white border rounded bg-center bg-contain bg-no-repeat" style="background-image: url('${p.img}')"></div>
                    <div class="flex-1 text-sm font-bold">${p.name}<br><span class="text-gold">HK$${p.price}</span></div>
                    <button onclick="openProduct(${p.id})" class="bg-[#b08d57] text-white w-8 h-8 rounded-full text-xs">+</button>
                </div>
            `).join('');
        }

        // --- 管理員編輯功能 ---
        function adminLogin() {
            if(prompt("Password:") === "5963") {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                alert("Manager Mode: ON");
            }
        }

        function openAdminEditor() {
            document.getElementById('json-editor').value = JSON.stringify(productsData, null, 4);
            document.getElementById('admin-editor-sheet').classList.add('active');
        }

        function saveAdminData() {
            try {
                const newData = JSON.parse(document.getElementById('json-editor').value);
                productsData = newData;
                localStorage.setItem('bespoke_mall_data', JSON.stringify(newData));
                alert("數據已更新！網頁將即時重新渲染。");
                closeSheet(document.getElementById('admin-editor-sheet'));
                init();
            } catch (e) {
                alert("JSON 格式有誤，請檢查括號或逗號。");
            }
        }

        function resetData() {
            if(confirm("確定要清除所有修改，恢復到原始數據嗎？")) {
                localStorage.removeItem('bespoke_mall_data');
                location.reload();
            }
        }

        // --- 其他原有功能簡化版 ---
        function filterBrand(el, brand) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderProducts(brand, currentCat);
        }
        function openProduct(id) {
            cart = productsData.find(p => p.id === id);
            cart.qty = cart.min;
            document.getElementById('p-name').innerText = cart.name;
            document.getElementById('p-desc').innerText = cart.desc;
            document.getElementById('p-img').style.backgroundImage = `url('${cart.img}')`;
            document.getElementById('p-qty').innerText = cart.qty;
            document.getElementById('sheet-detail').classList.add('active');
        }
        function adjQty(v) { cart.qty = Math.max(cart.min, cart.qty + v); document.getElementById('p-qty').innerText = cart.qty; }
        function closeSheet(el) { el.classList.remove('active'); }
        function showPage(p) {
            const isShop = p === 'shop';
            document.getElementById('product-list').parentElement.classList.toggle('hidden', !isShop);
            document.getElementById('record-page').classList.toggle('hidden', isShop);
            document.getElementById('nav-s').className = isShop ? 'flex flex-col items-center gap-1 text-gold' : 'flex flex-col items-center gap-1 text-stone-300';
            document.getElementById('nav-r').className = !isShop ? 'flex flex-col items-center gap-1 text-gold' : 'flex flex-col items-center gap-1 text-stone-300';
        }

        window.onload = init;
    </script>
</body>
</html>
