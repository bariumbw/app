<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | 智能訂購系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #f8fafc; }
        .brand-card { transition: all 0.2s; border-radius: 2rem; border: 1px solid #f1f5f9; cursor: pointer; }
        .product-card { transition: all 0.2s; border-radius: 1.5rem; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #f43f5e; border-bottom: 3px solid #f43f5e; }
        .yellow-label { background: #fde047; padding: 4px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useMemo, useRef, useEffect } = React;

        // --- 1. 配置與資料 ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwx9qCf1N4QxA-4jXTLEjSr3Bgp5-AARpf7MHA_E9SA6xoyZre4grbXyIDtAhm6LpltLg/exec";

        const BRAND_CONFIG = {
            "agnès b.": "https://www.bespoke-wedding.com/sites/default/files/%E7%A6%AE%E5%8D%A1/Agne%CC%80s%20b.png",
            "聖安娜": "https://www.bespoke-wedding.com/sites/default/files/禮卡/SAINT%20%20HIGH.webp",
            "GODIVA": "https://www.bespoke-wedding.com/sites/default/files/禮卡/GODIVA.png",
            "東海堂": "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/tong.png",
            "太興": "https://www.bespoke-wedding.com/sites/default/files/禮卡/太興.jpeg",
            "鴻福堂": "https://www.bespoke-wedding.com/sites/default/files/禮卡/HungFukTong.webp",
            "Lady M": "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/Sugarfina%20(2).png",
            "L.M.D.C": "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/Imdc.png",
            "華御結": "https://www.bespoke-wedding.com/sites/default/files/禮卡/HM%20Logo%20Wide-01.png",
            "甜姨姨": "https://www.bespoke-wedding.com/sites/default/files/禮卡/auntie%20Sweet.webp",
            "永樂": "https://www.bespoke-wedding.com/sites/default/files/禮卡/winglok_LOGO.webp",
            "LE CREUSET": "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/Copy%20of%20禮卡11.png",
            "奇華": "https://www.bespoke-wedding.com/sites/default/files/KWLOGO.png",
            "糕點時光": "https://www.bespoke-wedding.com/sites/default/files/禮卡/糕點時光.webp",
            "Bonne Maman": "https://www.bespoke-wedding.com/sites/default/files/禮卡/Bonne%20Maman_%20.png"
        };

        const PRODUCT_DEFS = [
            { category: "Gift Card", brand: "agnès b.", name: "agnès b. $50禮券", sku: "20081", expiry: "2026-12-31", orig: 50, min: 10, img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/agnes50.png", tiers: [{q:10, d:0.85}] },
            { category: "Gift Card", brand: "agnès b.", name: "agnès b. $80禮券", sku: "200082", expiry: "2026-12-31", orig: 80, min: 10, img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/agnes80.png", tiers: [{q:10, d:0.85}] },
            { category: "Gift Card", brand: "GODIVA", name: "GODIVA $50(粉紅封套)", sku: "10344", expiry: "2027-03-31", orig: 50, min: 1, img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/godiva-p.png", tiers: [{q:1, d:0.56}] },
            { category: "Gift Card", brand: "鴻福堂", name: "自家湯套票(10張)", sku: "HFT-001", expiry: "2026-12-31", orig: 600, min: 1, img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/自家湯.png", tiers: [{q:1, d:0.6583}] },
            { category: "Favor", brand: "永樂", name:"有麵子回禮小禮物", sku: "10422", expiry: "2026-12-31", orig: 38, min: 20, img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/永樂%20有麵子%20回禮小禮物%20.jpg", tiers: [{q:20, d:0.79}] }
            // ... 其餘產品資料比照 PDF 補齊
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('Gift Card');
            const [selectedBrand, setSelectedBrand] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [cart, setCart] = useState({});
            const [showPreview, setShowPreview] = useState(false);
            const [showBarcode, setShowBarcode] = useState(false);
            const [showHistory, setShowHistory] = useState(false);
            const [currentOrder, setCurrentOrder] = useState(null);
            const [orderHistory, setOrderHistory] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [phone, setPhone] = useState(''); // 新增：電話欄位
            const barcodeRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('bw_cust_history_v7');
                if (saved) setOrderHistory(JSON.parse(saved));
            }, []);

            // 價格計算邏輯
            const getPrice = (sku, qty) => {
                const p = PRODUCT_DEFS.find(x => x.sku === sku);
                if (!p) return { price: 0 };
                const qtyToCheck = qty || p.min;
                const activeTier = [...p.tiers].sort((a,b) => b.q - a.q).find(t => qtyToCheck >= t.q);
                const discount = activeTier ? activeTier.d : 1;
                return { price: Math.round(p.orig * discount * 100) / 100 };
            };

            const cartItems = useMemo(() => 
                Object.entries(cart).map(([sku, qty]) => {
                    const def = PRODUCT_DEFS.find(p => p.sku === sku);
                    const { price } = getPrice(sku, qty);
                    return { ...def, qty, currentPrice: price };
                }), [cart]);

            const totalPrice = cartItems.reduce((acc, item) => acc + (item.currentPrice * item.qty), 0);
            const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);

            const updateQty = (sku, delta) => {
                const def = PRODUCT_DEFS.find(p => p.sku === sku);
                setCart(prev => {
                    const cur = prev[sku] || 0;
                    let next = cur + delta;
                    if (cur === 0 && delta > 0) next = def.min;
                    else if (cur === def.min && delta < 0) next = 0;
                    const res = { ...prev };
                    if (next <= 0) delete res[sku]; else res[sku] = next;
                    return res;
                });
            };

            // 確認下單並送往 Google Sheet
            const handleConfirm = async () => {
                if (isSubmitting) return;
                if (!phone) return alert("請輸入聯絡電話以獲取號碼！");
                
                setIsSubmitting(true);
                const id = Math.floor(100000 + Math.random() * 900000).toString();
                const now = new Date().toLocaleString('zh-HK', { hour12: false });
                const newOrder = {
                    id: id,
                    phone: phone,
                    total: totalPrice,
                    date: now,
                    items: cartItems.map(i => ({ name: i.name, qty: i.qty, sku: i.sku, price: i.currentPrice }))
                };

                const updatedHistory = [newOrder, ...orderHistory].slice(0, 5);
                setOrderHistory(updatedHistory);
                localStorage.setItem('bw_cust_history_v7', JSON.stringify(updatedHistory));
                setCurrentOrder(newOrder);
                setShowPreview(false);
                setShowBarcode(true);
                setCart({});
                setPhone('');

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newOrder)
                    });
                } catch (e) { console.error("Sync error", e); }
                setIsSubmitting(false);
            };

            useEffect(() => {
                if (showBarcode && currentOrder && barcodeRef.current) {
                    JsBarcode(barcodeRef.current, "BW-" + currentOrder.id, {
                        format: "CODE128", width: 2, height: 60, displayValue: true, fontSize: 18, margin: 10
                    });
                }
            }, [showBarcode, currentOrder]);

            return React.createElement('div', { className: "min-h-screen max-w-md mx-auto relative pb-24" },
                // Header
                React.createElement('header', { className: "bg-white p-6 sticky top-0 z-30 shadow-sm flex justify-between items-center" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-2xl font-black text-rose-500 italic", onClick: () => { setSelectedBrand(null); setSearchTerm(''); } }, "BESPOKE MALL"),
                        React.createElement('p', { className: "text-[10px] text-gray-400 font-bold" }, "(只限展場下單)")
                    ),
                    React.createElement('button', { onClick: () => setShowHistory(true), className: "bg-slate-100 px-4 py-2 rounded-full text-xs font-bold" }, "歷史紀錄")
                ),

                // 分類切換
                !searchTerm && React.createElement('div', { className: "flex bg-white px-6 border-b" },
                    ['Gift Card', 'Favor'].map(tab => React.createElement('button', {
                        key: tab,
                        onClick: () => { setActiveTab(tab); setSelectedBrand(null); },
                        className: `flex-1 py-4 text-sm font-bold ${activeTab === tab ? 'tab-active' : 'text-gray-400'}`
                    }, tab === 'Gift Card' ? '禮券' : '回禮小禮物'))
                ),

                // 搜尋框
                React.createElement('div', { className: "p-4" },
                    React.createElement('input', {
                        className: "w-full bg-white border px-4 py-3 rounded-2xl text-sm outline-none",
                        placeholder: "搜尋產品或品牌...",
                        value: searchTerm,
                        onChange: e => setSearchTerm(e.target.value)
                    })
                ),

                // 主內容區
                React.createElement('main', { className: "px-4" },
                    selectedBrand || searchTerm ? 
                    React.createElement('div', { className: "space-y-3" },
                        PRODUCT_DEFS.filter(p => searchTerm ? 
                            (p.name.includes(searchTerm) || p.brand.includes(searchTerm)) : 
                            (p.brand === selectedBrand && p.category === activeTab)
                        ).map(p => {
                            const { price } = getPrice(p.sku, cart[p.sku]);
                            return React.createElement('div', { key: p.sku, className: "product-card bg-white p-4 border flex gap-3 items-center shadow-sm" },
                                React.createElement('img', { src: p.img, className: "w-16 h-16 rounded-lg object-cover" }),
                                React.createElement('div', { className: "flex-1" },
                                    React.createElement('div', { className: "text-xs font-bold" }, p.name),
                                    React.createElement('div', { className: "text-rose-500 font-black" }, "$" + price)
                                ),
                                React.createElement('div', { className: "flex items-center gap-2 bg-gray-50 rounded-full px-2" },
                                    React.createElement('button', { onClick: () => updateQty(p.sku, -1), className: "w-8 h-8 font-bold text-gray-400" }, "-"),
                                    React.createElement('span', { className: "text-xs font-black w-6 text-center" }, cart[p.sku] || 0),
                                    React.createElement('button', { onClick: () => updateQty(p.sku, 1), className: "w-8 h-8 font-bold text-rose-500" }, "+")
                                )
                            );
                        })
                    ) : 
                    React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                        Object.entries(BRAND_CONFIG).filter(([name]) => PRODUCT_DEFS.some(p => p.brand === name && p.category === activeTab)).map(([name, logo]) => 
                            React.createElement('div', { key: name, onClick: () => setSelectedBrand(name), className: "brand-card bg-white p-6 h-32 flex flex-col items-center justify-center shadow-sm" },
                                React.createElement('img', { src: logo, className: "h-12 object-contain mb-2" }),
                                React.createElement('span', { className: "text-[10px] text-gray-400 uppercase font-bold" }, name)
                            )
                        )
                    )
                ),

                // 底部浮動購物籃
                React.createElement('footer', { className: "fixed bottom-0 left-0 right-0 p-6 z-40" },
                    React.createElement('div', { className: "bg-slate-900 rounded-[2rem] px-6 py-4 flex justify-between items-center text-white shadow-2xl" },
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-[10px] text-gray-400" }, "合計金額"),
                            React.createElement('p', { className: "text-xl font-black text-rose-400" }, "$" + totalPrice.toLocaleString())
                        ),
                        React.createElement('button', {
                            disabled: totalCount === 0 || isSubmitting,
                            onClick: () => setShowPreview(true),
                            className: `px-6 py-2 rounded-xl font-black text-sm ${totalCount > 0 ? 'bg-rose-500' : 'bg-slate-800 text-slate-500'}`
                        }, isSubmitting ? "處理中..." : `預覽購物車 (${totalCount})`)
                    )
                ),

                // 確認訂單彈窗 (根據截圖優化)
                showPreview && React.createElement('div', { className: "fixed inset-0 bg-black/80 z-50 flex items-end justify-center" },
                    React.createElement('div', { className: "bg-white w-full rounded-t-[3rem] p-8 animate-up max-h-[95vh] overflow-y-auto hide-scrollbar" },
                        React.createElement('div', { className: "flex justify-center mb-6" },
                            React.createElement('h3', { className: "text-xl font-black" }, "確認訂單")
                        ),
                        
                        // 頂部 Logo
                        React.createElement('div', { className: "flex justify-center mb-8" },
                            React.createElement('h1', { className: "text-2xl font-light tracking-widest text-cyan-800" }, "BESPOKE MALL")
                        ),

                        // 前方訂單資訊
                        React.createElement('div', { className: "text-lg font-bold mb-6" }, "前方 ", React.createElement('span', { className: "text-orange-900" }, "XX"), " 張訂單準備中"),

                        // 聯絡電話輸入區
                        React.createElement('div', { className: "flex items-center gap-2 mb-6 border-y py-4 relative" },
                            React.createElement('span', { className: "text-sm font-bold w-20" }, "聯絡電話"),
                            React.createElement('input', {
                                type: "tel",
                                placeholder: "選填，便於訂單異常時聯絡",
                                value: phone,
                                onChange: e => setPhone(e.target.value),
                                className: "flex-1 text-sm outline-none bg-transparent"
                            }),
                            React.createElement('button', { className: "border px-3 py-1 text-[10px] text-gray-400 rounded" }, "獲取號碼"),
                            React.createElement('div', { className: "absolute -right-16 yellow-label" }, "← 必須要填寫")
                        ),

                        // 選單功能區
                        ['購買回禮產品必填', '產品缺貨時必填'].map(txt => 
                            React.createElement('div', { key: txt, className: "flex justify-between items-center border-b py-4 text-sm font-bold text-gray-700" },
                                React.createElement('span', null, txt),
                                React.createElement('span', { className: "text-gray-300" }, ">")
                            )
                        ),

                        // 產品列表
                        React.createElement('div', { className: "my-6 space-y-6" },
                            cartItems.map(item => React.createElement('div', { key: item.sku, className: "flex gap-4" },
                                React.createElement('img', { src: item.img, className: "w-16 h-16 rounded object-cover" }),
                                React.createElement('div', { className: "flex-1" },
                                    React.createElement('div', { className: "text-xs font-black" }, item.name),
                                    React.createElement('div', { className: "text-[10px] text-gray-400 mt-1" }, "有效期至: " + item.expiry),
                                    React.createElement('div', { className: "flex justify-between items-end mt-1" },
                                        React.createElement('span', { className: "text-[10px]" }, "x" + item.qty),
                                        React.createElement('span', { className: "font-black" }, "HK$" + item.currentPrice)
                                    )
                                )
                            ))
                        ),

                        // 總計金額
                        React.createElement('div', { className: "text-right text-lg font-black border-t pt-4 mb-6" },
                            "合共 HK$" + totalPrice.toLocaleString()
                        ),

                        // 警告提示
                        React.createElement('div', { className: "bg-rose-50 p-6 rounded-3xl text-center space-y-2 mb-8" },
                            React.createElement('p', { className: "text-xs font-bold" }, "下單前請確認各款禮券的有效期是否適用"),
                            React.createElement('p', { className: "text-[10px] text-gray-500" }, "(部分禮券有效期為一年內)"),
                            React.createElement('p', { className: "text-xs font-black" }, "下單後將無法退款/更改"),
                            React.createElement('p', { className: "text-[10px] text-gray-400" }, "**有效期資料顯示於每款禮卡的分項內容**")
                        ),

                        // 提交按鈕
                        React.createElement('div', { className: "flex gap-4 items-center" },
                            React.createElement('div', { className: "text-xs font-bold" }, `共 ${totalCount} 件 合共：`, React.createElement('span', { className: "text-orange-700" }, "HK$" + totalPrice)),
                            React.createElement('button', {
                                onClick: handleConfirm,
                                disabled: isSubmitting,
                                className: "flex-1 bg-orange-900/60 text-white py-4 rounded-full font-black text-lg"
                            }, isSubmitting ? "下單中..." : "提交訂單")
                        ),
                        React.createElement('button', { onClick: () => setShowPreview(false), className: "w-full mt-4 text-gray-400 text-sm font-bold" }, "返回修改")
                    )
                ),

                // 條碼顯示 (下單成功後)
                showBarcode && React.createElement('div', { className: "fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm" },
                    React.createElement('div', { className: "bg-white w-full max-w-xs rounded-[3rem] p-8 flex flex-col items-center animate-up shadow-2xl relative" },
                        React.createElement('button', { onClick: () => setShowBarcode(false), className: "absolute top-6 right-6 text-gray-300 text-xl" }, "✕"),
                        React.createElement('h2', { className: "text-lg font-black mb-6 text-slate-800 text-center" }, "向職員出示條碼\n完成付款"),
                        React.createElement('svg', { ref: barcodeRef }),
                        React.createElement('div', { className: "mt-6 text-center" },
                            React.createElement('div', { className: "text-[10px] text-gray-400 font-bold uppercase" }, "Reference Number"),
                            React.createElement('div', { className: "text-2xl font-black text-rose-500" }, "BW-" + currentOrder?.id)
                        ),
                        React.createElement('button', { onClick: () => setShowBarcode(false), className: "mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-black" }, "完成")
                    )
                ),

                // 歷史紀錄
                showHistory && React.createElement('div', { className: "fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-6" },
                    React.createElement('div', { className: "bg-white w-full rounded-[2rem] p-8 max-h-[70vh] overflow-y-auto" },
                        React.createElement('div', { className: "flex justify-between items-center mb-6" },
                            React.createElement('h2', { className: "font-black" }, "最近下單紀錄"),
                            React.createElement('button', { onClick: () => setShowHistory(false) }, "✕")
                        ),
                        orderHistory.length === 0 ? React.createElement('p', { className: "text-center text-gray-400 italic" }, "暫無紀錄") :
                        orderHistory.map(ord => React.createElement('div', {
                            key: ord.id,
                            onClick: () => { setCurrentOrder(ord); setShowBarcode(true); },
                            className: "bg-gray-50 p-4 rounded-2xl mb-3 flex justify-between items-center cursor-pointer border"
                        }, 
                            React.createElement('div', null,
                                React.createElement('div', { className: "text-rose-500 font-black" }, "BW-" + ord.id),
                                React.createElement('div', { className: "text-[10px] text-gray-400" }, ord.date)
                            ),
                            React.createElement('div', { className: "font-black" }, "$" + ord.total)
                        ))
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
