<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | Expo System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b08d57; --soft-pink: #fff5f5; --stone-bg: #fdfcfb; }
        body { font-family: -apple-system, "PingFang HK", sans-serif; background-color: var(--stone-bg); color: #333; }
        .sidebar-item.active { background: white; border-left: 4px solid var(--gold); color: #000; font-weight: bold; }
        .bottom-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        .bottom-sheet.active { display: flex; }
        .sheet-content { background: white; width: 100%; border-radius: 24px 24px 0 0; max-height: 92vh; overflow-y: auto; position: relative; }
        
        /* 修正：預設隱藏後台工具條 */
        .admin-only-ui { display: none !important; }
        body.admin-mode .admin-only-ui { display: flex !important; }

        .img-preview { width: 100%; height: 150px; border: 2px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
        .status-dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="admin-only-ui bg-zinc-900 text-white text-[10px] px-4 py-2 flex justify-between items-center z-[60]">
        <span><i class="fa-solid fa-gear mr-1"></i> 管理模式已啟動</span>
        <button onclick="openAdmin()" class="bg-white text-black px-3 py-1 rounded font-bold uppercase">開啟後台編輯器</button>
    </div>

    <header class="bg-white border-b sticky top-0 z-40">
        <div class="bg-stone-50 text-[10px] text-center py-2 px-4 leading-relaxed text-stone-500 border-b">
            此網站只適用於展場下單，非展場客戶請到官網下單<br>
            <span class="underline">https://www.bespoke-mall.com/</span>
        </div>
        <div class="flex justify-between items-center px-6 py-4">
            <h1 class="text-xl font-light tracking-widest text-cyan-600">☆ BESPOKE MALL</h1>
            <button onclick="adminLogin()" class="text-stone-100"><i class="fa-solid fa-user-circle text-2xl"></i></button>
        </div>
        <div class="flex text-sm">
            <button onclick="switchTab('v')" id="tab-v" class="flex-1 py-3 border-b-2 border-gold font-bold">禮券</button>
            <button onclick="switchTab('g')" id="tab-g" class="flex-1 py-3 border-b-2 border-transparent text-stone-400">回禮</button>
        </div>
    </header>

    <main id="view-shop" class="flex-1 flex overflow-hidden">
        <aside id="brand-sidebar" class="w-24 bg-stone-100 overflow-y-auto border-r text-[11px]"></aside>
        <section class="flex-1 overflow-y-auto p-4 space-y-4 pb-32" id="product-list"></section>
    </main>

    <main id="view-orders" class="hidden flex-1 overflow-y-auto bg-stone-50 p-4 pb-32">
        <h2 class="text-center font-bold text-lg mb-4">我的訂單</h2>
        <div class="flex justify-center gap-8 mb-6 text-sm">
            <span class="border-b-2 border-gold pb-1 font-bold">今日訂單</span>
            <span class="text-stone-400">歷史訂單</span>
        </div>
        <div id="order-container" class="space-y-4"></div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 pb-6 z-50">
        <button onclick="showPage('shop')" class="flex flex-col items-center gap-1">
            <i class="fa-solid fa-list-check text-stone-400" id="nav-shop-icon"></i>
            <span class="text-[10px]" id="nav-shop-text">點單</span>
        </button>
        <button onclick="showPage('orders')" class="flex flex-col items-center gap-1">
            <i class="fa-solid fa-receipt text-stone-400" id="nav-order-icon"></i>
            <span class="text-[10px]" id="nav-order-text">取單</span>
        </button>
    </nav>

    <div id="cart-float" class="fixed bottom-20 left-4 right-4 bg-stone-800 text-white rounded-full h-14 flex items-center px-6 justify-between shadow-2xl z-40 hidden">
        <div class="flex items-center gap-3">
            <div class="relative">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>
            </div>
            <span id="cart-price" class="font-bold">HK$0</span>
        </div>
        <button onclick="openConfirmSheet()" class="bg-orange-200 text-stone-800 px-6 py-2 rounded-full font-bold text-sm">結帳</button>
    </div>

    <div id="sheet-detail" class="bottom-sheet" onclick="closeSheet('sheet-detail')">
        <div class="sheet-content p-6" onclick="event.stopPropagation()">
            <div id="det-img" class="w-full h-64 bg-stone-50 rounded-2xl mb-4 bg-center bg-contain bg-no-repeat"></div>
            <h2 id="det-name" class="text-lg font-bold mb-1"></h2>
            <p id="det-expiry" class="text-[10px] text-stone-400 mb-4"></p>
            <div id="det-tiers" class="space-y-2 mb-6"></div>
            <div class="flex justify-between items-center bg-stone-50 p-4 rounded-xl mb-6">
                <span class="text-sm font-bold">訂購數量</span>
                <div class="flex items-center gap-4">
                    <button onclick="updateQty(-1)" class="w-8 h-8 border rounded-lg bg-white">-</button>
                    <span id="det-qty" class="font-bold w-8 text-center">10</span>
                    <button onclick="updateQty(1)" class="w-8 h-8 border rounded-lg bg-white text-gold font-bold">+</button>
                </div>
            </div>
            <div class="flex items-center justify-between mb-6 px-2">
                <span id="det-total" class="text-xl font-black text-orange-600">HK$ 0</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button class="py-4 border rounded-full font-bold text-stone-400">立即購買</button>
                <button onclick="addToCart()" class="py-4 bg-stone-800 text-white rounded-full font-bold">加入購物車</button>
            </div>
        </div>
    </div>

    <div id="sheet-confirm" class="bottom-sheet" onclick="closeSheet('sheet-confirm')">
        <div class="sheet-content min-h-[90vh]" onclick="event.stopPropagation()">
            <div class="p-6 border-b text-center relative">
                <button onclick="closeSheet('sheet-confirm')" class="absolute left-6 text-xl">❮</button>
                <span class="font-bold">確認訂單</span>
            </div>
            <div class="p-6 space-y-4">
                <div class="bg-yellow-50 text-orange-800 p-3 rounded-lg text-xs text-center font-bold italic">
                    前方 <span class="text-lg">05</span> 張訂單準備中
                </div>
                <div class="flex items-center justify-between p-4 bg-white border rounded-xl shadow-sm">
                    <span class="text-sm">聯絡電話</span>
                    <div class="flex gap-2">
                        <input type="tel" id="user-phone" placeholder="選填，便於聯繫" class="text-right text-sm outline-none">
                        <button class="text-[10px] bg-stone-100 px-2 py-1 rounded">獲取</button>
                    </div>
                </div>
                <button onclick="openForm('form-gift')" class="w-full p-4 bg-white border rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-sm font-bold">購買回禮產品必填 (按此填寫資料)</span>
                    <i class="fa-solid fa-chevron-right text-stone-300"></i>
                </button>
                <button onclick="openForm('form-stock')" class="w-full p-4 bg-white border rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-sm font-bold">產品缺貨時必填 (按此填寫資料)</span>
                    <i class="fa-solid fa-chevron-right text-stone-300"></i>
                </button>
                <div id="confirm-list" class="space-y-3 pt-4"></div>
                <div class="bg-red-50 p-4 rounded-xl text-[10px] text-stone-500 leading-relaxed italic">
                    下單前請確認各款禮券的有效期是否適用<br>下單後將無法退款/更改資料
                </div>
            </div>
            <div class="sticky bottom-0 bg-white p-6 border-t flex justify-between items-center">
                <span id="final-total" class="text-lg font-black">合共 HK$ 0</span>
                <button onclick="submitOrder()" class="bg-stone-800 text-white px-10 py-3 rounded-full font-bold">提交訂單</button>
            </div>
        </div>
    </div>

    <div id="form-gift" class="bottom-sheet" onclick="closeSheet('form-gift')">
        <div class="sheet-content p-6" onclick="event.stopPropagation()">
            <div class="h-16 bg-pink-50 rounded-t-2xl -mx-6 -mt-6 mb-6 flex items-center justify-center">
                <h3 class="text-gold font-bold">《 購買回禮產品必填 》</h3>
            </div>
            <div class="space-y-4">
                <input type="text" placeholder="收件人姓名" class="w-full p-4 bg-stone-50 rounded-xl outline-none">
                <input type="tel" placeholder="收件人電話" class="w-full p-4 bg-stone-50 rounded-xl outline-none">
                <textarea placeholder="送貨地點" class="w-full p-4 bg-stone-50 rounded-xl h-24 outline-none"></textarea>
                <button onclick="closeSheet('form-gift')" class="w-full py-4 bg-stone-800 text-white rounded-full font-bold">確認儲存</button>
            </div>
        </div>
    </div>

    <div id="sheet-admin" class="bottom-sheet" onclick="closeSheet('sheet-admin')">
        <div class="sheet-content p-6 max-h-[92vh]" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">後台管理中心</h2>
                <button onclick="closeSheet('sheet-admin')" class="text-2xl text-stone-300">&times;</button>
            </div>
            <div class="flex gap-4 border-b mb-6 text-sm">
                <button onclick="adminTab('b')" id="ad-btn-b" class="pb-2 border-b-2 border-black font-bold">品牌</button>
                <button onclick="adminTab('p')" id="ad-btn-p" class="pb-2 text-stone-400">產品</button>
            </div>
            <div id="admin-b" class="space-y-4">
                <input type="text" id="new-b-name" placeholder="品牌名稱" class="w-full p-4 border rounded-xl">
                <select id="new-b-cat" class="w-full p-4 border rounded-xl">
                    <option value="v">禮券</option>
                    <option value="g">回禮</option>
                </select>
                <div class="img-preview" onclick="document.getElementById('file-logo').click()" id="logo-preview">點擊上傳品牌 Logo</div>
                <input type="file" id="file-logo" class="hidden" accept="image/*" onchange="handleFile(this, 'logo-preview')">
                <button onclick="saveBrand()" class="w-full py-4 bg-black text-white rounded-xl font-bold">儲存品牌</button>
                <div id="admin-brand-list" class="grid grid-cols-4 gap-2 pt-4"></div>
            </div>
            <div id="admin-p" class="hidden space-y-4 pb-20">
                <input type="text" id="new-p-name" placeholder="產品名稱" class="w-full p-4 border rounded-xl">
                <select id="new-p-brand" class="w-full p-4 border rounded-xl"></select>
                <div class="img-preview" onclick="document.getElementById('file-p').click()" id="p-img-preview">點擊上傳產品圖片</div>
                <input type="file" id="file-p" class="hidden" accept="image/*" onchange="handleFile(this, 'p-img-preview')">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="new-p-price" placeholder="基本單價" class="w-full p-4 border rounded-xl">
                    <input type="number" id="new-p-min" placeholder="最少起訂" class="w-full p-4 border rounded-xl">
                </div>
                <textarea id="new-p-tiers" placeholder="階梯價格格式: 數量-價格 (每行一筆)" class="w-full p-4 border rounded-xl h-24 text-xs"></textarea>
                <button onclick="saveProduct()" class="w-full py-4 bg-black text-white rounded-xl font-bold">發佈產品</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bespoke_v4_fixed')) || { brands: [], products: [], orders: [] };
        let currentTab = 'v', currentBrand = 'all', cart = null, tempImg = "";

        function init() {
            renderSidebar();
            renderProducts();
            updateNavUI('shop');
        }

        // 登入邏輯：輸入密碼後才開啟後台
        function adminLogin() {
            const pass = prompt("請輸入後台管理密碼:");
            if(pass === "5963") {
                document.body.classList.add('admin-mode');
                alert("已切換至管理模式，頂部工具條已顯示。");
                refreshAdminLists();
            } else if(pass !== null) {
                alert("密碼錯誤！");
            }
        }

        function handleFile(input, previewId) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                document.getElementById(previewId).style.backgroundImage = `url(${tempImg})`;
                document.getElementById(previewId).innerText = "";
            };
            reader.readAsDataURL(file);
        }

        function renderSidebar() {
            const container = document.getElementById('brand-sidebar');
            const filtered = db.brands.filter(b => b.cat === currentTab);
            let html = `<div onclick="filterBrand('all')" class="sidebar-item ${currentBrand === 'all' ? 'active' : ''} p-4 text-center">所有品牌</div>`;
            filtered.forEach(b => {
                html += `<div onclick="filterBrand(${b.id})" class="sidebar-item ${currentBrand == b.id ? 'active' : ''} py-5 flex flex-col items-center gap-2">
                    <div class="w-10 h-10 bg-white rounded-full bg-center bg-contain bg-no-repeat border" style="background-image:url(${b.img})"></div>
                    <span class="px-1 text-[10px] text-center truncate w-full">${b.name}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderProducts() {
            const container = document.getElementById('product-list');
            const filtered = db.products.filter(p => p.cat === currentTab && (currentBrand === 'all' || p.brandId == currentBrand));
            if(!filtered.length) {
                container.innerHTML = `<div class="py-20 text-center text-stone-300 text-sm italic">此分類暫無產品內容</div>`;
                return;
            }
            container.innerHTML = filtered.map(p => `
                <div class="flex gap-4 items-center bg-white p-2 rounded-2xl shadow-sm border border-stone-50">
                    <div class="w-24 h-24 bg-stone-50 rounded-xl bg-center bg-contain bg-no-repeat border" style="background-image:url(${p.img})"></div>
                    <div class="flex-1">
                        <h4 class="text-xs font-bold text-stone-800 leading-tight mb-1">${p.name}</h4>
                        <div class="text-[9px] text-stone-400 mb-2">展場限定優惠</div>
                        <div class="flex items-baseline gap-2">
                            <span class="text-orange-600 font-black text-sm">HK$ ${p.price}</span>
                            <span class="text-[9px] text-stone-300 line-through">HK$ ${(p.price * 1.25).toFixed(0)}</span>
                        </div>
                    </div>
                    <button onclick="openDetail(${p.id})" class="w-10 h-10 bg-orange-200 text-orange-900 rounded-full flex items-center justify-center font-bold mr-2">購買</button>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const p = db.products.find(x => x.id == id);
            cart = { ...p, qty: p.min };
            document.getElementById('det-name').innerText = p.name;
            document.getElementById('det-img').style.backgroundImage = `url(${p.img})`;
            document.getElementById('det-qty').innerText = cart.qty;
            document.getElementById('det-expiry').innerText = "有效日期：31/03/2027 (或之後)";
            let tierHtml = (p.tiers || []).map(t => `
                <div class="flex justify-between border-b border-stone-50 py-2 text-xs">
                    <span class="text-stone-400">${t.q} 張或以上</span>
                    <span class="font-bold text-cyan-600 font-mono">HK$ ${t.p}</span>
                </div>
            `).join('');
            document.getElementById('det-tiers').innerHTML = tierHtml;
            calculateTotal();
            openSheet('sheet-detail');
        }

        function updateQty(val) {
            cart.qty = Math.max(cart.min, cart.qty + (val * 10));
            document.getElementById('det-qty').innerText = cart.qty;
            calculateTotal();
        }

        function calculateTotal() {
            let unitPrice = cart.price;
            if(cart.tiers) {
                const match = [...cart.tiers].sort((a,b) => b.q - a.q).find(t => cart.qty >= t.q);
                if(match) unitPrice = match.p;
            }
            cart.currentPrice = unitPrice;
            document.getElementById('det-total').innerText = `HK$ ${(unitPrice * cart.qty).toLocaleString()}`;
        }

        function addToCart() {
            document.getElementById('cart-price').innerText = `HK$ ${(cart.currentPrice * cart.qty).toLocaleString()}`;
            document.getElementById('cart-float').classList.remove('hidden');
            closeSheet('sheet-detail');
        }

        function openConfirmSheet() {
            document.getElementById('confirm-list').innerHTML = `
                <div class="bg-white p-4 rounded-xl border flex gap-4">
                    <img src="${cart.img}" class="w-16 h-16 object-contain">
                    <div class="flex-1">
                        <div class="text-[10px] font-bold">${cart.name}</div>
                        <div class="flex justify-between mt-3">
                            <span class="text-xs text-stone-400">數量: ${cart.qty}</span>
                            <span class="font-bold text-xs text-orange-600">HK$ ${cart.currentPrice}</span>
                        </div>
                    </div>
                </div>`;
            document.getElementById('final-total').innerText = `合共 HK$ ${(cart.currentPrice * cart.qty).toLocaleString()}`;
            openSheet('sheet-confirm');
        }

        function submitOrder() {
            const orderId = 'B' + Math.floor(1000 + Math.random()*9000);
            db.orders.unshift({ id: orderId, items: [cart], total: cart.currentPrice * cart.qty, status: '準備中' });
            saveDB();
            alert("訂單提交成功！單號: " + orderId);
            closeSheet('sheet-confirm');
            document.getElementById('cart-float').classList.add('hidden');
            showPage('orders');
        }

        function renderOrders() {
            const container = document.getElementById('order-container');
            if(!db.orders.length) {
                container.innerHTML = `<div class="text-center py-20 text-stone-200">目前沒有下單紀錄</div>`;
                return;
            }
            container.innerHTML = db.orders.map(o => `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-stone-50">
                    <div class="text-center mb-6">
                        <div class="text-[10px] text-stone-300 font-bold tracking-tighter">${o.status}</div>
                        <div class="text-4xl font-black text-stone-800">${o.id}</div>
                    </div>
                    <div class="flex justify-between items-center px-4 mb-6 relative">
                        <div class="absolute top-1/2 left-8 right-8 h-px bg-stone-100 -translate-y-1/2 -z-10"></div>
                        <div class="flex flex-col items-center gap-1"><div class="status-dot active"></div><span class="text-[8px]">下單</span></div>
                        <div class="flex flex-col items-center gap-1"><div class="status-dot"></div><span class="text-[8px]">付款</span></div>
                        <div class="flex flex-col items-center gap-1"><div class="status-dot active"></div><span class="text-[8px] font-bold">準備</span></div>
                        <div class="flex flex-col items-center gap-1"><div class="status-dot"></div><span class="text-[8px]">取單</span></div>
                    </div>
                    <div class="border-t border-dashed pt-4 text-xs space-y-1">
                        ${o.items.map(i => `<div class="flex justify-between"><span>${i.name}</span><span class="text-stone-400">x${i.qty}</span></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showPage(p) {
            document.getElementById('view-shop').classList.toggle('hidden', p !== 'shop');
            document.getElementById('view-orders').classList.toggle('hidden', p !== 'orders');
            updateNavUI(p);
            if(p === 'orders') renderOrders();
        }

        function updateNavUI(p) {
            const isShop = p === 'shop';
            document.getElementById('nav-shop-icon').className = `fa-solid fa-list-check text-xl ${isShop ? 'text-gold' : 'text-stone-300'}`;
            document.getElementById('nav-shop-text').className = `text-[10px] ${isShop ? 'text-gold font-bold' : 'text-stone-300'}`;
            document.getElementById('nav-order-icon').className = `fa-solid fa-receipt text-xl ${!isShop ? 'text-gold' : 'text-stone-300'}`;
            document.getElementById('nav-order-text').className = `text-[10px] ${!isShop ? 'text-gold font-bold' : 'text-stone-300'}`;
        }

        function switchTab(t) { currentTab = t; currentBrand = 'all'; init(); }
        function filterBrand(id) { currentBrand = id; init(); }
        function openAdmin() { openSheet('sheet-admin'); }
        function openForm(id) { openSheet(id); }
        function openSheet(id) { document.getElementById(id).classList.add('active'); }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); }
        function adminTab(t) {
            document.getElementById('admin-b').classList.toggle('hidden', t !== 'b');
            document.getElementById('admin-p').classList.toggle('hidden', t !== 'p');
            document.getElementById('ad-btn-b').className = t==='b' ? 'pb-2 border-b-2 border-black font-bold' : 'pb-2 text-stone-400';
            document.getElementById('ad-btn-p').className = t==='p' ? 'pb-2 border-b-2 border-black font-bold' : 'pb-2 text-stone-400';
        }

        function saveBrand() {
            const name = document.getElementById('new-b-name').value;
            const cat = document.getElementById('new-b-cat').value;
            if(!name) return alert("名稱必填");
            db.brands.push({ id: Date.now(), name, cat, img: tempImg });
            saveDB();
            refreshAdminLists();
            tempImg = "";
            document.getElementById('logo-preview').style.backgroundImage = "";
            document.getElementById('logo-preview').innerText = "上傳完畢";
        }

        function saveProduct() {
            const name = document.getElementById('new-p-name').value;
            const brandId = document.getElementById('new-p-brand').value;
            const price = parseFloat(document.getElementById('new-p-price').value);
            const min = parseInt(document.getElementById('new-p-min').value);
            const tiersRaw = document.getElementById('new-p-tiers').value;
            const tiers = tiersRaw.split('\n').filter(r => r.includes('-')).map(r => {
                const [q, p] = r.split('-');
                return { q: parseInt(q), p: parseFloat(p) };
            });
            const brand = db.brands.find(b => b.id == brandId);
            db.products.push({ id: Date.now(), name, brandId, cat: brand.cat, price, min, img: tempImg, tiers });
            saveDB();
            refreshAdminLists();
            alert("產品已發佈");
        }

        function refreshAdminLists() {
            document.getElementById('admin-brand-list').innerHTML = db.brands.map(b => `<div class="border text-[8px] p-1 text-center truncate"><img src="${b.img}" class="h-6 mx-auto">${b.name}</div>`).join('');
            document.getElementById('new-p-brand').innerHTML = db.brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        }

        function saveDB() {
            localStorage.setItem('bespoke_v4_fixed', JSON.stringify(db));
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
