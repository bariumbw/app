<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESPOKE 囍帖預覽器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        /* 核心畫布設定 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-color: #FFFDD0; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            container-type: inline-size;
            background-image: url('./bg10.jpg?v=20260429_v4'); 
        }

        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }
        .font-lora { font-family: 'Lora', serif; }

        /* 文字圖層 */
        .bride-layer { position: absolute; top: 24%; left: 0; width: 50%; color: #8B4513; z-index: 10; display: flex; justify-content: center; transform: translateX(-3.2cqw); }
        .groom-layer { position: absolute; top: 43.5%; left: 0; width: 50%; color: #8B4513; z-index: 10; display: flex; justify-content: center; transform: translateX(8.2cqw); }
        .name-wrap { width: 80%; text-align: center; }
        #pBride, #pGroom { font-size: 4.5cqw; line-height: 1; white-space: nowrap; display: inline-block; }
        
        .date-container-new {
            position: absolute;
            top: 64%; 
            left: 4.5%;
            width: 41%;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8B4513;
            font-family: 'Lora', serif;
        }

        .date-row-bottom {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            text-align: center;
        }
        .date-side {
            font-size: 2.8cqw;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .date-main {
            font-size: 7.2cqw;
            font-weight: 500;
            line-height: 1;
            padding: 0 2cqw;
        }

        .week-container-under {
            position: absolute;
            top: 79%; 
            left: 4.5%;
            width: 41%;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8B4513;
            font-family: 'Lora', serif;
            z-index: 15;
        }
        
        .date-row-top-svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }
        .date-row-top-svg text {
            fill: #8B4513;
            font-family: 'Lora', serif;
            font-size: 6px; 
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }

        .venue-layer { 
            position: absolute; 
            top: 75%; 
            left: 5.5%; 
            width: 39%; 
            text-align: center; 
            color: #8B4513; 
            text-transform: uppercase; 
            font-size: 2.2cqw; 
            font-weight: 700;
            font-family: 'Lora', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
        }
        #pVenue {
            display: inline-block;
            white-space: nowrap;
        }

        .address-layer { 
            position: absolute; 
            top: 79%; 
            left: 2%; 
            width: 46%; 
            text-align: center; 
            color: #8B4513; 
            text-transform: uppercase; 
            font-size: 1.3cqw; 
            line-height: 1.2; 
            font-family: 'Lora', serif;
        }

        /* 產品詳情面板 */
        .info-panel {
            position: absolute; top: 5%; right: 5%; width: 40cqw; height: 64cqw;
            background: rgba(255,255,255,0.12); padding: 1.5cqw; border-radius: 2cqw;
            z-index: 20; backdrop-filter: blur(8px); display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1); gap: 0;
        }

        .brand-logo-wrap { flex: 0 0 15%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #pDetailBrandImg { max-width: 60%; max-height: 85%; object-fit: contain; }

        .qrcode-section { flex: 0 0 15%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qrcode-img { width: 6cqw; height: 6cqw; background: #000; }
        .expiry-date { color: #8B4513; opacity: 0.7; font-size: 0.7cqw; font-family: sans-serif; margin-top: 0.2cqw; }

        .prod-name-wrap { flex: 0 0 10%; display: flex; align-items: center; justify-content: center; text-align: center; }
        #pDetailProdName { font-weight: bold; color: #8B4513; line-height: 1.1; font-size: 3cqw; }

        .tc-wrap { flex: 0 0 40%; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        #pDetailTC { color: #8B4513; opacity: 0.8; line-height: 1.1; word-break: break-all; white-space: pre-wrap; text-align: left; width: 100%; }

        .footer-border { flex: 0 0 2%; border-top: 1px solid rgba(139, 69, 19, 0.15); margin-top: 2%; }
