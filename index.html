<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 - 完整功能版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        /* 核心修改：使用容器查詢單位 (cqw) 確保手機與電腦比例完全一致 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg?v=12'); 
            background-color: #A62C3E; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            container-type: inline-size; /* 啟用容器查詢 */
        }

        /* 字體定義 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }
        .font-impact { font-family: 'Impact', 'Arial Black', sans-serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }

        /* 姓名區域獨立排版 - 改用 cqw 確保等比例縮放 */
        .bride-layer {
            position: absolute;
            top: 20%; 
            left: 0; 
            width: 50%; 
            color: #FFFFFF;
            z-index: 10;
            display: flex;
            justify-content: center;
            transform: translateX(-1.2cqw); /* 相對比例位移 */
        }

        .groom-layer {
            position: absolute;
            top: 41.5%; 
            left: 0; 
            width: 50%; 
            color: #FFFFFF;
            z-index: 10;
            display: flex;
            justify-content: center;
            transform: translateX(6.2cqw); /* 相對比例位移 */
        }

        .name-wrap {
            width: 80%; 
            text-align: center;
        }

        #pBride, #pGroom {
            font-size: 5cqw; /* 改用容器寬度單位 */
            line-height: 1;
            white-space: nowrap;
            display: inline-block;
        }

        /* 日期地址定位 - 全部改用 cqw 確保手機比例不跑掉 */
        .date-layer { 
            position: absolute; 
            top: 64%; 
            left: 9%; 
            width: 32%; 
            text-align: center; 
            color: #FFFFFF; 
            font-size: 2cqw;
            letter-spacing: 0.25em;
        }
        .venue-layer { 
            position: absolute; 
            top: 72%; 
            left: 5.5%; 
            width: 39%; 
            text-align: center; 
            color: #FFFFFF; 
            text-transform: uppercase; 
            font-size: 1.6cqw;
        }
        .address-layer { 
            position: absolute; 
            top: 77%; 
            left: 2%; 
            width: 46%; 
            text-align: center; 
            color: #FFFFFF; 
            text-transform: uppercase; 
            font-size: 1.6cqw;
            line-height: 1.2;
        }

        /* 產品詳情面板 */
        .info-panel {
            position: absolute;
            top: 7%;
            right: 3%;
            width: 40cqw; /* 改用相對寬度 */
            height: 55cqw;
            background: rgba(255,255,255,0.15);
            padding: 2cqw;
            border-radius: 2cqw;
            display: none;
            z-index: 20;
            backdrop-filter: blur(7px);
            overflow: hidden;
        }

        #pDetailTC {
            display: -webkit-box;
            -webkit-line-clamp: 25; 
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-all;
            font-size: 1.2cqw;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center relative">
            <div class="preview-canvas" id="mainCanvas">
                <div class="voucher-layer"><img id="pVoucher" src="" class="hidden"></div>
                
                <div class="bride-layer font-aniyah">
                    <div class="name-wrap"><h1 id="pBride">Christian</h1></div>
                </div>

                <div class="groom-layer font-aniyah">
                    <div class="name-wrap"><h1 id="pGroom">Benjamin</h1></div>
                </div>

                <div class="date-layer font-aloja">
                    <span id="pDate" class="uppercase">October 15, 2026</span>
                </div>
                <div class="venue-layer font-impact">
                    <span id="pVenue">Four Seasons Grand Ballroom</span>
                </div>
                <div class="address-layer font-impact">
                    <span id="pAddress" class="opacity-90">8 Finance Street, Central, Hong Kong</span>
                </div>
                
                <div id="pDetailPanel" class="info-panel shadow-2xl border border-zinc-200">
                    <img id="pDetailBrandImg" src="" class="w-full h-12 object-contain mb-3">
                    <h4 id="pDetailProdName" class="font-bold text-orange-500 mb-2 leading-tight"></h4>
                    <p id="pDetailTC" class="text-zinc-400 leading-tight"></p>
                </div>
            </div>
        </div>

        <div class="bg-zinc-50 rounded-[2rem] shadow-2xl h-fit border border-zinc-100 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 custom-scroll overflow-y-auto">
                
                <section class="mb-8">
                    <h2 class="text-xl font-bold text-zinc-800 mb-6 flex items-center font-im-fell italic">
                        <span class="w-7 h-7 bg-zinc-900 text-white rounded-full flex items-center justify-center text-[10px] mr-3 font-sans not-italic">01</span>
                        設計編輯器
                    </h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">新娘名字</label>
                                <input type="text" id="iBride" value="Christian" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 text-lg font-impact">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">新郎名字</label>
                                <input type="text" id="iGroom" value="Benjamin" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 text-lg font-impact">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">婚禮日期</label>
                            <input type="date" id="iDate" value="2026-10-15" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 text-red-900 font-sans font-bold">
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">宴客場地</label>
                            <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 uppercase text-xs font-impact">
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-zinc-400 uppercase mb-1">詳細地址</label>
                            <textarea id="iAddress" rows="2" class="w-full p-3 bg-zinc-50 border rounded-xl outline-none focus:border-zinc-900 uppercase text-[10px] font-impact">8 Finance Street, Central, Hong Kong</textarea>
                        </div>
                    </div>
                </section>

                <hr class="mb-8 border-zinc-100">

                <section class="mb-8">
                    <h2 class="text-xl font-bold text-zinc-800 mb-6 flex items-center font-im-fell italic">
                        <span class="w-7 h-7 bg-zinc-900 text-white rounded-full flex items-center justify-center text-[10px] mr-3 font-sans not-italic">02</span>
                        禮券品牌
                    </h2>
                    <div id="brandGrid" class="grid grid-cols-4 gap-2"></div>
                </section>

                <section id="productSection" class="mb-8 hidden animate-fade-in">
                    <h3 id="selectedBrandTitle" class="text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-3 border-b pb-1">產品列表</h3>
                    <div id="productGrid" class="grid grid-cols-1 gap-2"></div>
                </section>

                <button class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg hover:bg-zinc-800 transition-all mb-4">
                    確認並保存設計
                </button>

                <a href="admin.html" class="block text-center text-zinc-400 text-[10px] font-bold uppercase tracking-tighter hover:text-zinc-900 transition-colors">
                    員工後台入口
                </a>
            </div>
        </div>
    </div>

    <script>
        // 核心修改：autoScale 現在基於 cqw 容器寬度計算，確保手機版不會字體過大
        function autoScaleText(element) {
            const parent = element.parentElement;
            let fontSizeInCqw = 5; // 初始字體大小 (5cqw)
            element.style.fontSize = fontSizeInCqw + 'cqw';

            // 只要文字寬度超過容器寬度，就縮小 cqw 數值
            while (element.scrollWidth > parent.offsetWidth && fontSizeInCqw > 1) {
                fontSizeInCqw -= 0.1;
                element.style.fontSize = fontSizeInCqw + 'cqw';
            }
        }

        // 品牌資料處理邏輯
        let brandsDB = JSON.parse(localStorage.getItem('wedding_brands')) || [];
        let productsDB = JSON.parse(localStorage.getItem('wedding_products')) || [];

        // 重要提示：localStorage 無法跨瀏覽器分享。
        // 若要讓「所有人」看到，未來需將此處改為 fetch API 讀取伺服器資料。

        function init() {
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = '';
            
            if(brandsDB.length === 0) {
                grid.innerHTML = '<p class="col-span-4 text-center text-[10px] text-zinc-400 py-4 italic border-2 border-dashed rounded-xl">請前往後台登記品牌以供所有人瀏覽</p>';
                return;
            }

            brandsDB.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = "aspect-square border-2 border-zinc-50 bg-zinc-200 p-2 hover:border-zinc-900 rounded-xl transition-all flex items-center justify-center overflow-hidden shadow-sm";
                btn.onclick = () => showProducts(brand.name, brand.img);
                btn.innerHTML = `<img src="${brand.img}" class="max-h-full max-w-full object-contain" alt="${brand.name}">`;
                grid.appendChild(btn);
            });
            
            setTimeout(() => {
                autoScaleText(document.getElementById('pBride'));
                autoScaleText(document.getElementById('pGroom'));
                sync(); 
            }, 100);
        }

        function showProducts(bName, bImg) {
            const section = document.getElementById('productSection');
            const grid = document.getElementById('productGrid');
            const title = document.getElementById('selectedBrandTitle');
            section.classList.remove('hidden');
            title.innerText = `${bName} 產品選擇`;
            grid.innerHTML = '';
            const filteredProds = productsDB.filter(p => p.brandName === bName);
            if(filteredProds.length === 0) {
                grid.innerHTML = '<p class="text-[10px] text-zinc-400 italic">此品牌暫無可選產品</p>';
                return;
            }
            filteredProds.forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 border border-zinc-100 rounded-xl hover:bg-zinc-900 hover:text-white text-xs font-bold transition-all shadow-sm";
                btn.innerText = p.product;
                btn.onclick = () => applySelection(bImg, p.product, p.tc);
                grid.appendChild(btn);
            });
        }

        function applySelection(img, name, tc) {
            document.getElementById('pDetailPanel').style.display = 'block';
            document.getElementById('pDetailBrandImg').src = img;
            document.getElementById('pDetailProdName').innerText = name;
            document.getElementById('pDetailTC').innerText = tc;
        }

        const sync = () => {
            const bride = document.getElementById('pBride');
            const groom = document.getElementById('pGroom');
            bride.innerText = document.getElementById('iBride').value;
            groom.innerText = document.getElementById('iGroom').value;

            const dateVal = document.getElementById('iDate').value;
            if (dateVal) {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                const formattedDate = new Date(dateVal).toLocaleDateString('en-US', options);
                document.getElementById('pDate').innerText = formattedDate;
            }
            
            document.getElementById('pVenue').innerText = document.getElementById('iVenue').value;
            document.getElementById('pAddress').innerText = document.getElementById('iAddress').value;

            autoScaleText(bride);
            autoScaleText(groom);
        };

        ['iBride', 'iGroom', 'iDate', 'iVenue', 'iAddress'].forEach(id => {
            document.getElementById(id).addEventListener('input', sync);
        });

        window.onload = init;
    </script>
</body>
</html>
