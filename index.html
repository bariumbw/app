<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖自訂預覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        /* 強制 2400x1700 畫布比例 */
        .canvas {
            width: 100%;
            max-width: 960px; /* 網頁呈現寬度 */
            aspect-ratio: 2400 / 1700;
            position: relative;
            background-image: url('DESIGN PREVIEW 圖.jpg'); /* 請確認路徑 */
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 字體設定 */
        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aloja { font-family: 'Patrick Hand', cursive; }

        /* 保護浮水印 */
        .watermark {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><text x="50" y="50" font-family="Arial" font-size="5" fill="white" fill-opacity="0.1" text-anchor="middle" transform="rotate(-30 50 50)">DESIGN PREVIEW</text></svg>');
            z-index: 50;
            pointer-events: none;
        }

        /* 根據「可供更改的地方.jpg」設定的文字區域定位 */
        
        /* 姓名區 (Christian and Benjamin) */
        .area-names {
            position: absolute;
            top: 36%;
            left: 5%;
            width: 44%;
            text-align: center;
        }

        /* 日期區 (OCTOBER 15, 2026) */
        .area-date {
            position: absolute;
            top: 70.2%;
            left: 11%;
            width: 32%;
            text-align: center;
        }

        /* 場地區 (FOUR SEASONS GRAND BALLROOM) */
        .area-venue {
            position: absolute;
            top: 77%;
            left: 7.5%;
            width: 39%;
            text-align: center;
        }

        /* 地址區 (8 FINANCE STREET...) */
        .area-address {
            position: absolute;
            top: 82.5%;
            left: 4%;
            width: 46%;
            text-align: center;
        }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-[1fr,380px] gap-12">
        
        <div class="flex flex-col items-center">
            <div class="canvas font-im-fell">
                <div class="watermark"></div>

                <div class="area-names">
                    <h1 id="pNames" class="text-4xl md:text-7xl italic leading-tight tracking-tight">
                        Christian<br>
                        <span class="text-2xl md:text-4xl opacity-90">and</span><br>
                        Benjamin
                    </h1>
                </div>

                <div class="area-date">
                    <span id="pDate" class="font-aloja text-2xl md:text-4xl tracking-wide uppercase">October 15, 2026</span>
                </div>

                <div class="area-venue">
                    <span id="pVenue" class="text-sm md:text-xl font-bold tracking-[0.2em] uppercase">Four Seasons Grand Ballroom</span>
                </div>

                <div class="area-address">
                    <span id="pAddress" class="text-[10px] md:text-sm opacity-90 tracking-widest uppercase">8 Finance Street, Central, Hong Kong</span>
                </div>
            </div>
            <p class="text-zinc-500 mt-4 text-xs tracking-widest uppercase">Scale: 2400 x 1700 px | Aspect Ratio Locked</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-2xl">
            <h2 class="text-2xl font-bold text-zinc-800 mb-8 border-b pb-4">編輯邀請函</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest">新人姓名 (分行顯示)</label>
                    <textarea id="iNames" rows="3" class="w-full mt-1 p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-im-fell italic text-xl">Christian
and
Benjamin</textarea>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest">婚禮日期 (Aloja Font)</label>
                    <input type="text" id="iDate" value="October 15, 2026" class="w-full mt-1 p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-aloja text-xl">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest">宴客場地</label>
                    <input type="text" id="iVenue" value="Four Seasons Grand Ballroom" class="w-full mt-1 p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none uppercase font-bold">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest">詳細地址</label>
                    <textarea id="iAddress" rows="2" class="w-full mt-1 p-3 bg-zinc-50 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-sm">8 Finance Street, Central, Hong Kong</textarea>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-zinc-100">
                <p class="text-[10px] text-zinc-400 leading-relaxed italic">
                    * 文字位置與「可供更改的地方.jpg」標註區域嚴格一致。<br>
                    * 字體已根據要求設定：姓名/場地/地址為 IM Fell，日期為 Aloja。
                </p>
            </div>
        </div>
    </div>

    <script>
        // 即時預覽邏輯
        const sync = (idIn, idOut, isHTML = false) => {
            const input = document.getElementById(idIn);
            const output = document.getElementById(idOut);
            input.addEventListener('input', () => {
                const val = input.value;
                if (isHTML) {
                    // 將換行符轉為 <br>
                    output.innerHTML = val.replace(/\n/g, '<br>');
                } else {
                    output.innerText = val;
                }
            });
        };

        sync('iNames', 'pNames', true);
        sync('iDate', 'pDate');
        sync('iVenue', 'pVenue');
        sync('iAddress', 'pAddress');
    </script>
</body>
</html>
