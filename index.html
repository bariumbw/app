<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | 專業展場訂購系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .active-tab { color: #f43f5e; border-bottom: 3px solid #f43f5e; }
        .admin-input { border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; width: 100%; font-size: 14px; }
        .yellow-label { background: #fde047; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 初始預設資料 (若 localStorage 為空時使用) ---
        const DEFAULT_BRANDS = [
            { id: 1, name: "agnès b.", img: "https://www.bespoke-wedding.com/sites/default/files/%E7%A6%AE%E5%8D%A1/Agne%CC%80s%20b.png", category: "Gift Card" },
            { id: 2, name: "永樂", img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/winglok_LOGO.webp", category: "Favor" }
        ];

        const DEFAULT_PRODUCTS = [
            { id: 101, name: "agnès b. $50禮券", brandId: 1, category: "Gift Card", status: "enabled", img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/禮卡png/agnes50.png", desc: "法式時尚禮券", tc: "不可兌換現金", expiry: "2026-12-31", minQty: 10, originalPrice: 50, payments: ["Visa", "PayMe"], tiers: [{q: 10, p: 42.5}, {q: 50, p: 40}] },
            { id: 102, name: "有麵子回禮小禮物", brandId: 2, category: "Favor", status: "enabled", img: "https://www.bespoke-wedding.com/sites/default/files/禮卡/永樂%20有麵子%20回禮小禮物%20.jpg", desc: "傳統手工麵食", tc: "需提前14天預訂", expiry: "2026-12-31", minQty: 20, originalPrice: 38, payments: ["Visa", "FPS"], tiers: [{q: 20, p: 30}] }
        ];

        const App = () => {
            // --- 狀態管理 ---
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminTab, setAdminTab] = useState('brand'); // brand, product, discount
            const [view, setView] = useState('shop'); // shop, history, checkout
            const [brands, setBrands] = useState(() => JSON.parse(localStorage.getItem('bw_brands')) || DEFAULT_BRANDS);
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('bw_products')) || DEFAULT_PRODUCTS);
            const [activeCategory, setActiveCategory] = useState('Gift Card');
            const [selectedBrand, setSelectedBrand] = useState(null);
            const [cart, setCart] = useState({});
            const [orderHistory, setOrderHistory] = useState(() => JSON.parse(localStorage.getItem('bw_history')) || []);
            const [currentOrder, setCurrentOrder] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [phone, setPhone] = useState('');
            const [clickCount, setClickCount] = useState(0);

            // --- 持久化儲存 ---
            useEffect(() => { localStorage.setItem('bw_brands', JSON.stringify(brands)); }, [brands]);
            useEffect(() => { localStorage.setItem('bw_products', JSON.stringify(products)); }, [products]);
            useEffect(() => { localStorage.setItem('bw_history', JSON.stringify(orderHistory)); }, [orderHistory]);

            // --- 後台登入邏輯 (點擊標題3次) ---
            const handleTitleClick = () => {
                const newCount = clickCount + 1;
                if (newCount >= 3) {
                    const pass = prompt("請輸入管理員密碼：");
                    if (pass === "5963") { setIsAdmin(true); setView('admin'); }
                    setClickCount(0);
                } else { setClickCount(newCount); }
            };

            // --- 價格計算 ---
            const getActivePrice = (product, qty) => {
                if (!product) return 0;
                const activeQty = qty || product.minQty;
                const matchTier = [...(product.tiers || [])].sort((a,b) => b.q - a.q).find(t => activeQty >= t.q);
                return matchTier ? matchTier.p : product.originalPrice;
            };

            const cartItems = useMemo(() => {
                return Object.entries(cart).map(([id, qty]) => {
                    const p = products.find(x => x.id == id);
                    return { ...p, qty, currentPrice: getActivePrice(p, qty) };
                });
            }, [cart, products]);

            const totalAmount = cartItems.reduce((acc, item) => acc + (item.currentPrice * item.qty), 0);

            // --- 購物車操作 ---
            const updateCart = (id, delta) => {
                const p = products.find(x => x.id == id);
                setCart(prev => {
                    const curr = prev[id] || 0;
                    let next = curr + delta;
                    if (curr === 0 && delta > 0) next = p.minQty;
                    else if (curr === p.minQty && delta < 0) next = 0;
                    const newCart = { ...prev };
                    if (next <= 0) delete newCart[id]; else newCart[id] = next;
                    return newCart;
                });
            };

            // --- 提交訂單 ---
            const submitOrder = async () => {
                if (!phone) return alert("請輸入聯絡電話以獲取號碼！");
                setIsSubmitting(true);
                const orderId = Math.floor(100000 + Math.random() * 900000);
                const newOrder = {
                    id: orderId,
                    phone,
                    items: cartItems,
                    total: totalAmount,
                    time: new Date().toLocaleString()
                };
                setOrderHistory([newOrder, ...orderHistory]);
                setCurrentOrder(newOrder);
                setCart({});
                setPhone('');
                setView('barcode');
                setIsSubmitting(false);
            };

            // --- 後台組件：品牌管理 ---
            const AdminBrand = () => {
                const [editItem, setEditItem] = useState({ name: '', img: '', category: 'Gift Card' });
                const addBrand = () => {
                    if (!editItem.name) return;
                    setBrands([...brands, { ...editItem, id: Date.now() }]);
                    setEditItem({ name: '', img: '', category: 'Gift Card' });
                };
                return React.createElement('div', { className: "space-y-6" },
                    React.createElement('div', { className: "bg-white p-4 rounded-2xl shadow-sm border space-y-3" },
                        React.createElement('h3', { className: "font-bold border-b pb-2" }, "新增/編輯品牌系列"),
                        React.createElement('input', { placeholder: "品牌名稱", className: "admin-input", value: editItem.name, onChange: e => setEditItem({...editItem, name: e.target.value}) }),
                        React.createElement('input', { placeholder: "品牌 Logo 網址", className: "admin-input", value: editItem.img, onChange: e => setEditItem({...editItem, img: e.target.value}) }),
                        React.createElement('select', { className: "admin-input", value: editItem.category, onChange: e => setEditItem({...editItem, category: e.target.value}) },
                            React.createElement('option', { value: "Gift Card" }, "禮券"),
                            React.createElement('option', { value: "Favor" }, "回禮")
                        ),
                        React.createElement('button', { onClick: addBrand, className: "w-full bg-slate-900 text-white py-3 rounded-xl font-bold" }, "確認儲存")
                    ),
                    React.createElement('div', { className: "grid grid-cols-1 gap-3" },
                        brands.map(b => React.createElement('div', { key: b.id, className: "bg-white p-4 rounded-xl flex justify-between items-center border" },
                            React.createElement('div', { className: "flex items-center gap-3" },
                                React.createElement('img', { src: b.img, className: "w-10 h-10 object-contain" }),
                                React.createElement('div', null,
                                    React.createElement('p', { className: "font-bold" }, b.name),
                                    React.createElement('p', { className: "text-[10px] text-gray-400" }, b.category)
                                )
                            ),
                            React.createElement('button', { onClick: () => setBrands(brands.filter(x => x.id !== b.id)), className: "text-red-500 text-xs" }, "刪除")
                        ))
                    )
                );
            };

            // --- 後台組件：產品管理 ---
            const AdminProduct = () => {
                const [newItem, setNewItem] = useState({
                    name: '', status: 'enabled', img: '', category: 'Gift Card', brandId: brands[0]?.id,
                    desc: '', tc: '', expiry: '', minQty: 1, originalPrice: 0, payments: [], tiers: []
                });

                const addProduct = () => {
                    setProducts([...products, { ...newItem, id: Date.now() }]);
                    alert("產品已發佈");
                };

                return React.createElement('div', { className: "space-y-4 pb-20" },
                    React.createElement('div', { className: "bg-white p-4 rounded-2xl border space-y-3" },
                        React.createElement('div', { className: "flex justify-between items-center" },
                            React.createElement('h3', { className: "font-bold" }, "發佈新產品"),
                            React.createElement('select', { value: newItem.status, onChange: e => setNewItem({...newItem, status: e.target.value}), className: "text-xs border p-1 rounded" },
                                React.createElement('option', { value: "enabled" }, "啟用中"),
                                React.createElement('option', { value: "disabled" }, "已停用")
                            )
                        ),
                        React.createElement('input', { placeholder: "產品名稱", className: "admin-input", value: newItem.name, onChange: e => setNewItem({...newItem, name: e.target.value}) }),
                        React.createElement('input', { placeholder: "產品圖片網址", className: "admin-input", value: newItem.img, onChange: e => setNewItem({...newItem, img: e.target.value}) }),
                        React.createElement('div', { className: "grid grid-cols-2 gap-2" },
                            React.createElement('select', { className: "admin-input", value: newItem.category, onChange: e => setNewItem({...newItem, category: e.target.value}) },
                                React.createElement('option', { value: "Gift Card" }, "禮券"),
                                React.createElement('option', { value: "Favor" }, "回禮")
                            ),
                            React.createElement('select', { className: "admin-input", value: newItem.brandId, onChange: e => setNewItem({...newItem, brandId: e.target.value}) },
                                brands.map(b => React.createElement('option', { key: b.id, value: b.id }, b.name))
                            )
                        ),
                        React.createElement('textarea', { placeholder: "產品說明", className: "admin-input h-20", onChange: e => setNewItem({...newItem, desc: e.target.value}) }),
                        React.createElement('textarea', { placeholder: "T&C 條款", className: "admin-input h-20", onChange: e => setNewItem({...newItem, tc: e.target.value}) }),
                        React.createElement('div', { className: "grid grid-cols-2 gap-2" },
                            React.createElement('input', { type: "date", className: "admin-input", onChange: e => setNewItem({...newItem, expiry: e.target.value}) }),
                            React.createElement('input', { type: "number", placeholder: "最少起訂量", className: "admin-input", onChange: e => setNewItem({...newItem, minQty: parseInt(e.target.value)}) })
                        ),
                        React.createElement('input', { type: "number", placeholder: "原價 (HKD)", className: "admin-input", onChange: e => setNewItem({...newItem, originalPrice: parseFloat(e.target.value)}) }),
                        React.createElement('div', { className: "text-xs font-bold" }, "Tier 階梯定價設定 (格式: 數量-單價，每行一個)"),
                        React.createElement('textarea', { 
                            placeholder: "例如: \n50-45\n100-40", 
                            className: "admin-input h-24 font-mono",
                            onChange: e => {
                                const tiers = e.target.value.split('\n').map(line => {
                                    const [q, p] = line.split('-');
                                    return q && p ? { q: parseInt(q), p: parseFloat(p) } : null;
                                }).filter(x => x);
                                setNewItem({...newItem, tiers});
                            }
                        }),
                        React.createElement('button', { onClick: addProduct, className: "w-full bg-rose-500 text-white py-4 rounded-xl font-black" }, "發佈產品")
                    )
                );
            };

            // --- 條碼組件 ---
            const BarcodeDisplay = ({ order }) => {
                const svgRef = useRef();
                useEffect(() => {
                    if (order && svgRef.current) {
                        JsBarcode(svgRef.current, "BW-" + order.id, { format: "CODE128", width: 2, height: 60, displayValue: true });
                    }
                }, [order]);
                return React.createElement('div', { className: "fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6" },
                    React.createElement('div', { className: "bg-white p-10 rounded-[3rem] w-full max-w-sm flex flex-col items-center animate-up relative" },
                        React.createElement('button', { onClick: () => setView('shop'), className: "absolute top-6 right-6 text-2xl" }, "✕"),
                        React.createElement('h2', { className: "text-xl font-black mb-8 text-center" }, "向職員出示此條碼\n完成付款"),
                        React.createElement('svg', { ref: svgRef }),
                        React.createElement('div', { className: "mt-8 text-center" },
                            React.createElement('p', { className: "text-[10px] text-gray-400 font-bold" }, "ORDER ID"),
                            React.createElement('p', { className: "text-2xl font-black text-rose-500" }, "BW-" + order.id)
                        ),
                        React.createElement('button', { onClick: () => setView('shop'), className: "mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold" }, "返回首頁")
                    )
                );
            };

            // --- 渲染主要介面 ---
            if (view === 'admin') {
                return React.createElement('div', { className: "min-h-screen p-6 pb-24" },
                    React.createElement('div', { className: "flex justify-between items-center mb-8" },
                        React.createElement('h1', { className: "text-2xl font-black" }, "系統後台"),
                        React.createElement('button', { onClick: () => setView('shop'), className: "text-rose-500 font-bold" }, "離開")
                    ),
                    React.createElement('div', { className: "flex gap-2 mb-6" },
                        [['brand', '品牌'], ['product', '產品'], ['discount', '折扣']].map(([k, v]) => 
                            React.createElement('button', {
                                key: k,
                                onClick: () => setAdminTab(k),
                                className: `flex-1 py-2 rounded-lg text-sm font-bold ${adminTab === k ? 'bg-slate-900 text-white' : 'bg-white border'}`
                            }, v)
                        )
                    ),
                    adminTab === 'brand' && React.createElement(AdminBrand),
                    adminTab === 'product' && React.createElement(AdminProduct)
                );
            }

            return React.createElement('div', { className: "max-w-md mx-auto min-h-screen relative bg-slate-50" },
                // Header
                React.createElement('header', { className: "bg-white p-6 sticky top-0 z-30 shadow-sm" },
                    React.createElement('div', { className: "flex justify-between items-end" },
                        React.createElement('div', { onClick: handleTitleClick },
                            React.createElement('h1', { className: "text-2xl font-black text-rose-500 italic" }, "BESPOKE MALL"),
                            React.createElement('p', { className: "text-[10px] text-gray-400 font-bold" }, "(只限展場內即時下單)")
                        ),
                        React.createElement('button', { onClick: () => setView('history'), className: "bg-slate-100 px-4 py-2 rounded-full text-xs font-bold" }, "我的紀錄")
                    ),
                    React.createElement('div', { className: "flex mt-6" },
                        ['Gift Card', 'Favor'].map(cat => React.createElement('button', {
                            key: cat,
                            onClick: () => { setActiveCategory(cat); setSelectedBrand(null); },
                            className: `flex-1 py-3 text-sm font-bold ${activeCategory === cat ? 'active-tab' : 'text-gray-300'}`
                        }, cat === 'Gift Card' ? '禮券' : '回禮'))
                    )
                ),

                // 品牌/產品顯示區
                React.createElement('main', { className: "p-4" },
                    selectedBrand ? 
                    React.createElement('div', { className: "space-y-4" },
                        React.createElement('button', { onClick: () => setSelectedBrand(null), className: "text-sm font-bold text-gray-400" }, "← 返回品牌選擇"),
                        products.filter(p => p.brandId === selectedBrand.id && p.status === 'enabled').map(p => 
                            React.createElement('div', { key: p.id, className: "bg-white p-4 rounded-3xl flex gap-4 items-center shadow-sm border border-slate-100" },
                                React.createElement('img', { src: p.img, className: "w-20 h-20 rounded-2xl object-cover" }),
                                React.createElement('div', { className: "flex-1" },
                                    React.createElement('h4', { className: "text-xs font-black" }, p.name),
                                    React.createElement('div', { className: "text-rose-500 font-black mt-1" }, "$" + getActivePrice(p, cart[p.id])),
                                    React.createElement('div', { className: "text-[9px] text-gray-400" }, `起訂量: ${p.minQty}`)
                                ),
                                React.createElement('div', { className: "flex items-center gap-2 bg-slate-50 rounded-full px-2" },
                                    React.createElement('button', { onClick: () => updateCart(p.id, -1), className: "w-8 h-8 font-bold" }, "-"),
                                    React.createElement('span', { className: "w-4 text-center text-xs font-black" }, cart[p.id] || 0),
                                    React.createElement('button', { onClick: () => updateCart(p.id, 1), className: "w-8 h-8 font-bold text-rose-500" }, "+")
                                )
                            )
                        )
                    ) : 
                    React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                        brands.filter(b => b.category === activeCategory).map(b => 
                            React.createElement('div', { key: b.id, onClick: () => setSelectedBrand(b), className: "bg-white p-6 h-36 rounded-[2rem] flex flex-col items-center justify-center border shadow-sm" },
                                React.createElement('img', { src: b.img, className: "h-14 object-contain mb-3" }),
                                React.createElement('p', { className: "text-[10px] text-gray-400 font-bold uppercase tracking-widest text-center" }, b.name)
                            )
                        )
                    )
                ),

                // 購物籃 Float
                totalAmount > 0 && React.createElement('div', { className: "fixed bottom-10 left-6 right-6 z-40" },
                    React.createElement('button', { 
                        onClick: () => setView('checkout'),
                        className: "w-full bg-slate-900 text-white rounded-full px-8 py-5 flex justify-between items-center shadow-2xl"
                    },
                        React.createElement('div', { className: "text-left" },
                            React.createElement('p', { className: "text-[10px] text-slate-400 uppercase font-bold" }, "估算合計金額"),
                            React.createElement('p', { className: "text-xl font-black text-rose-400" }, "$" + totalAmount.toLocaleString())
                        ),
                        React.createElement('span', { className: "bg-rose-500 px-6 py-2 rounded-2xl font-black text-sm" }, "確認訂單")
                    )
                ),

                // 確認訂單頁面 (Checkout)
                view === 'checkout' && React.createElement('div', { className: "fixed inset-0 bg-white z-50 overflow-y-auto p-8 animate-up" },
                    React.createElement('div', { className: "flex justify-between items-center mb-8" },
                        React.createElement('button', { onClick: () => setView('shop'), className: "text-gray-300" }, "✕"),
                        React.createElement('h2', { className: "text-xl font-black" }, "確認訂單內容"),
                        React.createElement('div', { className: "w-4" })
                    ),
                    React.createElement('div', { className: "mb-8 text-lg font-bold" }, "前方 ", React.createElement('span', { className: "text-rose-500" }, "2"), " 張訂單準備中"),
                    
                    // 電話輸入
                    React.createElement('div', { className: "flex items-center gap-2 border-y py-5 mb-6 relative" },
                        React.createElement('span', { className: "text-sm font-bold w-20" }, "聯絡電話"),
                        React.createElement('input', { 
                            type: "tel", 
                            placeholder: "請輸入 8 位電話號碼",
                            className: "flex-1 outline-none text-sm",
                            value: phone,
                            onChange: e => setPhone(e.target.value)
                        }),
                        React.createElement('button', { className: "text-[10px] border px-2 py-1 rounded" }, "獲取號碼"),
                        React.createElement('div', { className: "absolute -right-4 yellow-label" }, "← 必須填寫")
                    ),

                    React.createElement('div', { className: "space-y-6 mb-8" },
                        cartItems.map(item => React.createElement('div', { key: item.id, className: "flex gap-4" },
                            React.createElement('img', { src: item.img, className: "w-16 h-16 rounded-xl object-cover" }),
                            React.createElement('div', { className: "flex-1" },
                                React.createElement('p', { className: "text-xs font-black" }, item.name),
                                React.createElement('p', { className: "text-[10px] text-gray-400" }, "有效期至: " + item.expiry),
                                React.createElement('div', { className: "flex justify-between mt-1" },
                                    React.createElement('span', { className: "text-xs" }, "x" + item.qty),
                                    React.createElement('span', { className: "font-black" }, "HK$" + (item.currentPrice * item.qty))
                                )
                            )
                        ))
                    ),

                    React.createElement('div', { className: "bg-rose-50 p-6 rounded-[2rem] text-center space-y-2 mb-10" },
                        React.createElement('p', { className: "text-xs font-bold" }, "下單後將無法退款或更改"),
                        React.createElement('p', { className: "text-[10px] text-gray-500" }, "請確保有效期適用於您的婚期")
                    ),

                    React.createElement('div', { className: "flex gap-4" },
                        React.createElement('div', { className: "flex-1" },
                            React.createElement('p', { className: "text-[10px] text-gray-400" }, `共 ${cartItems.length} 件產品`),
                            React.createElement('p', { className: "text-xl font-black text-rose-500" }, "HK$" + totalAmount)
                        ),
                        React.createElement('button', { 
                            onClick: submitOrder,
                            disabled: isSubmitting,
                            className: "bg-slate-900 text-white px-10 py-4 rounded-full font-black shadow-lg" 
                        }, "正式下單")
                    )
                ),

                // 條碼彈窗
                view === 'barcode' && React.createElement(BarcodeDisplay, { order: currentOrder }),

                // 歷史紀錄彈窗
                view === 'history' && React.createElement('div', { className: "fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6" },
                    React.createElement('div', { className: "bg-white w-full max-w-sm rounded-[3rem] p-8 max-h-[70vh] overflow-y-auto" },
                        React.createElement('div', { className: "flex justify-between items-center mb-6" },
                            React.createElement('h3', { className: "font-black" }, "最近 5 筆訂單"),
                            React.createElement('button', { onClick: () => setView('shop') }, "✕")
                        ),
                        orderHistory.length === 0 ? React.createElement('p', { className: "text-center text-gray-400 py-10" }, "尚無紀錄") :
                        orderHistory.map(h => React.createElement('div', { 
                            key: h.id, 
                            onClick: () => { setCurrentOrder(h); setView('barcode'); },
                            className: "p-4 border-b flex justify-between items-center" 
                        },
                            React.createElement('div', null,
                                React.createElement('p', { className: "text-rose-500 font-bold" }, "BW-" + h.id),
                                React.createElement('p', { className: "text-[10px] text-gray-400" }, h.time)
                            ),
                            React.createElement('p', { className: "font-black" }, "$" + h.total)
                        ))
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
