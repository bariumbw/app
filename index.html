<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>囍帖預覽器 - 產品連動版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@1&family=Patrick+Hand&family=Allison&family=Imperial+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aniyah-personal-use" rel="stylesheet">
    
    <style>
        /* 核心畫布設定 */
        .preview-canvas {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2400 / 1700;
            position: relative;
            /* 請確保此圖片檔案存在於 GitHub 跟目錄 */
            background-image: url('%20DESIGN%20PREVIEW%20%E5%9C%96.jpg?v=11'); 
            background-color: #A62C3E; 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .font-im-fell { font-family: 'IM Fell English', serif; }
        .font-aniyah { font-family: 'Aniyah Personal Use', 'Allison', 'Imperial Script', cursive; }

        /* 姓名圖層排版 */
        .name-layer {
            position: absolute;
            top: 19%;
            left: 0;
            width: 50%;
            color: #FFFFFF;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bride-wrap { transform: translateX(-9px); font-size: 45px; line-height: 1; }
        .groom-wrap { transform: translateX(60px); font-size: 45px; line-height: 1; margin-top: 1.9em; }

        /* 禮券插圖層 */
        .voucher-layer {
            position: absolute;
            top: 0%; left: 65%; width: 16%; z-index: 5;
            display: flex; justify-content: center;
        }
        .voucher-layer img { width: 100%; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }

        /* 預視圖右側詳情面板 */
        .info-panel {
            position: absolute;
            top: 20%;
            right: 2%;
            width: 15%;
            background: rgba(255,255,255,0.92);
            padding: 15px;
            border-radius: 12px;
            font-family: sans-serif;
            display: none; /* 初始隱藏，選擇產品後顯示 */
            z-index: 20;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full grid grid-cols-1 xl:grid-cols-[1fr,400px] gap-10">
        
        <div class="flex flex-col items-center relative">
            <div class="preview-canvas">
                <div class="voucher-layer">
                    <img id="pVoucher" src="" alt="" class="hidden">
                </div>

                <div class="name-layer font-aniyah">
                    <div class="bride-wrap"><h1 id="pBride">Christian</h1></div>
                    <div class="groom-wrap"><h1 id="pGroom">Benjamin</h1></div>
                </div>
                
                <div id="pDetailPanel" class="info-panel shadow-lg border border-zinc-200">
                    <img id="pDetailBrandImg" src="" class="w-full h-12 object-contain mb-3">
                    <h4 id="pDetailProdName" class="font-bold text-[12px] text-zinc-800 mb-1"></h4>
                    <hr class="my-2 border-zinc-200">
                    <p class="text-[8px] font-bold text-zinc-400 uppercase mb-1">Terms & Conditions</p>
                    <p id="pDetailTC" class="text-[8px] text-zinc-500 leading-tight h-24 overflow-y-auto custom-scroll"></p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl h-fit border border-zinc-100 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-8 custom-scroll overflow-y-auto">
                
                <section class="mb-8">
                    <h2 class="text-xl font-bold text-zinc-800 mb-4 font-im-fell tracking-tight">01 名字編輯</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="iBride" value="Christian" placeholder="新娘名字" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900 transition-all">
                        <input type="text" id="iGroom" value="Benjamin" placeholder="新郎名字" class="w-full p-3 bg-zinc-50 rounded-xl outline-none border focus:border-zinc-900 transition-all">
                    </div>
                </section>

                <hr class="mb-8 border-zinc-100">

                <section class="mb-8">
                    <h2 class="text-xl font-bold text-zinc-800 mb-4 font-im-fell tracking-tight">02 禮券品牌選擇</h2>
                    
                    <select id="categoryFilter" onchange="renderBrands()" class="w-full p-3 bg-zinc-50 rounded-xl border mb-4 text-sm outline-none focus:border-zinc-900 cursor-pointer">
                        <option value="all">所有分類</option>
                        <option value="西式禮餅">西式禮餅</option>
                        <option value="中式唐餅">中式唐餅</option>
                        <option value="美食餐飲">美食餐飲</option>
                    </select>
                    
                    <div id="brandGrid" class="grid grid-cols-4 gap-2 mb-6">
                        </div>

                    <div id="productSection" class="hidden animate-fade-in">
                        <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-3">選擇產品項目</h3>
                        <div id="productGrid" class="grid grid-cols-1 gap-2">
                            </div>
                    </div>
                </section>

                <button class="w-full py-4 bg-zinc-900 text-white rounded-xl font-bold uppercase text-xs mb-4 shadow-lg active:scale-95 transition-all">
                    儲存設計內容
                </button>

                <a href="admin.html" class="flex items-center justify-center w-full py-3 border border-zinc-100 text-zinc-400 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-zinc-50 hover:text-zinc-900 transition">
                    進入員工後台頁面
                </a>
            </div>
        </div>
    </div>

    <script>
        // 讀取 LocalStorage 數據 (與 admin.html 同步)
        function getDB() {
            return JSON.parse(localStorage.getItem('weddingVouchers')) || [];
        }

        // 渲染品牌列表
        function renderBrands() {
            const db = getDB();
            const filter = document.getElementById('categoryFilter').value;
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = '';
            
            // 過濾並提取唯一品牌
            const filteredData = db.filter(item => filter === 'all' || item.category === filter);
            const uniqueBrands = [...new Set(filteredData.map(item => item.brand))];
            
            if (uniqueBrands.length === 0) {
                grid.innerHTML = '<p class="col-span-4 text-[10px] text-zinc-400 text-center py-4">暫無數據</p>';
                return;
            }

            uniqueBrands.forEach(bName => {
                const item = filteredData.find(i => i.brand === bName);
                const btn = document.createElement('button');
                btn.className = "border bg-white p-2 hover:border-zinc-900 rounded-lg transition-all flex flex-col items-center group";
                btn.onclick = () => selectBrand(bName);
                btn.innerHTML = `<img src="${item.brandImg}" class="h-8 object-contain group-hover:scale-110 transition-transform">`;
                grid.appendChild(btn);
            });
        }

        // 點擊品牌後顯示其產品
        function selectBrand(bName) {
            const db = getDB();
            const prodSection = document.getElementById('productSection');
            const prodGrid = document.getElementById('productGrid');
            
            prodSection.classList.remove('hidden');
            prodGrid.innerHTML = '';

            const products = db.filter(i => i.brand === bName);
            products.forEach(p => {
                const btn = document.createElement('button');
                btn.className = "text-left p-3 border rounded-xl hover:bg-zinc-900 hover:text-white text-sm font-medium transition-all";
                btn.innerText = p.product;
                btn.onclick = () => applyToPreview(p);
                prodGrid.appendChild(btn);
            });
        }

        // 將選中的產品應用到預覽圖
        function applyToPreview(p) {
            // 1. 更新主預覽圖上的品牌 Logo (插圖層)
            const pVoucher = document.getElementById('pVoucher');
            pVoucher.src = p.brandImg;
            pVoucher.classList.remove('hidden');

            // 2. 更新右側詳情面板
            document.getElementById('pDetailPanel').style.display = 'block';
            document.getElementById('pDetailBrandImg').src = p.brandImg;
            document.getElementById('pDetailProdName').innerText = p.product;
            document.getElementById('pDetailTC').innerText = p.tc;
        }

        // 即時同步名字輸入
        document.getElementById('iBride').addEventListener('input', (e) => {
            document.getElementById('pBride').innerText = e.target.value;
        });
        document.getElementById('iGroom').addEventListener('input', (e) => {
            document.getElementById('pGroom').innerText = e.target.value;
        });

        // 頁面載入時初始化品牌列表
        window.onload = renderBrands;
    </script>
</body>
</html>
