<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESPOKE MALL | 禮券與回禮整合平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <a href="javascript:void(0)" onclick="showPage('home')" class="text-xl font-black text-pink-600 tracking-tighter">BESPOKE MALL</a>
                <div id="admin-nav" class="hidden md:flex space-x-3 text-[12px] font-bold text-blue-600 border-l pl-4">
                    <button onclick="showPage('admin-brands')" class="hover:underline">品牌管理</button>
                    <button onclick="showPage('admin-products')" class="hover:underline">產品配置</button>
                    <button onclick="showPage('admin-orders')" class="hover:underline">訂單跟進</button>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <button id="admin-login-btn" onclick="document.getElementById('login-box').classList.toggle('hidden')" class="text-[10px] bg-slate-100 px-3 py-1 rounded-full font-bold uppercase">Admin</button>
                    <div id="login-box" class="hidden absolute right-0 mt-2 w-48 bg-white border p-4 shadow-xl rounded-xl z-[60]">
                        <input type="password" id="admin-pw" placeholder="輸入 5963" class="w-full border p-2 rounded mb-2 text-sm outline-none focus:border-pink-500">
                        <button onclick="checkAdmin()" class="w-full bg-slate-900 text-white py-1 rounded text-sm font-bold">驗證</button>
                    </div>
                    <button id="logout-btn" onclick="logout()" class="hidden text-xs text-slate-400 hover:text-red-500">登出</button>
                </div>
                <div class="relative cursor-pointer p-2 hover:bg-pink-50 rounded-full transition" onclick="showPage('cart-page')">
                    <i class="fa-solid fa-cart-shopping text-slate-600"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-pink-500 text-white text-[10px] rounded-full px-1.5 font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="page active max-w-7xl mx-auto px-4 py-8">
        <div class="flex space-x-6 mb-8 border-b text-sm">
            <button onclick="filterCat('all')" class="cat-btn pb-3 border-b-2 border-pink-500 font-bold">全部商品</button>
            <button onclick="filterCat('禮券')" class="cat-btn pb-3 text-slate-400">禮券</button>
            <button onclick="filterCat('回禮')" class="cat-btn pb-3 text-slate-400">回禮小禮物</button>
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </section>

    <section id="product-detail" class="page max-w-5xl mx-auto px-4 py-10">
        <button onclick="showPage('home')" class="mb-4 text-slate-400 text-sm flex items-center"><i class="fa-solid fa-angle-left mr-2"></i> 返回商品列表</button>
        <div class="flex flex-col md:flex-row gap-10 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex-1">
                <img id="detail-img" src="" class="w-full aspect-square object-cover rounded-2xl shadow-inner">
            </div>
            <div class="flex-1 space-y-6">
                <div>
                    <p id="detail-brand" class="text-xs font-bold text-pink-500 uppercase tracking-widest mb-1"></p>
                    <h2 id="detail-title" class="text-3xl font-black"></h2>
                </div>
                <div>
                    <div class="flex items-baseline space-x-3">
                        <p id="detail-price" class="text-3xl font-black text-pink-600"></p>
                        <p id="detail-original" class="text-sm text-slate-300 line-through"></p>
                    </div>
                    <p id="detail-expiry" class="text-sm font-bold text-red-600 mt-2 italic"></p>
                </div>
                <div class="flex items-center space-x-4 pt-4 border-t">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-400 mb-1">數量</span>
                        <input type="number" id="buy-qty" value="1" min="1" class="border-2 p-3 w-20 rounded-xl text-center font-black outline-none border-slate-100 focus:border-pink-500">
                    </div>
                    <button onclick="addToCart()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition mt-5">加入購物車</button>
                </div>
                <div class="space-y-2 pt-4">
                    <p class="text-xs font-bold text-slate-700">條款及細則 (T&C):</p>
                    <p id="detail-tc" class="text-xs text-slate-500 leading-relaxed bg-slate-50 p-3 rounded-lg"></p>
                </div>
            </div>
        </div>
    </section>

    <section id="cart-page" class="page max-w-2xl mx-auto px-4 py-10">
        <div class="flex justify-between items-end mb-6">
            <h2 class="text-3xl font-black">購物車</h2>
            <button onclick="showPage('home')" class="text-sm text-blue-600">繼續購物</button>
        </div>
        <div id="cart-items" class="space-y-4 mb-8">
            </div>
        <div id="cart-footer" class="hidden border-t pt-6">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-slate-400 uppercase tracking-widest">總計金額</span>
                <span id="cart-total" class="text-3xl font-black text-pink-600"></span>
            </div>
            <button onclick="processCheckout()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-slate-800 shadow-xl transition">確認下單付款</button>
        </div>
    </section>

    <section id="admin-brands" class="page max-w-4xl mx-auto px-4 py-10">
        <h2 class="text-2xl font-black mb-8">品牌設定</h2>
        <div class="bg-white p-6 rounded-2xl border shadow-sm mb-10 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="brand-name-in" placeholder="品牌名稱 (如: Lady M)" class="border p-3 rounded-xl outline-none focus:border-blue-500">
                <div class="border-2 border-dashed border-slate-200 p-2 rounded-xl flex items-center justify-between">
                    <span class="text-xs text-slate-400 ml-2">上載品牌 Logo</span>
                    <input type="file" id="brand-img-in" accept="image/*" class="text-xs w-32">
                </div>
            </div>
            <button onclick="addBrand()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">新增品牌</button>
        </div>
        <div id="brand-list-admin" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </section>

    <section id="admin-products" class="page max-w-5xl mx-auto px-4 py-10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">產品配置</h2>
            <button onclick="toggleElement('prod-form')" class="bg-pink-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-pink-200">+ 新增產品</button>
        </div>
        
        <div id="prod-form" class="hidden bg-white p-8 rounded-2xl border shadow-2xl mb-10 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="p-name-in" placeholder="產品名稱" class="border p-3 rounded-xl">
                <select id="p-brand-in" class="border p-3 rounded-xl"></select>
                <select id="p-cat-in" class="border p-3 rounded-xl">
                    <option value="禮券">分類：禮券</option>
                    <option value="回禮">分類：回禮</option>
                </select>
                <input type="date" id="p-exp-in" class="border p-3 rounded-xl">
                <input type="number" id="p-price-in" placeholder="現價" class="border p-3 rounded-xl">
                <input type="number" id="p-orig-in" placeholder="原價" class="border p-3 rounded-xl">
                <div class="col-span-2 border-2 border-dashed p-3 rounded-xl">
                    <p class="text-[10px] font-bold text-slate-400 mb-1">上載產品圖片</p>
                    <input type="file" id="p-img-in" accept="image/*" class="text-xs">
                </div>
                <textarea id="p-tc-in" placeholder="T&C 條款細則" class="col-span-2 border p-3 rounded-xl h-24"></textarea>
            </div>
            <button onclick="addProduct()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">儲存產品並上線</button>
        </div>

        <div id="prod-list-admin" class="space-y-3"></div>
    </section>

    <section id="admin-orders" class="page max-w-7xl mx-auto px-4 py-10">
        <h2 class="text-2xl font-black mb-8 text-blue-900">訂單跟進與配送管理</h2>
        <div class="bg-white border rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 border-b text-slate-400">
                    <tr>
                        <th class="p-6">訂單編號</th>
                        <th class="p-6">項目</th>
                        <th class="p-6">金額</th>
                        <th class="p-6">狀態</th>
                    </tr>
                </thead>
                <tbody id="admin-order-table">
                    </tbody>
            </table>
        </div>
    </section>

    <script>
        // 資料庫初始化
        let brands = [
            { name: 'Lady M', logo: 'https://bespoke-mall.myshopify.com/cdn/shop/files/Lady_M_Logo_200x.png' },
            { name: '東海堂', logo: '' },
            { name: 'agnès b.', logo: '' }
        ];

        let products = [
            { id: 1, name: 'Lady M $80 禮券', brand: 'Lady M', cat: '禮券', price: 80, original: 80, expiry: '2026-12-31', tc: '適用於全港 Lady M 分店換領蛋糕。', img: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=500' },
            { id: 2, name: '東海堂 $50 禮餅券', brand: '東海堂', cat: '禮券', price: 39.5, original: 50, expiry: '2026-09-30', tc: '面值$50，適用於換領中西餅食。', img: 'https://images.unsplash.com/photo-1587314168485-3236d6710814?w=500' }
        ];

        let cart = [];
        let orders = [];
        let currentPid = null;

        // 切換頁面
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(id === 'home') renderHome();
            if(id === 'cart-page') renderCart();
            if(id === 'admin-brands') renderAdminBrands();
            if(id === 'admin-products') renderAdminProducts();
            if(id === 'admin-orders') renderAdminOrders();
        }

        // 登入驗證
        function checkAdmin() {
            if(document.getElementById('admin-pw').value === '5963') {
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('admin-login-btn').classList.add('hidden');
                document.getElementById('login-box').classList.add('hidden');
                showPage('admin-products');
            } else { alert('密碼無效'); }
        }

        function logout() { location.reload(); }

        // 圖片轉 Base64
        const toBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = e => rej(e);
        });

        // 品牌管理
        async function addBrand() {
            const name = document.getElementById('brand-name-in').value;
            const file = document.getElementById('brand-img-in').files[0];
            if(!name) return;
            const logo = file ? await toBase64(file) : '';
            brands.push({ name, logo });
            renderAdminBrands();
            document.getElementById('brand-name-in').value = '';
        }

        function renderAdminBrands() {
            document.getElementById('brand-list-admin').innerHTML = brands.map(b => `
                <div class="bg-white p-4 border rounded-2xl flex flex-col items-center">
                    <img src="${b.logo || 'https://via.placeholder.com/60'}" class="w-12 h-12 object-contain mb-2">
                    <span class="text-xs font-bold">${b.name}</span>
                </div>
            `).join('');
            // 同步產品表單的品牌下拉選單
            document.getElementById('p-brand-in').innerHTML = brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        // 產品管理
        async function addProduct() {
            const file = document.getElementById('p-img-in').files[0];
            const p = {
                id: Date.now(),
                name: document.getElementById('p-name-in').value,
                brand: document.getElementById('p-brand-in').value,
                cat: document.getElementById('p-cat-in').value,
                expiry: document.getElementById('p-exp-in').value,
                price: parseFloat(document.getElementById('p-price-in').value),
                original: parseFloat(document.getElementById('p-orig-in').value),
                tc: document.getElementById('p-tc-in').value,
                img: file ? await toBase64(file) : 'https://via.placeholder.com/400'
            };
            products.push(p);
            toggleElement('prod-form');
            renderAdminProducts();
        }

        function renderAdminProducts() {
            document.getElementById('prod-list-admin').innerHTML = products.map(p => `
                <div class="bg-white p-4 border rounded-xl flex justify-between items-center shadow-sm">
                    <div class="flex items-center space-x-4">
                        <img src="${p.img}" class="w-12 h-12 object-cover rounded-lg">
                        <div>
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] text-slate-400">${p.brand} | HK$${p.price}</p>
                        </div>
                    </div>
                    <button onclick="deleteProd(${p.id})" class="text-red-400 text-xs">刪除</button>
                </div>
            `).join('');
        }

        // 前台展示
        function renderHome(cat = 'all') {
            const list = cat === 'all' ? products : products.filter(x => x.cat === cat);
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div onclick="showDetail(${p.id})" class="group cursor-pointer">
                    <div class="aspect-square bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm group-hover:shadow-xl transition-all mb-3">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <p class="text-[10px] font-bold text-pink-500 uppercase">${p.brand}</p>
                    <h3 class="font-bold text-sm truncate mb-1">${p.name}</h3>
                    <div class="flex items-baseline space-x-2">
                        <span class="font-black text-slate-900">HK$${p.price}</span>
                        <span class="text-[10px] text-slate-300 line-through">HK$${p.original}</span>
                    </div>
                    <p class="text-[10px] text-red-600 font-bold mt-1 italic">有效期: ${p.expiry}</p>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const p = products.find(x => x.id === id);
            currentPid = id;
            document.getElementById('detail-img').src = p.img;
            document.getElementById('detail-brand').innerText = p.brand;
            document.getElementById('detail-title').innerText = p.name;
            document.getElementById('detail-price').innerText = 'HK$' + p.price;
            document.getElementById('detail-original').innerText = '原價 HK$' + p.original;
            document.getElementById('detail-expiry').innerText = '有效期: ' + p.expiry;
            document.getElementById('detail-tc').innerText = p.tc;
            showPage('product-detail');
        }

        // 購物車功能
        function addToCart() {
            const qty = parseInt(document.getElementById('buy-qty').value);
            const exist = cart.find(x => x.pid === currentPid);
            if(exist) exist.qty += qty;
            else cart.push({ pid: currentPid, qty: qty });
            updateCartUI();
            alert('已加入購物車');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            if(cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-300"><i class="fa-solid fa-cart-ghost text-4xl mb-2"></i><p>購物車是空的</p></div>`;
                footer.classList.add('hidden');
                return;
            }
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                const p = products.find(x => x.id === item.pid);
                const sub = p.price * item.qty;
                total += sub;
                return `
                    <div class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm">
                        <img src="${p.img}" class="w-16 h-16 object-cover rounded-xl">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${p.name}</p>
                            <p class="text-[10px] text-slate-400">HK$${p.price} x ${item.qty}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-pink-600">HK$${sub}</p>
                            <button onclick="removeCart(${idx})" class="text-[10px] text-red-300 uppercase font-bold">移除</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = 'HK$' + total.toLocaleString();
            footer.classList.remove('hidden');
        }

        function removeCart(idx) { cart.splice(idx, 1); renderCart(); updateCartUI(); }

        // 模擬結帳
        function processCheckout() {
            const id = 'BW' + String(orders.length + 1).padStart(4, '0');
            const total = document.getElementById('cart-total').innerText;
            orders.push({ id, total, items: [...cart], status: '已下單' });
            alert('結帳成功！訂單編號：' + id);
            cart = [];
            updateCartUI();
            showPage('home');
        }

        function renderAdminOrders() {
            document.getElementById('admin-order-table').innerHTML = orders.map(o => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6 font-mono font-bold text-pink-600">${o.id}</td>
                    <td class="p-6 text-xs text-slate-500">${o.items.length} 個項目</td>
                    <td class="p-6 font-bold">${o.total}</td>
                    <td class="p-6">
                        <select class="bg-blue-50 text-blue-700 text-xs font-bold p-2 rounded-lg border-none outline-none">
                            <option>已下單</option>
                            <option>已付款</option>
                            <option>準備中</option>
                            <option>已取單</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        function filterCat(c) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('border-b-2', 'text-slate-400'));
            event.target.classList.add('border-b-2', 'border-pink-500', 'font-bold');
            renderHome(c);
        }

        function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }
        function deleteProd(id) { products = products.filter(x => x.id !== id); renderAdminProducts(); }

        // 啟動
        showPage('home');
    </script>
</body>
</html>
