<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bespoke Mall | 展場下單系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b08d57; --stone-bg: #fdfcfb; }
        body { font-family: -apple-system, "PingFang HK", sans-serif; background-color: var(--stone-bg); color: #333; overflow-x: hidden; }
        .sidebar-item.active { background: white; border-left: 4px solid var(--gold); color: #000; font-weight: bold; }
        .bottom-sheet { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        .bottom-sheet.active { display: flex; }
        .sheet-content { background: white; width: 100%; border-radius: 24px 24px 0 0; max-height: 92vh; overflow-y: auto; position: relative; }
        
        /* 管理員介面預設隱藏 */
        .admin-controls { display: none !important; }
        body.admin-mode .admin-controls { display: flex !important; }

        .img-preview { width: 100%; height: 140px; border: 2px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; color: #999; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
        .status-dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="admin-controls bg-zinc-900 text-white text-[10px] px-4 py-2 flex justify-between items-center z-[60]">
        <span class="tracking-widest font-bold"><i class="fa-solid fa-screwdriver-wrench mr-2"></i>員工管理模式</span>
        <button onclick="openAdmin()" class="bg-white text-black px-3 py-1 rounded font-black text-[9px] uppercase">開啟後台編輯器</button>
    </div>

    <header class="bg-white border-b sticky top-0 z-40">
        <div class="bg-stone-50 text-[10px] text-center py-2 px-4 text-stone-400 border-b italic">
            展場專用下單系統 (Bespoke Mall Expo)
        </div>
        <div class="flex justify-between items-center px-6 py-4">
            <h1 class="text-xl font-light tracking-[0.3em] text-cyan-700">BESPOKE MALL</h1>
            <button onclick="adminLogin()" class="text-stone-100"><i class="fa-solid fa-user-gear text-2xl"></i></button>
        </div>
        <div class="flex text-sm">
            <button onclick="switchTab('v')" id="tab-v" class="flex-1 py-3 border-b-2 border-gold font-bold">禮券</button>
            <button onclick="switchTab('g')" id="tab-g" class="flex-1 py-3 border-b-2 border-transparent text-stone-300">回禮</button>
        </div>
    </header>

    <main id="view-shop" class="flex-1 flex overflow-hidden">
        <aside id="brand-sidebar" class="w-24 bg-stone-100 overflow-y-auto border-r text-[11px]"></aside>
        <section class="flex-1 overflow-y-auto p-4 space-y-4 pb-32" id="product-list"></section>
    </main>

    <main id="view-orders" class="hidden flex-1 overflow-y-auto bg-stone-50 p-4 pb-32">
        <h2 class="text-center font-bold text-lg mb-4">我的訂單狀態</h2>
        <div id="order-container" class="space-y-4"></div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 pb-6 z-50">
        <button onclick="showPage('shop')" id="nav-s" class="flex flex-col items-center gap-1 text-gold">
            <i class="fa-solid fa-list-check text-xl"></i><span class="text-[10px] font-bold">點單</span>
        </button>
        <button onclick="showPage('orders')" id="nav-r" class="flex flex-col items-center gap-1 text-stone-300">
            <i class="fa-solid fa-receipt text-xl"></i><span class="text-[10px] font-bold">取單</span>
        </button>
    </nav>

    <div id="cart-float" class="fixed bottom-24 left-4 right-4 bg-stone-800 text-white rounded-2xl h-14 flex items-center px-6 justify-between shadow-2xl z-40 hidden">
        <div class="flex flex-col">
            <span class="text-[9px] text-stone-400">當前預計總額</span>
            <span id="cart-price" class="font-bold text-orange-200">HK$0</span>
        </div>
        <button onclick="openConfirmSheet()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs">確認下單</button>
    </div>

    <div id="sheet-detail" class="bottom-sheet" onclick="closeSheet('sheet-detail')">
        <div class="sheet-content p-6" onclick="event.stopPropagation()">
            <div id="det-img" class="w-full h-60 bg-stone-50 rounded-2xl mb-4 bg-center bg-contain bg-no-repeat border"></div>
            <h2 id="det-name" class="text-lg font-bold mb-1"></h2>
            <div id="det-tiers" class="bg-stone-50 rounded-xl p-4 mb-6 space-y-2 text-xs"></div>
            <div class="flex justify-between items-center border p-4 rounded-xl mb-6">
                <span class="text-sm font-bold">選擇數量</span>
                <div class="flex items-center gap-4">
                    <button onclick="updateQty(-1)" class="w-8 h-8 border rounded-lg">-</button>
                    <span id="det-qty" class="font-bold w-10 text-center"></span>
                    <button onclick="updateQty(1)" class="w-8 h-8 border rounded-lg text-gold font-bold">+</button>
                </div>
            </div>
            <div class="flex items-center justify-between mb-8">
                <span id="det-total" class="text-2xl font-black text-orange-600 font-mono">HK$ 0</span>
            </div>
            <button onclick="addToCart()" class="w-full py-4 bg-stone-900 text-white rounded-full font-bold">加入購買清單</button>
        </div>
    </div>

    <div id="sheet-admin" class="bottom-sheet" onclick="closeSheet('sheet-admin')">
        <div class="sheet-content p-6 max-h-[92vh]" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">後台內容管理</h2>
                <button onclick="closeSheet('sheet-admin')" class="text-stone-300 text-2xl">&times;</button>
            </div>
            <div class="flex gap-6 border-b mb-6 text-sm">
                <button onclick="adminTab('b')" id="ad-btn-b" class="pb-2 border-b-2 border-black font-bold">品牌設定</button>
                <button onclick="adminTab('p')" id="ad-btn-p" class="pb-2 text-stone-300">產品發佈</button>
            </div>

            <div id="admin-b" class="space-y-4">
                <input type="text" id="new-b-name" placeholder="品牌名稱" class="w-full p-4 bg-stone-50 rounded-xl outline-none border">
                <select id="new-b-cat" class="w-full p-4 bg-stone-50 rounded-xl outline-none border">
                    <option value="v">分類：禮券</option>
                    <option value="g">分類：回禮</option>
                </select>
                <div class="img-preview" id="logo-preview" onclick="document.getElementById('file-logo').click()">點擊上傳品牌 Logo</div>
                <input type="file" id="file-logo" class="hidden" accept="image/*" onchange="handleFile(this, 'logo-preview')">
                <button onclick="saveBrand()" class="w-full py-4 bg-stone-900 text-white rounded-xl font-bold">儲存品牌</button>
                <div id="admin-brand-list" class="grid grid-cols-4 gap-2 pt-4 border-t"></div>
            </div>

            <div id="admin-p" class="hidden space-y-4 pb-20">
                <input type="text" id="new-p-name" placeholder="產品標題" class="w-full p-4 bg-stone-50 rounded-xl outline-none border">
                <select id="new-p-brand" class="w-full p-4 bg-stone-50 rounded-xl outline-none border"></select>
                <div class="img-preview" id="p-img-preview" onclick="document.getElementById('file-p').click()">點擊上傳產品圖片</div>
                <input type="file" id="file-p" class="hidden" accept="image/*" onchange="handleFile(this, 'p-img-preview')">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="new-p-price" placeholder="基本單價" class="w-full p-4 bg-stone-50 rounded-xl border">
                    <input type="number" id="new-p-min" placeholder="起訂量" class="w-full p-4 bg-stone-50 rounded-xl border">
                </div>
                <textarea id="new-p-tiers" placeholder="階梯價格 (數量-價格)，每行一筆" class="w-full p-4 bg-stone-50 rounded-xl border h-24 text-xs"></textarea>
                <button onclick="saveProduct()" class="w-full py-4 bg-stone-900 text-white rounded-xl font-bold">發佈產品</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bespoke_expo_db')) || { brands: [], products: [], orders: [] };
        let currentTab = 'v', currentBrand = 'all', cart = null, tempImg = "";

        function init() {
            renderSidebar();
            renderProducts();
            updateNavUI('shop');
        }

        // 員工登入驗證
        function adminLogin() {
            const pass = prompt("請輸入員工後台管理密碼：");
            if (pass === "5963") {
                document.body.classList.add('admin-mode');
                alert("已切換至員工管理模式");
                refreshAdminLists();
            } else if (pass !== null) {
                alert("密碼錯誤");
            }
        }

        function handleFile(input, previewId) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                document.getElementById(previewId).style.backgroundImage = `url(${tempImg})`;
                document.getElementById(previewId).innerText = "";
            };
            reader.readAsDataURL(file);
        }

        function renderSidebar() {
            const container = document.getElementById('brand-sidebar');
            const filtered = db.brands.filter(b => b.cat === currentTab);
            let html = `<div onclick="filterBrand('all')" class="sidebar-item ${currentBrand === 'all' ? 'active' : ''} p-4 text-center">所有品牌</div>`;
            filtered.forEach(b => {
                html += `<div onclick="filterBrand(${b.id})" class="sidebar-item ${currentBrand == b.id ? 'active' : ''} py-5 flex flex-col items-center gap-2">
                    <div class="w-10 h-10 bg-white rounded-full bg-center bg-contain bg-no-repeat border" style="background-image:url(${b.img})"></div>
                    <span class="text-[9px] text-center truncate w-full px-1">${b.name}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderProducts() {
            const container = document.getElementById('product-list');
            const filtered = db.products.filter(p => p.cat === currentTab && (currentBrand === 'all' || p.brandId == currentBrand));
            if (!filtered.length) {
                container.innerHTML = `<div class="py-20 text-center text-stone-300 text-xs italic">目前暫無產品</div>`;
                return;
            }
            container.innerHTML = filtered.map(p => `
                <div class="flex gap-4 items-center bg-white p-2 rounded-2xl shadow-sm border border-stone-50">
                    <div class="w-24 h-24 bg-stone-50 rounded-xl bg-center bg-contain bg-no-repeat border" style="background-image:url(${p.img})"></div>
                    <div class="flex-1">
                        <h4 class="text-xs font-bold text-stone-800 leading-tight mb-1">${p.name}</h4>
                        <div class="text-orange-600 font-black text-sm mt-2">HK$ ${p.price}</div>
                        <div class="text-[8px] text-stone-400">起訂: ${p.min}</div>
                    </div>
                    <button onclick="openDetail(${p.id})" class="w-10 h-10 bg-orange-100 text-orange-900 rounded-full flex items-center justify-center font-bold mr-2"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const p = db.products.find(x => x.id == id);
            cart = { ...p, qty: p.min };
            document.getElementById('det-name').innerText = p.name;
            document.getElementById('det-img').style.backgroundImage = `url(${p.img})`;
            document.getElementById('det-qty').innerText = cart.qty;
            let tierHtml = (p.tiers || []).map(t => `<div class="flex justify-between border-b pb-1"><span>${t.q} 張或以上</span><span class="font-bold">HK$ ${t.p}</span></div>`).join('');
            document.getElementById('det-tiers').innerHTML = tierHtml || "展場單一優惠價";
            calculateTotal();
            openSheet('sheet-detail');
        }

        function updateQty(val) {
            cart.qty = Math.max(cart.min, cart.qty + (val * 10));
            document.getElementById('det-qty').innerText = cart.qty;
            calculateTotal();
        }

        function calculateTotal() {
            let unitPrice = cart.price;
            if (cart.tiers) {
                const match = [...cart.tiers].sort((a,b) => b.q - a.q).find(t => cart.qty >= t.q);
                if (match) unitPrice = match.p;
            }
            cart.currentPrice = unitPrice;
            document.getElementById('det-total').innerText = `HK$ ${(unitPrice * cart.qty).toLocaleString()}`;
        }

        function addToCart() {
            document.getElementById('cart-price').innerText = `HK$ ${(cart.currentPrice * cart.qty).toLocaleString()}`;
            document.getElementById('cart-float').classList.remove('hidden');
            closeSheet('sheet-detail');
        }

        function showPage(p) {
            document.getElementById('view-shop').classList.toggle('hidden', p !== 'shop');
            document.getElementById('view-orders').classList.toggle('hidden', p !== 'orders');
            updateNavUI(p);
        }

        function updateNavUI(p) {
            const isShop = p === 'shop';
            document.getElementById('nav-s').className = isShop ? 'flex flex-col items-center gap-1 text-gold' : 'flex flex-col items-center gap-1 text-stone-300';
            document.getElementById('nav-r').className = !isShop ? 'flex flex-col items-center gap-1 text-gold' : 'flex flex-col items-center gap-1 text-stone-300';
        }

        function switchTab(t) { currentTab = t; currentBrand = 'all'; init(); }
        function filterBrand(id) { currentBrand = id; renderProducts(); renderSidebar(); }
        function openAdmin() { openSheet('sheet-admin'); }
        function openSheet(id) { document.getElementById(id).classList.add('active'); }
        function closeSheet(id) { document.getElementById(id).classList.remove('active'); }

        function adminTab(t) {
            document.getElementById('admin-b').classList.toggle('hidden', t !== 'b');
            document.getElementById('admin-p').classList.toggle('hidden', t !== 'p');
            document.getElementById('ad-btn-b').className = t==='b' ? 'pb-2 border-b-2 border-black font-bold' : 'pb-2 text-stone-300';
            document.getElementById('ad-btn-p').className = t==='p' ? 'pb-2 border-b-2 border-black font-bold' : 'pb-2 text-stone-300';
        }

        function saveBrand() {
            const name = document.getElementById('new-b-name').value;
            const cat = document.getElementById('new-b-cat').value;
            if (!name) return alert("名稱必填");
            db.brands.push({ id: Date.now(), name, cat, img: tempImg });
            saveDB();
            refreshAdminLists();
            tempImg = "";
            document.getElementById('logo-preview').style.backgroundImage = "";
        }

        function saveProduct() {
            const name = document.getElementById('new-p-name').value;
            const brandId = document.getElementById('new-p-brand').value;
            const price = parseFloat(document.getElementById('new-p-price').value);
            const min = parseInt(document.getElementById('new-p-min').value);
            const tiersRaw = document.getElementById('new-p-tiers').value;
            const tiers = tiersRaw.split('\n').filter(r => r.includes('-')).map(r => {
                const [q, p] = r.split('-');
                return { q: parseInt(q), p: parseFloat(p) };
            });
            const brand = db.brands.find(b => b.id == brandId);
            db.products.push({ id: Date.now(), name, brandId, cat: brand.cat, price, min, img: tempImg, tiers });
            saveDB();
            refreshAdminLists();
            alert("已發佈");
        }

        function refreshAdminLists() {
            document.getElementById('admin-brand-list').innerHTML = db.brands.map(b => `<div class="border text-[8px] p-1 text-center"><img src="${b.img}" class="h-6 mx-auto mb-1">${b.name}</div>`).join('');
            document.getElementById('new-p-brand').innerHTML = db.brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        }

        function saveDB() {
            localStorage.setItem('bespoke_expo_db', JSON.stringify(db));
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
