<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESPOKE MALL | 專業婚禮禮券與回禮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <a href="javascript:void(0)" onclick="showPage('home')" class="text-xl font-black text-pink-600">BESPOKE MALL</a>
                <div id="admin-nav" class="hidden flex space-x-4 text-xs font-bold text-blue-600">
                    <button onclick="showPage('admin-brands')">品牌管理</button>
                    <button onclick="showPage('admin-products')">產品管理</button>
                    <button onclick="showPage('admin-orders')">訂單跟進</button>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <button id="admin-login-btn" onclick="document.getElementById('login-box').classList.toggle('hidden')" class="text-[10px] bg-slate-100 px-3 py-1 rounded-full uppercase">Admin</button>
                    <div id="login-box" class="hidden absolute right-0 mt-2 w-48 bg-white border p-4 shadow-xl rounded-xl z-[60]">
                        <input type="password" id="admin-pw" placeholder="密碼" class="w-full border p-2 rounded mb-2 text-sm">
                        <button onclick="checkAdmin()" class="w-full bg-slate-900 text-white py-1 rounded text-sm">確認</button>
                    </div>
                    <button id="logout-btn" onclick="logout()" class="hidden text-xs text-slate-400">登出管理員</button>
                </div>
                <div class="relative cursor-pointer" onclick="showPage('cart-page')">
                    <i class="fa-solid fa-cart-shopping text-slate-600"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-pink-500 text-white text-[10px] rounded-full px-1.5">0</span>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="page active max-w-7xl mx-auto px-4 py-8">
        <div class="flex space-x-6 mb-8 border-b text-sm">
            <button onclick="filterCat('all')" class="cat-btn pb-3 border-b-2 border-pink-500 font-bold" data-cat="all">全部商品</button>
            <button onclick="filterCat('禮券')" class="cat-btn pb-3 text-slate-400" data-cat="禮券">禮券</button>
            <button onclick="filterCat('回禮')" class="cat-btn pb-3 text-slate-400" data-cat="回禮">回禮小禮物</button>
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <section id="product-detail" class="page max-w-5xl mx-auto px-4 py-10">
        <button onclick="showPage('home')" class="mb-4 text-slate-400 text-sm">← 返回</button>
        <div class="flex flex-col md:flex-row gap-10">
            <div class="flex-1 bg-white p-2 rounded-2xl border"><img id="detail-img" src="" class="w-full aspect-square object-cover rounded-xl"></div>
            <div class="flex-1 space-y-6">
                <h2 id="detail-title" class="text-3xl font-bold"></h2>
                <div>
                    <p id="detail-price" class="text-2xl font-black"></p>
                    <p id="detail-expiry" class="text-sm font-bold text-red-600 mt-1"></p>
                </div>
                <div class="flex items-center space-x-4">
                    <input type="number" id="buy-qty" value="1" min="1" class="border-2 p-3 w-20 rounded-xl text-center font-bold">
                    <button onclick="addToCart()" class="bg-slate-900 text-white px-8 py-4 rounded-xl font-bold flex-1">加入購物車</button>
                </div>
                <div class="border-t pt-4 text-xs text-slate-500"><p class="font-bold mb-1">T&C:</p><p id="detail-tc"></p></div>
            </div>
        </div>
    </section>

    <section id="admin-brands" class="page max-w-3xl mx-auto px-4 py-10">
        <h2 class="text-2xl font-bold mb-6">品牌設定</h2>
        <div class="bg-white p-6 rounded-xl border mb-6 space-y-4">
            <input type="text" id="new-brand-name" placeholder="品牌名稱" class="w-full border p-2 rounded">
            <div class="flex items-center gap-4">
                <label class="text-sm text-slate-500">上載 Logo:</label>
                <input type="file" id="new-brand-file" accept="image/*" class="text-xs">
            </div>
            <button onclick="addBrand()" class="w-full bg-blue-600 text-white py-2 rounded">新增品牌</button>
        </div>
        <div id="brand-list" class="grid grid-cols-2 gap-4"></div>
    </section>

    <section id="admin-products" class="page max-w-5xl mx-auto px-4 py-10">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold">產品配置</h2>
            <button onclick="toggleElement('product-form')" class="bg-pink-500 text-white px-4 py-2 rounded">+ 新增產品</button>
        </div>
        <div id="product-form" class="hidden bg-white p-6 border rounded-xl mb-8 space-y-4 shadow-xl">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="p-name" placeholder="產品名稱" class="border p-2 rounded">
                <select id="p-brand" class="border p-2 rounded"></select>
                <select id="p-cat" class="border p-2 rounded">
                    <option value="禮券">禮券</option>
                    <option value="回禮">回禮</option>
                </select>
                <input type="date" id="p-expiry" class="border p-2 rounded">
                <input type="number" id="p-price" placeholder="價格" class="border p-2 rounded">
                <input type="file" id="p-file" accept="image/*" class="text-xs pt-2">
            </div>
            <textarea id="p-tc" placeholder="T&C 內容" class="w-full border p-2 rounded h-20"></textarea>
            <button onclick="saveProduct()" class="w-full bg-slate-900 text-white py-2 rounded">確認儲存</button>
        </div>
        <div id="admin-p-list" class="space-y-2"></div>
    </section>

    <script>
        // 1. 預填產品資料 (從 bespoke-mall 抓取之模擬數據)
        let brands = [
            { name: 'Lady M', logo: '' },
            { name: '東海堂', logo: '' },
            { name: 'agnès b.', logo: '' },
            { name: '永樂粉麵廠', logo: '' }
        ];

        let products = [
            { id: 101, name: 'Lady M $80 禮券', brand: 'Lady M', cat: '禮券', price: 80, expiry: '2026-12-31', tc: '適用於全港 Lady M 分店。', img: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400' },
            { id: 102, name: '東海堂 $50 禮餅券 (經典橙色)', brand: '東海堂', cat: '禮券', price: 39.5, expiry: '2026-09-30', tc: '換領面值 $50 之產品。', img: 'https://images.unsplash.com/photo-1587314168485-3236d6710814?w=400' },
            { id: 103, name: 'agnès b. $50 心意禮券', brand: 'agnès b.', cat: '禮券', price: 42.5, expiry: '2026-12-31', tc: '適用於 agnès b. Cafe & Fleuriste。', img: 'https://images.unsplash.com/photo-1549462220-22687f4c3905?w=400' },
            { id: 104, name: '永樂嫁囍禮券 (特濃蝦子麵)', brand: '永樂粉麵廠', cat: '回禮', price: 18, expiry: '2027-01-15', tc: '憑券可於順豐站換領。', img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400' }
        ];

        let cart = [];
        let currentDetailId = null;

        // 2. 核心功能
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'admin-brands') renderBrands();
            if(id === 'admin-products') renderAdminProducts();
        }

        function checkAdmin() {
            if(document.getElementById('admin-pw').value === '5963') {
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('admin-login-btn').classList.add('hidden');
                document.getElementById('login-box').classList.add('hidden');
                showPage('admin-products');
            } else { alert('密碼錯誤'); }
        }

        // 3. 圖片上傳處理 (Base64)
        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function addBrand() {
            const name = document.getElementById('new-brand-name').value;
            const file = document.getElementById('new-brand-file').files[0];
            let logo = '';
            if(file) logo = await fileToBase64(file);
            if(!name) return;
            brands.push({ name, logo });
            renderBrands();
            document.getElementById('new-brand-name').value = '';
        }

        async function saveProduct() {
            const file = document.getElementById('p-file').files[0];
            const p = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                brand: document.getElementById('p-brand').value,
                cat: document.getElementById('p-cat').value,
                expiry: document.getElementById('p-expiry').value,
                price: document.getElementById('p-price').value,
                tc: document.getElementById('p-tc').value,
                img: file ? await fileToBase64(file) : 'https://via.placeholder.com/400'
            };
            products.push(p);
            toggleElement('product-form');
            renderAdminProducts();
        }

        // 4. 渲染邏輯
        function renderHome(filter = 'all') {
            const grid = document.getElementById('product-grid');
            const list = filter === 'all' ? products : products.filter(p => p.cat === filter);
            grid.innerHTML = list.map(p => `
                <div class="bg-white p-3 rounded-2xl border hover:shadow-lg transition cursor-pointer" onclick="showDetail(${p.id})">
                    <img src="${p.img}" class="w-full aspect-square object-cover rounded-xl mb-3">
                    <p class="text-[10px] font-bold text-pink-500">${p.brand}</p>
                    <h3 class="text-sm font-bold truncate">${p.name}</h3>
                    <p class="text-lg font-black">HK$${p.price}</p>
                    <p class="text-[10px] text-red-600 font-bold">有效期: ${p.expiry}</p>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const p = products.find(x => x.id === id);
            currentDetailId = id;
            document.getElementById('detail-title').innerText = p.name;
            document.getElementById('detail-price').innerText = 'HK$' + p.price;
            document.getElementById('detail-expiry').innerText = '有效期: ' + p.expiry;
            document.getElementById('detail-tc').innerText = p.tc;
            document.getElementById('detail-img').src = p.img;
            showPage('product-detail');
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn pb-3 text-slate-400');
            event.target.className = 'cat-btn pb-3 border-b-2 border-pink-500 font-bold';
            renderHome(cat);
        }

        function renderBrands() {
            document.getElementById('brand-list').innerHTML = brands.map(b => `
                <div class="bg-white p-3 border rounded-xl flex items-center gap-3">
                    <img src="${b.logo || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full bg-slate-100">
                    <span class="font-bold text-sm">${b.name}</span>
                </div>
            `).join('');
            document.getElementById('p-brand').innerHTML = brands.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        function renderAdminProducts() {
            document.getElementById('admin-p-list').innerHTML = products.map(p => `
                <div class="bg-white p-3 border rounded-lg flex justify-between items-center text-sm">
                    <div class="flex items-center gap-3">
                        <img src="${p.img}" class="w-10 h-10 object-cover rounded">
                        <div>
                            <p class="font-bold">${p.name}</p>
                            <p class="text-[10px] text-slate-400">${p.brand} | ${p.cat}</p>
                        </div>
                    </div>
                    <button onclick="products = products.filter(x=>x.id != ${p.id}); renderAdminProducts();" class="text-red-500 text-xs">刪除</button>
                </div>
            `).join('');
        }

        function addToCart() {
            cart.push({ id: currentDetailId, qty: document.getElementById('buy-qty').value });
            document.getElementById('cart-count').innerText = cart.length;
            alert('已成功加入購物車！');
        }

        function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }
        function logout() { location.reload(); }

        // 初始化
        showPage('home');
    </script>
</body>
</html>
