<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自訂囍帖預覽器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap');
        
        .wedding-card {
            background-color: #A62C3E; /* 喜慶紅 */
            aspect-ratio: 1.4 / 1;
            position: relative;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .font-chinese { font-family: 'Noto Serif TC', serif; }
        .font-cursive { font-family: 'Ma Shan Zheng', cursive; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="sticky top-10">
            <h2 class="text-xl font-bold mb-4 text-gray-700">即時預覽</h2>
            <div id="invitationCard" class="wedding-card p-8 flex flex-col items-start justify-center">
                
                <div id="previewIllustration" class="mb-4">
                    <img src="https://img.icons8.com/plasticine/200/wedding-couple.png" alt="Couple" class="h-32 md:h-48 object-contain">
                </div>

                <p class="text-xs md:text-sm tracking-widest opacity-80 uppercase mb-2">Together with their parents</p>
                
                <h1 id="previewNames" class="text-3xl md:text-5xl font-serif italic mb-4">Christian & Benjamin</h1>
                
                <p class="text-xs md:text-sm mb-4">REQUEST THE HONOUR OF YOUR PRESENCE AT<br>THEIR WEDDING CELEBRATION</p>
                
                <div class="border-t border-b border-white/30 py-2 mb-4 w-full">
                    <p id="previewDate" class="text-lg md:text-2xl font-bold tracking-tighter text-center">OCTOBER 15, 2026</p>
                </div>

                <div class="text-left w-full">
                    <p id="previewVenue" class="text-xs md:text-sm font-bold uppercase tracking-widest">Four Seasons Grand Ballroom</p>
                    <p id="previewAddress" class="text-[10px] md:text-xs opacity-70">8 Finance Street, Central, Hong Kong</p>
                </div>

                <div class="absolute bottom-6 right-8 text-4xl opacity-50 font-cursive text-yellow-200">囍</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">自訂內容</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">新人姓名</label>
                    <input type="text" id="inputNames" value="Christian & Benjamin" 
                        class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">婚禮日期</label>
                    <input type="text" id="inputDate" value="OCTOBER 15, 2026" 
                        class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">宴客場地</label>
                    <input type="text" id="inputVenue" value="Four Seasons Grand Ballroom" 
                        class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">詳細地址</label>
                    <textarea id="inputAddress" class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-red-500 outline-none">8 Finance Street, Central, Hong Kong</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">選擇插畫風格</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="changeImg('classic')" class="p-2 border rounded hover:bg-gray-50 focus:border-red-500">西式</button>
                        <button onclick="changeImg('chinese')" class="p-2 border rounded hover:bg-gray-50">中式裙褂</button>
                        <button onclick="changeImg('qipao')" class="p-2 border rounded hover:bg-gray-50">旗袍</button>
                        <button onclick="changeImg('casual')" class="p-2 border rounded hover:bg-gray-50">便裝</button>
                    </div>
                </div>
                
                <div class="pt-6">
                    <button onclick="window.print()" class="w-full bg-red-700 text-white font-bold py-3 rounded-lg hover:bg-red-800 transition">
                        儲存並下載預覽圖
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 即時監聽輸入並更新預覽
        const inputs = [
            { id: 'inputNames', preview: 'previewNames' },
            { id: 'inputDate', preview: 'previewDate' },
            { id: 'inputVenue', preview: 'previewVenue' },
            { id: 'inputAddress', preview: 'previewAddress' }
        ];

        inputs.forEach(item => {
            document.getElementById(item.id).addEventListener('input', (e) => {
                document.getElementById(item.preview).innerText = e.target.value;
            });
        });

        // 切換圖片功能 (這裡用 Placeholder 代替，你可以換成你 1.jpg 切割後的圖片連結)
        function changeImg(type) {
            const imgElement = document.querySelector('#previewIllustration img');
            const images = {
                'classic': 'https://img.icons8.com/plasticine/200/wedding-couple.png',
                'chinese': 'https://img.icons8.com/color/200/traditional-chinese-dress.png',
                'qipao': 'https://img.icons8.com/color/200/cheongsam.png',
                'casual': 'https://img.icons8.com/color/200/couple-love.png'
            };
            imgElement.src = images[type] || images['classic'];
        }
    </script>
</body>
</html>
